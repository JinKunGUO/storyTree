<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="avatarBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="avatarShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- 背景圆形 -->
  <circle cx="100" cy="100" r="100" fill="url(#avatarBg)"/>

  <!-- 用户图标 - 无性别轮廓 -->
  <g transform="translate(100, 100)" filter="url(#avatarShadow)">
    <!-- 头部圆形 -->
    <circle cx="0" cy="-25" r="35" fill="rgba(255,255,255,0.9)"/>
    <!-- 身体半圆形 -->
    <path d="M -55 65 Q -55 15 0 15 Q 55 15 55 65" fill="rgba(255,255,255,0.9)"/>
  </g>
</svg>
