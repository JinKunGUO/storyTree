<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>邮箱验证 - StoryTree</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/utilities.css">
    <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
    <style>
        body {
            background: var(--st-gradient-bg, linear-gradient(135deg, #667eea 0%, #764ba2 100%));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: var(--st-space-5, 20px);
        }

        .verify-container {
            max-width: 500px;
            width: 100%;
            padding: var(--st-space-10, 40px);
            background: white;
            border-radius: var(--st-radius-2xl, 20px);
            box-shadow: var(--st-shadow-xl, 0 20px 40px rgba(0,0,0,0.15));
            text-align: center;
        }

        .verify-icon {
            font-size: 64px;
            margin-bottom: var(--st-space-5, 20px);
        }

        .verify-icon.loading {
            color: var(--st-primary-500, #6366F1);
            animation: spin 1s linear infinite;
        }

        .verify-icon.success {
            color: var(--st-success-500, #22C55E);
        }

        .verify-icon.error {
            color: var(--st-error-500, #EF4444);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .verify-title {
            font-size: var(--st-text-2xl, 28px);
            font-weight: var(--st-font-semibold, 600);
            margin-bottom: var(--st-space-4, 15px);
            color: var(--st-text-primary, #111827);
        }

        .verify-message {
            font-size: var(--st-text-base, 16px);
            color: var(--st-text-secondary, #6B7280);
            margin-bottom: var(--st-space-8, 30px);
            line-height: var(--st-leading-relaxed, 1.6);
        }

        .verify-actions {
            display: flex;
            gap: var(--st-space-4, 15px);
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: var(--st-space-3, 12px) var(--st-space-8, 30px);
            border: none;
            border-radius: var(--st-radius-lg, 8px);
            font-size: var(--st-text-base, 16px);
            font-weight: var(--st-font-medium, 500);
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: var(--st-space-2, 8px);
            transition: all var(--st-duration-normal, 0.2s) var(--st-ease-default);
        }

        .btn-primary {
            background: var(--st-gradient-brand, linear-gradient(135deg, #6366F1, #8B5CF6));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99,102,241,0.35);
            text-decoration: none;
            color: white;
        }

        .btn-secondary {
            background: var(--st-gray-200, #E5E7EB);
            color: var(--st-text-secondary, #6B7280);
        }

        .btn-secondary:hover {
            background: var(--st-gray-300, #D1D5DB);
            text-decoration: none;
            color: var(--st-text-primary, #111827);
        }

        .resend-section {
            margin-top: var(--st-space-8, 30px);
            padding-top: var(--st-space-8, 30px);
            border-top: 1px solid var(--st-gray-100, #F3F4F6);
        }

        .resend-text {
            font-size: var(--st-text-sm, 14px);
            color: var(--st-text-tertiary, #9CA3AF);
            margin-bottom: var(--st-space-4, 15px);
        }

        .resend-form {
            display: flex;
            gap: var(--st-space-3, 10px);
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .resend-input {
            padding: var(--st-space-3, 10px) var(--st-space-4, 15px);
            border: 2px solid var(--st-gray-200, #E5E7EB);
            border-radius: var(--st-radius-lg, 8px);
            font-size: var(--st-text-sm, 14px);
            width: 250px;
            transition: border-color var(--st-duration-fast, 0.15s);
            outline: none;
        }

        .resend-input:focus {
            border-color: var(--st-primary-500, #6366F1);
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }

        .btn-resend {
            padding: var(--st-space-3, 10px) var(--st-space-5, 20px);
            background: var(--st-gradient-brand, linear-gradient(135deg, #6366F1, #8B5CF6));
            color: white;
            border: none;
            border-radius: var(--st-radius-lg, 8px);
            cursor: pointer;
            font-size: var(--st-text-sm, 14px);
            font-weight: var(--st-font-medium, 500);
            display: inline-flex;
            align-items: center;
            gap: var(--st-space-2, 6px);
            transition: all var(--st-duration-normal, 0.2s);
        }

        .btn-resend:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99,102,241,0.3);
        }

        .btn-resend:disabled {
            background: var(--st-gray-300, #D1D5DB);
            color: var(--st-gray-500, #6B7280);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div id="loadingState">
            <i class="fas fa-spinner verify-icon loading"></i>
            <h1 class="verify-title">正在验证邮箱...</h1>
            <p class="verify-message">请稍候，我们正在验证您的邮箱地址</p>
        </div>

        <div id="successState" style="display: none;">
            <i class="fas fa-check-circle verify-icon success"></i>
            <h1 class="verify-title">验证成功！</h1>
            <p class="verify-message">您的邮箱已成功验证，现在可以使用所有功能了</p>
            <div class="verify-actions">
                <a href="/index.html" class="btn btn-primary">
                    <i class="fas fa-home"></i> 返回首页
                </a>
                <a href="/profile.html" class="btn btn-secondary">
                    <i class="fas fa-user"></i> 个人中心
                </a>
            </div>
        </div>

        <div id="errorState" style="display: none;">
            <i class="fas fa-times-circle verify-icon error"></i>
            <h1 class="verify-title">验证失败</h1>
            <p class="verify-message" id="errorMessage">验证链接无效或已过期</p>
            
            <div class="verify-actions">
                <a href="/index.html" class="btn btn-secondary">
                    <i class="fas fa-home"></i> 返回首页
                </a>
            </div>

            <div class="resend-section">
                <p class="resend-text">需要重新发送验证邮件？</p>
                <div class="resend-form">
                    <input 
                        type="email" 
                        id="resendEmail" 
                        class="resend-input" 
                        placeholder="请输入您的邮箱"
                    >
                    <button id="resendBtn" class="btn-resend">
                        <i class="fas fa-envelope"></i> 重新发送
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 从URL获取token
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token') || window.location.pathname.split('/').pop();

        // 页面加载时自动验证
        document.addEventListener('DOMContentLoaded', async function() {
            if (!token || token === 'verify-email.html') {
                showError('缺少验证令牌');
                return;
            }

            try {
                const response = await fetch('/api/auth/verify-email', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess();
                } else {
                    showError(data.error || '验证失败');
                }
            } catch (error) {
                console.error('验证错误:', error);
                showError('网络错误，请稍后重试');
            }
        });

        // 显示成功状态
        function showSuccess() {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('errorState').style.display = 'none';
            document.getElementById('successState').style.display = 'block';
        }

        // 显示错误状态
        function showError(message) {
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('successState').style.display = 'none';
            document.getElementById('errorState').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        // 重新发送验证邮件
        document.getElementById('resendBtn')?.addEventListener('click', async function() {
            const email = document.getElementById('resendEmail').value.trim();
            
            if (!email) {
                toast.warning('请输入邮箱地址');
                return;
            }

            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';

            try {
                const response = await fetch('/api/auth/resend-verification', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    toast.success('验证邮件已发送，请检查您的邮箱');
                    document.getElementById('resendEmail').value = '';
                } else {
                    toast.error(data.error || '发送失败');
                }
            } catch (error) {
                console.error('发送错误:', error);
                toast.error('网络错误，请稍后重试');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-envelope"></i> 重新发送';
            }
        });
    </script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
</body>
</html>
