<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>忘记密码 - StoryTree</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/utilities.css">
    <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
    <style>
        body {
            background: var(--st-gradient-bg, linear-gradient(135deg, #667eea 0%, #764ba2 100%));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .forgot-password-container {
            max-width: 450px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: var(--st-radius-2xl, 20px);
            box-shadow: var(--st-shadow-xl, 0 20px 40px rgba(0,0,0,0.15));
        }

        .forgot-password-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .forgot-password-icon {
            font-size: 48px;
            color: var(--st-primary-500, #6366F1);
            margin-bottom: 15px;
        }

        .forgot-password-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--st-text-primary, #111827);
            margin-bottom: 10px;
        }

        .forgot-password-subtitle {
            font-size: 14px;
            color: var(--st-text-secondary, #4B5563);
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--st-text-primary, #111827);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--st-gray-200, #E5E7EB);
            border-radius: var(--st-radius-lg, 8px);
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--st-primary-500, #6366F1);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--st-radius-lg, 8px);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--st-gradient-brand, linear-gradient(135deg, #6366F1, #8B5CF6));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .success-message {
            background: var(--st-success-50, #F0FDF4);
            border: 1px solid var(--st-success-200, #BBF7D0);
            color: var(--st-success-700, #15803D);
            padding: 15px;
            border-radius: var(--st-radius-lg, 8px);
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .error-message {
            background: var(--st-error-50, #FEF2F2);
            border: 1px solid var(--st-error-200, #FECACA);
            color: var(--st-error-700, #B91C1C);
            padding: 15px;
            border-radius: var(--st-radius-lg, 8px);
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--st-primary-500, #6366F1);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .back-link a:hover {
            color: var(--st-primary-700, #4338CA);
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="forgot-password-container">
        <div class="forgot-password-header">
            <i class="fas fa-key forgot-password-icon"></i>
            <h1 class="forgot-password-title">忘记密码</h1>
            <p class="forgot-password-subtitle">
                请输入您注册时使用的邮箱地址，我们将向您发送密码重置链接
            </p>
        </div>

        <div id="successMessage" class="success-message">
            <i class="fas fa-check-circle"></i>
            密码重置邮件已发送！请检查您的邮箱并按照邮件中的说明重置密码。
        </div>

        <div id="errorMessage" class="error-message"></div>

        <form id="forgotPasswordForm">
            <div class="form-group">
                <label class="form-label" for="email">
                    <i class="fas fa-envelope"></i> 邮箱地址
                </label>
                <input 
                    type="email" 
                    id="email" 
                    class="form-input" 
                    placeholder="请输入您的邮箱"
                    required
                >
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary">
                <i class="fas fa-paper-plane"></i> 发送重置邮件
            </button>
        </form>

        <div class="back-link">
            <a href="/login.html">
                <i class="fas fa-arrow-left"></i> 返回登录
            </a>
        </div>
    </div>

    <script src="js/loading.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script>
        const form = document.getElementById('forgotPasswordForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const emailInput = document.getElementById('email');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = emailInput.value.trim();

            if (!email) {
                showError('请输入邮箱地址');
                return;
            }

            // 验证邮箱格式
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('请输入有效的邮箱地址');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 发送中...';
            hideMessages();

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess();
                    form.reset();
                } else {
                    showError(data.error || '发送失败，请稍后重试');
                }
            } catch (error) {
                console.error('发送错误:', error);
                showError('网络错误，请稍后重试');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> 发送重置邮件';
            }
        });

        function showSuccess() {
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
        }

        function hideMessages() {
            successMessage.classList.remove('show');
            errorMessage.classList.remove('show');
        }
    </script>
</body>
</html>
