<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快速登录</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            margin: 0 0 30px 0;
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover {
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #28a745;
            margin-top: 10px;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .hint {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            border-radius: 4px;
            font-size: 14px;
            color: #856404;
        }
        .hint strong {
            display: block;
            margin-bottom: 8px;
        }
        .quick-actions {
            margin-top: 20px;
            text-align: center;
        }
        .quick-actions a {
            display: inline-block;
            margin: 5px;
            padding: 8px 16px;
            background: #f8f9fa;
            color: #667eea;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .quick-actions a:hover {
            background: #e9ecef;
        }
        .divider {
            margin: 30px 0;
            text-align: center;
            position: relative;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #ddd;
        }
        .divider span {
            position: relative;
            background: white;
            padding: 0 15px;
            color: #999;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>🔐 快速登录</h1>
        
        <div class="hint">
            <strong>⚠️ 检测到Token丢失</strong>
            请选择以下任一方式登录：
        </div>

        <!-- 一键设置Token -->
        <div style="margin-top: 20px;">
            <button onclick="setTestToken()" class="btn-secondary">
                ⚡ 一键设置测试Token（开发用）
            </button>
        </div>

        <div class="divider">
            <span>或使用账号密码登录</span>
        </div>

        <!-- 表单登录 -->
        <form id="loginForm" onsubmit="login(event)">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" value="jinhui" required>
            </div>
            
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" id="loginBtn">登录</button>
        </form>

        <div id="message" class="message"></div>

        <div class="quick-actions">
            <a href="/debug-token.html">调试页面</a>
            <a href="/story.html?id=1">返回故事</a>
        </div>
    </div>

    <script>
        const TEST_TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOjEsInVzZXJuYW1lIjoiamluaHVpIiwiaWF0IjoxNzczMzg1MTE3LCJleHAiOjE3NzM5ODk5MTd9.a1QUpXGJzlZUTOjP5j7AxPWVS__ebLH_YMarDswGPuc';

        function setTestToken() {
            const message = document.getElementById('message');
            
            try {
                // 设置token
                localStorage.setItem('token', TEST_TOKEN);
                
                message.className = 'message success';
                message.innerHTML = `
                    ✅ Token设置成功！<br>
                    用户: jinhui (ID: 1)<br>
                    <small>2秒后自动跳转...</small>
                `;
                
                // 2秒后跳转
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const storyId = urlParams.get('id') || '1';
                    window.location.href = `/story-settings.html?id=${storyId}`;
                }, 2000);
            } catch (error) {
                message.className = 'message error';
                message.textContent = `❌ 设置失败: ${error.message}`;
            }
        }

        async function login(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const message = document.getElementById('message');
            
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            message.className = 'message';
            message.textContent = '';
            
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    // 保存token到localStorage
                    localStorage.setItem('token', data.token);
                    
                    message.className = 'message success';
                    message.innerHTML = `
                        ✅ 登录成功！<br>
                        用户: ${data.user.username} (ID: ${data.user.id})<br>
                        <small>2秒后自动跳转...</small>
                    `;
                    
                    // 2秒后跳转
                    setTimeout(() => {
                        const urlParams = new URLSearchParams(window.location.search);
                        const storyId = urlParams.get('id') || '1';
                        window.location.href = `/story-settings.html?id=${storyId}`;
                    }, 2000);
                } else {
                    throw new Error(data.error || '登录失败');
                }
            } catch (error) {
                message.className = 'message error';
                message.textContent = `❌ ${error.message}`;
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        }

        // 页面加载时检查是否已有token
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            if (token) {
                const message = document.getElementById('message');
                message.className = 'message success';
                message.innerHTML = '✅ 检测到已登录，正在跳转...';
                
                setTimeout(() => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const storyId = urlParams.get('id') || '1';
                    window.location.href = `/story-settings.html?id=${storyId}`;
                }, 1000);
            }
        });
    </script>
</body>
</html>
