<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>我的故事 - StoryTree</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/utilities.css">
    <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
    <style>
        body {
            background: var(--st-bg-secondary);
            min-height: 100vh;
            padding-top: 64px;
        }
        .my-stories-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
        }

        .page-header {
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 28px;
            color: var(--st-text-primary);
            margin-bottom: 10px;
        }

        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--st-gray-200);
        }

        .filter-tab {
            padding: 12px 24px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--st-text-secondary);
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .filter-tab.active {
            color: var(--st-primary-500);
            border-bottom-color: var(--st-primary-500);
            font-weight: 600;
        }

        .stories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .story-card {
            background: var(--st-bg-primary);
            border-radius: var(--st-radius-xl);
            overflow: hidden;
            box-shadow: var(--st-shadow-sm);
            border: 1px solid var(--st-gray-100);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .story-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--st-shadow-lg);
        }

        .story-cover {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--st-primary-500) 0%, var(--st-primary-700) 100%);
        }

        .story-content {
            padding: 20px;
        }

        .story-title {
            font-size: var(--st-text-lg);
            font-weight: var(--st-font-semibold);
            color: var(--st-text-primary);
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .story-description {
            font-size: var(--st-text-sm);
            color: var(--st-text-secondary);
            margin-bottom: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .story-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: var(--st-text-xs);
            color: var(--st-text-tertiary);
            margin-bottom: 12px;
        }

        .story-stats {
            display: flex;
            gap: 12px;
        }

        .story-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: var(--st-radius-full);
            font-size: var(--st-text-xs);
            font-weight: var(--st-font-medium);
        }

        .badge-public {
            background: var(--st-info-50);
            color: var(--st-info-700);
        }

        .badge-private {
            background: var(--st-error-50);
            color: var(--st-error-700);
        }

        .badge-friends {
            background: var(--st-warning-50);
            color: var(--st-warning-700);
        }

        .badge-protected {
            background: var(--st-primary-50);
            color: var(--st-primary-700);
        }

        .story-actions {
            display: flex;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--st-gray-100);
        }

        .action-btn {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--st-gray-200);
            background: var(--st-bg-primary);
            border-radius: var(--st-radius-md);
            cursor: pointer;
            font-size: var(--st-text-xs);
            color: var(--st-text-secondary);
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--st-gray-50);
            border-color: var(--st-gray-300);
        }

        .action-btn.primary {
            background: var(--st-primary-500);
            color: white;
            border-color: var(--st-primary-500);
        }

        .action-btn.primary:hover {
            background: var(--st-primary-600);
            border-color: var(--st-primary-600);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--st-text-tertiary);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.4;
        }

        .empty-state h3 {
            font-size: var(--st-text-xl);
            margin-bottom: 10px;
            color: var(--st-text-secondary);
        }

        .create-story-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: var(--st-gradient-brand);
            color: white;
            border: none;
            border-radius: var(--st-radius-lg);
            font-size: var(--st-text-base);
            font-weight: var(--st-font-semibold);
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s var(--st-ease-bounce);
        }

        .create-story-btn:hover {
            background: var(--st-gradient-brand-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.35);
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar" role="navigation" aria-label="主导航">
        <div class="navbar-content">
            <a href="/" class="nav-brand" aria-label="StoryTree 首页">
                <img src="/assets/logo.png" alt="Logo" style="width: 32px; height: 32px; border-radius: 8px; margin-right: 8px;">
                StoryTree
            </a>
            <button class="mobile-menu-toggle" id="mobileMenuToggle" onclick="toggleMobileMenu()" aria-label="展开菜单" aria-expanded="false">
                <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <div class="nav-menu" id="navMenu" role="menubar">
                <a href="/" class="nav-link" role="menuitem">
                    <i class="fas fa-home" aria-hidden="true"></i> 首页
                </a>
                <a href="/discover.html" class="nav-link" role="menuitem">
                    <i class="fas fa-compass" aria-hidden="true"></i> 发现故事
                </a>
                <a href="/my-stories.html" class="nav-link active" role="menuitem">
                    <i class="fas fa-book" aria-hidden="true"></i> 我的故事
                </a>
                <a href="/notifications.html" class="nav-link nav-notification" id="notificationIcon" role="menuitem" aria-label="消息通知">
                    <i class="fas fa-bell" aria-hidden="true"></i> 消息
                    <span class="notification-badge" id="notificationBadge" style="display: none;" aria-live="polite">0</span>
                </a>
                <a href="/profile.html" class="nav-link" id="profileLink" role="menuitem" style="display: none;">
                    <i class="fas fa-user" aria-hidden="true"></i> 个人中心
                </a>
                <a href="/login.html" class="nav-link" id="loginLink" role="menuitem">
                    <i class="fas fa-sign-in-alt" aria-hidden="true"></i> 登录
                </a>
            </div>
        </div>
    </nav>

    <div class="my-stories-container">
        <div class="page-header">
            <h1>我的故事</h1>
            <button class="create-story-btn" onclick="window.location.href='/create.html'">
                <i class="fas fa-plus"></i>
                创建新故事
            </button>
        </div>

        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all">全部故事</button>
            <button class="filter-tab" data-filter="created">我创建的</button>
            <button class="filter-tab" data-filter="collaborated">我协作的</button>
        </div>

        <div id="storiesContainer" class="stories-grid">
            <!-- Stories will be loaded here -->
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <i class="fas fa-book-open"></i>
            <h3>还没有故事</h3>
            <p>开始创建你的第一个故事吧！</p>
            <button class="create-story-btn" onclick="window.location.href='/create.html'">
                <i class="fas fa-plus"></i>
                创建故事
            </button>
        </div>
    </div>

    <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
    <script>
        const API_BASE = '/api';
        let allStories = [];
        let currentFilter = 'all';

        // 检查登录状态
        function checkAuth() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            if (!token) {
                window.location.replace('/login.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search));
                return false;
            }
            return true;
        }

        // 加载我的故事
        async function loadMyStories() {
            if (!checkAuth()) return;

            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                const response = await fetch(`${API_BASE}/stories/my`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Failed to load stories');
                }

                const data = await response.json();
                allStories = data.stories || [];
                
                renderStories();
            } catch (error) {
                console.error('Error loading stories:', error);
                showError('加载故事失败');
            }
        }

        // 渲染故事列表
        function renderStories() {
            const container = document.getElementById('storiesContainer');
            const emptyState = document.getElementById('emptyState');
            
            let filteredStories = allStories;
            
            // 根据筛选条件过滤
            if (currentFilter === 'created') {
                filteredStories = allStories.filter(s => s.isAuthor);
            } else if (currentFilter === 'collaborated') {
                filteredStories = allStories.filter(s => !s.isAuthor);
            }

            if (filteredStories.length === 0) {
                container.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            container.style.display = 'grid';
            emptyState.style.display = 'none';

            container.innerHTML = filteredStories.map(story => `
                <div class="story-card" onclick="viewStory(${story.id})">
                    <img src="${story.cover_image || '/assets/default-cover.jpg?v=3'}"
                         alt="${story.title}" 
                         class="story-cover">
                    <div class="story-content">
                        <div class="story-title">${escapeHtml(story.title)}</div>
                        <div class="story-description">${escapeHtml(story.description || '暂无描述')}</div>
                        
                        <div class="story-badges">
                            ${getVisibilityBadge(story.visibility)}
                            ${story.password ? '<span class="badge badge-protected"><i class="fas fa-lock"></i> 密码保护</span>' : ''}
                            ${story.isAuthor ? '' : '<span class="badge" style="background: #e8f5e9; color: #2e7d32;"><i class="fas fa-users"></i> 协作</span>'}
                        </div>
                        
                        <div class="story-meta">
                            <span><i class="far fa-clock"></i> ${formatDate(story.created_at)}</span>
                            <div class="story-stats">
                                <span><i class="far fa-eye"></i> ${story.views || 0}</span>
                                <span><i class="far fa-heart"></i> ${story.likes || 0}</span>
                            </div>
                        </div>

                        <div class="story-actions" onclick="event.stopPropagation()">
                            <button class="action-btn primary" onclick="viewStory(${story.id})">
                                <i class="fas fa-book-open"></i> 查看
                            </button>
                            ${story.isAuthor ? `
                                <button class="action-btn" onclick="editStory(${story.id})">
                                    <i class="fas fa-cog"></i> 设置
                                </button>
                                <button class="action-btn" onclick="deleteStory(${story.id}, '${escapeHtml(story.title)}')">
                                    <i class="fas fa-trash"></i> 删除
                                </button>
                            ` : `
                                <button class="action-btn" onclick="leaveCollaboration(${story.id})">
                                    <i class="fas fa-sign-out-alt"></i> 退出协作
                                </button>
                            `}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 获取可见性徽章
        function getVisibilityBadge(visibility) {
            const badges = {
                'public': '<span class="badge badge-public"><i class="fas fa-globe"></i> 公开</span>',
                'followers': '<span class="badge badge-friends"><i class="fas fa-user-friends"></i> 关注者可见</span>',
                'collaborators': '<span class="badge badge-private"><i class="fas fa-users"></i> 仅协作者</span>',
                'author_only': '<span class="badge badge-private"><i class="fas fa-lock"></i> 私密</span>'
            };
            return badges[visibility] || badges['public'];
        }

        // 查看故事
        function viewStory(storyId) {
            window.location.href = `/story.html?id=${storyId}`;
        }

        // 编辑故事设置
        function editStory(storyId) {
            window.location.href = `/story-settings.html?id=${storyId}`;
        }

        // 删除故事
        async function deleteStory(storyId, title) {
            showDangerConfirm(`确定要删除故事《${title}》吗？此操作不可恢复！`, async () => {
                try {
                    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                    const response = await fetch(`${API_BASE}/stories/${storyId}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (!response.ok) {
                        throw new Error('Failed to delete story');
                    }

                    showSuccess('故事已删除');
                    loadMyStories(); // 重新加载列表
                } catch (error) {
                    console.error('Error deleting story:', error);
                    showError('删除失败');
                }
            }, { title: '删除故事', confirmText: '确认删除' });
        }

        // 退出协作
        async function leaveCollaboration(storyId) {
            showConfirm('确定要退出此故事的协作吗？', async () => {
                try {
                    const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                    const response = await fetch(`${API_BASE}/stories/${storyId}/collaborators/leave`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (!response.ok) {
                        throw new Error('Failed to leave collaboration');
                    }

                    showSuccess('已退出协作');
                    loadMyStories();
                } catch (error) {
                    console.error('Error leaving collaboration:', error);
                    showError('操作失败');
                }
            }, { title: '退出协作', confirmText: '确认退出' });
        }

        // 工具函数
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (days === 0) return '今天';
            if (days === 1) return '昨天';
            if (days < 7) return `${days}天前`;
            if (days < 30) return `${Math.floor(days / 7)}周前`;
            if (days < 365) return `${Math.floor(days / 30)}个月前`;
            return `${Math.floor(days / 365)}年前`;
        }

        function showSuccess(message) {
            window.toast ? toast.success(message) : alert(message);
        }

        function showError(message) {
            window.toast ? toast.error(message) : alert(message);
        }

        // 筛选标签切换
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderStories();
            });
        });

        // 页面加载时初始化
        loadMyStories();
    </script>
    <script src="js/loading.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/navbar.js"></script>

                <img src="/assets/beian-icon.png" alt="公安备案图标" style="width: 14px; height: 14px; vertical-align: middle;">
                浙公网安备 33011002019543 号
            </a></p>
    </footer>

</body>
