<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StoryTree - 管理后台</title>
  <link rel="stylesheet" href="styles/design-system.css">
  <link rel="stylesheet" href="styles/animations.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/utilities.css">
  <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--st-font-sans); background: var(--st-bg-secondary); }

    .navbar {
      background: #2c3e50;
      color: white;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .nav-brand { font-size: 20px; font-weight: bold; }

    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .stat-card .label { color: #666; font-size: 14px; margin-bottom: 8px; }
    .stat-card .value { font-size: 32px; font-weight: bold; color: #2c3e50; }

    .review-item {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .review-item .header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; }
    .review-item h3 { color: #2c3e50; margin-bottom: 8px; }
    .review-item .meta { color: #666; font-size: 14px; margin-bottom: 12px; }
    .review-item .content {
      background: #f8f9fa;
      padding: 16px;
      border-radius: 8px;
      line-height: 1.6;
      margin-bottom: 16px;
      max-height: 200px;
      overflow-y: auto;
    }
    .review-item .reports { color: #e74c3c; font-size: 14px; margin-bottom: 12px; }
    .review-item .actions { display: flex; gap: 10px; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover { background: #229954; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; }
    .btn-warning { background: #f39c12; color: white; }
    .btn-warning:hover { background: #e67e22; }

    .loading {
      text-align: center;
      padding: 40px;
    }
    .loading:after {
      content: '';
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .empty { text-align: center; padding: 60px; color: #999; }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid #e0e0e0;
    }
    .tab {
      padding: 12px 24px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      color: #666;
      transition: all 0.3s;
    }
    .tab:hover { color: #2c3e50; }
    .tab.active {
      color: #2c3e50;
      border-bottom-color: #3498db;
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .withdrawal-item {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .withdrawal-item .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .withdrawal-item .amount {
      font-size: 28px;
      font-weight: 700;
      color: #27ae60;
    }
    .withdrawal-item .status {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .withdrawal-item .status.pending { background: #fff3cd; color: #856404; }
    .withdrawal-item .status.approved { background: #d4edda; color: #155724; }
    .withdrawal-item .status.rejected { background: #f8d7da; color: #721c24; }
    .withdrawal-item .info {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
      padding: 16px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .withdrawal-item .info-item {
      display: flex;
      flex-direction: column;
    }
    .withdrawal-item .info-item .label {
      color: #666;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .withdrawal-item .info-item .value {
      color: #2c3e50;
      font-weight: 600;
    }
    .withdrawal-item .actions {
      display: flex;
      gap: 10px;
    }
    .withdrawal-item textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      margin-bottom: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
    }

    .badge-free { background: #e0e0e0; color: #666; }
    .badge-trial { background: #ffecd2; color: #d4a574; }
    .badge-monthly { background: #d5e1df; color: #2d5d5a; }
    .badge-quarterly { background: #a8d5ba; color: #1e5c3a; }
    .badge-yearly { background: #ffd700; color: #8b6900; }
    .badge-enterprise { background: #b9f2ff; color: #006a7f; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🛡️ StoryTree 管理后台</div>
    <div>
      <span id="adminName">管理员</span>
      <button class="btn" style="margin-left: 16px; background: rgba(255,255,255,0.2);" onclick="location.href='index.html'">返回前台</button>
    </div>
  </nav>

  <div class="container">
    <h2 style="margin-bottom: 20px;">📊 审核统计</h2>
    <div class="stats" id="stats"></div>

    <!-- 选项卡导航 -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('content')">📝 内容审核</button>
      <button class="tab" onclick="switchTab('withdrawal')">💰 提现审核</button>
      <button class="tab" onclick="switchTab('membership')">👑 会员管理</button>
    </div>

    <!-- 内容审核 -->
    <div id="contentTab" class="tab-content active">
      <h2 style="margin-bottom: 20px;">📝 待审核内容</h2>
      <div id="reviewQueue"></div>
    </div>

    <!-- 提现审核 -->
    <div id="withdrawalTab" class="tab-content">
      <h2 style="margin-bottom: 20px;">💰 提现审核</h2>
      <div id="withdrawalQueue"></div>
    </div>

    <!-- 会员管理 -->
    <div id="membershipTab" class="tab-content">
      <h2 style="margin-bottom: 20px;">👑 会员统计</h2>
      <div class="stats" id="membershipStats" style="margin-bottom: 30px;"></div>
      
      <h3 style="margin-bottom: 15px;">📊 会员列表</h3>
      <div style="margin-bottom: 15px; display: flex; gap: 10px;">
        <select id="tierFilter" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
          <option value="all">全部等级</option>
          <option value="trial">体验会员</option>
          <option value="monthly">月度会员</option>
          <option value="quarterly">季度会员</option>
          <option value="yearly">年度会员</option>
          <option value="enterprise">企业版</option>
        </select>
        <input type="text" id="searchInput" placeholder="搜索用户名或邮箱" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; flex: 1;">
        <button class="btn btn-success" onclick="loadMembers()">🔍 搜索</button>
      </div>
      <div id="membersList"></div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let adminId = null;

    // API 调用
    async function apiRequest(method, path, body) {
      const options = {
        method,
        headers: {
          'Content-Type': 'application/json'
        }
      };
      if (adminId) {
        options.headers['X-User-Id'] = adminId;
      }
      if (body) {
        options.body = JSON.stringify(body);
      }
      const res = await fetch(`${API_BASE}${path}`, options);
      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || '请求失败');
      }
      return res.json();
    }

    // 初始化
    async function init() {
      // 简单的管理员登录
      const username = prompt('请输入管理员用户名：');
      if (!username) {
        window.toast ? toast.error('需要登录才能访问管理后台') : console.error('需要登录才能访问管理后台');
        location.href = 'index.html';
        return;
      }

      try {
        // 开发环境登录
        const res = await apiRequest('POST', '/auth/dev-login', { 
          username, 
          email: `${username}@admin.com` 
        });
        adminId = res.user.id;
        document.getElementById('adminName').textContent = res.user.username;

        // 加载数据
        loadStats();
        loadReviewQueue();
        loadWithdrawalQueue();
      } catch (e) {
        window.toast ? toast.error('登录失败: ' + e.message) : console.error('登录失败: ' + e.message);
        location.href = 'index.html';
      }
    }

    // 加载统计数据
    async function loadStats() {
      try {
        const token = localStorage.getItem('token') || sessionStorage.getItem('token');
        
        // 加载内容审核统计
        const reviewRes = await apiRequest('GET', '/admin/review-queue');
        const reviewStats = reviewRes.stats;

        // 加载提现统计
        let withdrawalStats = { pending: 0, approved: 0, rejected: 0, totalAmount: 0 };
        try {
          const withdrawalRes = await fetch(`${API_BASE}/withdrawals/admin/stats`, {
            headers: {
              'Authorization': `Bearer ${token}`
            }
          });
          if (withdrawalRes.ok) {
            withdrawalStats = await withdrawalRes.json();
          }
        } catch (e) {
          console.error('Failed to load withdrawal stats:', e);
        }

        document.getElementById('stats').innerHTML = `
          <div class="stat-card">
            <div class="label">待审核内容</div>
            <div class="value">${reviewStats.pending}</div>
          </div>
          <div class="stat-card">
            <div class="label">待审核提现</div>
            <div class="value" style="color: #f39c12;">${withdrawalStats.pending || 0}</div>
          </div>
          <div class="stat-card">
            <div class="label">已通过提现</div>
            <div class="value" style="color: #27ae60;">${withdrawalStats.approved || 0}</div>
          </div>
          <div class="stat-card">
            <div class="label">提现总额</div>
            <div class="value" style="color: #3498db;">${withdrawalStats.totalAmount || 0}</div>
          </div>
        `;
      } catch (e) {
        console.error('Failed to load stats:', e);
      }
    }

    // 加载审核队列
    async function loadReviewQueue() {
      const queueDiv = document.getElementById('reviewQueue');
      queueDiv.innerHTML = '<div class="loading"></div>';

      try {
        const res = await apiRequest('GET', '/admin/review-queue');
        
        if (res.queue.length === 0) {
          queueDiv.innerHTML = '<div class="empty">暂无待审核内容</div>';
          return;
        }

        queueDiv.innerHTML = res.queue.map(item => `
          <div class="review-item">
            <div class="header">
              <div>
                <h3>${item.title}</h3>
                <div class="meta">
                  作者：${item.author.username} | 
                  创建时间：${new Date(item.createdAt).toLocaleString('zh-CN')}
                </div>
                ${item.reportCount > 0 ? `<div class="reports">⚠️ 被举报 ${item.reportCount} 次</div>` : ''}
              </div>
            </div>
            <div class="content">${item.content}</div>
            <div class="actions">
              <button class="btn btn-success" onclick="handleReview(${item.id}, 'APPROVED')">✅ 通过</button>
              <button class="btn btn-danger" onclick="handleReview(${item.id}, 'REJECTED')">❌ 驳回</button>
              <button class="btn btn-warning" onclick="handleReview(${item.id}, 'HIDDEN')">🚫 下架</button>
              ${item.reportCount > 0 ? `<button class="btn" style="background: #95a5a6; color: white;" onclick="viewReports(${item.id})">查看举报</button>` : ''}
            </div>
          </div>
        `).join('');
      } catch (e) {
        queueDiv.innerHTML = `<p style="color: red;">加载失败: ${e.message}</p>`;
      }
    }

    // 审核操作
    async function handleReview(nodeId, status) {
      const note = prompt(`请输入审核备注（可选）：`);
      
      try {
        await apiRequest('POST', '/admin/review', {
          nodeId,
          status,
          note
        });
        window.toast ? toast.success('审核成功') : console.log('审核成功');
        loadStats();
        loadReviewQueue();
      } catch (e) {
        window.toast ? toast.error('审核失败: ' + e.message) : console.error('审核失败: ' + e.message);
      }
    }

    // 查看举报
    async function viewReports(nodeId) {
      try {
        const res = await apiRequest('GET', `/admin/reports/${nodeId}`);
        
        let reportHtml = '<div style="max-height:400px;overflow-y:auto;">';
        res.reports.forEach((report, idx) => {
          reportHtml += `<div style="padding:10px 0;border-bottom:1px solid #eee;">`;
          reportHtml += `<strong>${idx + 1}. ${report.reporter.username}</strong><br>`;
          reportHtml += `原因：${report.reason}<br>`;
          if (report.description) reportHtml += `说明：${report.description}<br>`;
          reportHtml += `时间：${new Date(report.createdAt).toLocaleString('zh-CN')}`;
          reportHtml += `</div>`;
        });
        reportHtml += '</div>';

        if (window.showModal) {
          showModal({ title: '举报详情', content: reportHtml, showCancel: false, confirmText: '关闭' });
        } else {
          let reportText = `举报详情：\n\n`;
          res.reports.forEach((report, idx) => {
            reportText += `${idx + 1}. ${report.reporter.username}\n`;
            reportText += `   原因：${report.reason}\n`;
            if (report.description) reportText += `   说明：${report.description}\n`;
            reportText += `   时间：${new Date(report.createdAt).toLocaleString('zh-CN')}\n\n`;
          });
          window.toast ? toast.info('举报详情已打印到控制台') : console.log(reportText);
        }
      } catch (e) {
        window.toast ? toast.error('加载举报详情失败: ' + e.message) : alert('加载举报详情失败: ' + e.message);
      }
    }

    // ========== 提现审核系统 ==========

    // 切换选项卡
    function switchTab(tab) {
      // 更新选项卡样式
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');

      // 显示对应内容
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      if (tab === 'content') {
        document.getElementById('contentTab').classList.add('active');
      } else if (tab === 'withdrawal') {
        document.getElementById('withdrawalTab').classList.add('active');
      } else if (tab === 'membership') {
        document.getElementById('membershipTab').classList.add('active');
        loadMembershipStats();
        loadMembers();
      }
    }

    // 加载提现审核队列
    async function loadWithdrawalQueue() {
      const queueDiv = document.getElementById('withdrawalQueue');
      queueDiv.innerHTML = '<div class="loading"></div>';

      try {
        const token = localStorage.getItem('token') || sessionStorage.getItem('token');
        
        const response = await fetch(`${API_BASE}/withdrawals/admin/all`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (!response.ok) {
          throw new Error('加载提现队列失败');
        }

        const data = await response.json();
        const requests = data.requests || [];
        
        if (requests.length === 0) {
          queueDiv.innerHTML = '<div class="empty">暂无提现申请</div>';
          return;
        }

        const statusMap = {
          pending: { text: '待审核', class: 'pending' },
          approved: { text: '已通过', class: 'approved' },
          rejected: { text: '已拒绝', class: 'rejected' }
        };

        queueDiv.innerHTML = requests.map(req => {
          const status = statusMap[req.status] || { text: req.status, class: '' };
          return `
            <div class="withdrawal-item">
              <div class="header">
                <div class="amount">${req.amount} 积分</div>
                <span class="status ${status.class}">${status.text}</span>
              </div>
              
              <div class="info">
                <div class="info-item">
                  <div class="label">申请用户</div>
                  <div class="value">${escapeHtml(req.user.username)}</div>
                </div>
                <div class="info-item">
                  <div class="label">提现方式</div>
                  <div class="value">${escapeHtml(req.payment_method)}</div>
                </div>
                <div class="info-item">
                  <div class="label">提现账号</div>
                  <div class="value">${escapeHtml(req.payment_account)}</div>
                </div>
                <div class="info-item">
                  <div class="label">申请时间</div>
                  <div class="value">${new Date(req.created_at).toLocaleString('zh-CN')}</div>
                </div>
                ${req.processed_at ? `
                  <div class="info-item">
                    <div class="label">处理时间</div>
                    <div class="value">${new Date(req.processed_at).toLocaleString('zh-CN')}</div>
                  </div>
                ` : ''}
                ${req.admin_note ? `
                  <div class="info-item" style="grid-column: 1 / -1;">
                    <div class="label">审核备注</div>
                    <div class="value">${escapeHtml(req.admin_note)}</div>
                  </div>
                ` : ''}
              </div>

              ${req.status === 'pending' ? `
                <div id="noteArea${req.id}" style="display: none;">
                  <textarea id="note${req.id}" placeholder="请输入审核备注（可选）"></textarea>
                </div>
                <div class="actions">
                  <button class="btn btn-success" onclick="approveWithdrawal(${req.id})">
                    ✅ 通过
                  </button>
                  <button class="btn btn-danger" onclick="showRejectNote(${req.id})">
                    ❌ 拒绝
                  </button>
                  <button class="btn" style="background: #95a5a6; color: white;" onclick="viewUserEarnings(${req.user_id})">
                    📊 查看用户收益
                  </button>
                </div>
              ` : ''}
            </div>
          `;
        }).join('');
      } catch (e) {
        queueDiv.innerHTML = `<p style="color: red;">加载失败: ${e.message}</p>`;
      }
    }

    // 显示拒绝备注输入框
    function showRejectNote(requestId) {
      const noteArea = document.getElementById(`noteArea${requestId}`);
      const currentDisplay = noteArea.style.display;
      
      if (currentDisplay === 'none') {
        noteArea.style.display = 'block';
        // 修改按钮文字
        event.target.textContent = '❌ 确认拒绝';
        event.target.onclick = () => rejectWithdrawal(requestId);
      }
    }

    // 通过提现
    async function approveWithdrawal(requestId) {
      const doApprove = async () => {
        try {
          const token = localStorage.getItem('token') || sessionStorage.getItem('token');
          
          const response = await fetch(`${API_BASE}/withdrawals/admin/${requestId}/review`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              approved: true,
              note: document.getElementById(`note${requestId}`)?.value || ''
            })
          });

          const data = await response.json();
          
          if (response.ok) {
            window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
            loadWithdrawalQueue();
            loadStats();
          } else {
            window.toast ? toast.error(data.error || '审核失败') : alert('❌ ' + (data.error || '审核失败'));
          }
        } catch (e) {
          window.toast ? toast.error('操作失败: ' + e.message) : alert('操作失败: ' + e.message);
        }
      };

      if (window.showConfirm) {
        showConfirm('确定要通过这个提现申请吗？', doApprove, { title: '通过提现', confirmText: '确认通过' });
      } else if (confirm('确定要通过这个提现申请吗？')) {
        await doApprove();
      }
    }

    // 拒绝提现
    async function rejectWithdrawal(requestId) {
      const note = document.getElementById(`note${requestId}`).value.trim();
      
      if (!note) {
        window.toast ? toast.warning('拒绝提现时必须填写备注说明原因') : alert('拒绝提现时必须填写备注说明原因');
        return;
      }

      const doReject = async () => {
        try {
          const token = localStorage.getItem('token') || sessionStorage.getItem('token');
          
          const response = await fetch(`${API_BASE}/withdrawals/admin/${requestId}/review`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              approved: false,
              note: note
            })
          });

          const data = await response.json();
          
          if (response.ok) {
            window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
            loadWithdrawalQueue();
            loadStats();
          } else {
            window.toast ? toast.error(data.error || '审核失败') : alert('❌ ' + (data.error || '审核失败'));
          }
        } catch (e) {
          window.toast ? toast.error('操作失败: ' + e.message) : alert('操作失败: ' + e.message);
        }
      };

      if (window.showDangerConfirm) {
        showDangerConfirm('确定要拒绝这个提现申请吗？金额将退回到用户的收益余额。', doReject, { title: '拒绝提现', confirmText: '确认拒绝' });
      } else if (confirm('确定要拒绝这个提现申请吗？金额将退回到用户的收益余额。')) {
        await doReject();
      }
    }

    // 查看用户收益详情
    async function viewUserEarnings(userId) {
      try {
        const token = localStorage.getItem('token') || sessionStorage.getItem('token');
        
        const response = await fetch(`${API_BASE}/withdrawals/admin/user-earnings/${userId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) throw new Error('加载用户收益失败');

        const data = await response.json();
        
        let infoHtml = `<div style="line-height:2;">
          <div><strong>用户：</strong>${data.user.username}</div>
          <div><strong>收益余额：</strong>${data.earningsBalance} 积分</div>
          <div><strong>总收益：</strong>${data.totalEarnings} 积分</div>
          <div><strong>已提现：</strong>${data.withdrawnAmount} 积分</div>
          <div><strong>待审核：</strong>${data.pendingAmount} 积分</div>
          <div><strong>解锁次数：</strong>${data.unlockCount} 次</div>`;
        
        if (data.recentUnlocks && data.recentUnlocks.length > 0) {
          infoHtml += `<hr style="margin:10px 0;"><strong>最近解锁记录：</strong><div style="max-height:200px;overflow-y:auto;margin-top:6px;">`;
          data.recentUnlocks.forEach((unlock, idx) => {
            infoHtml += `<div style="padding:4px 0;border-bottom:1px solid #eee;font-size:13px;">`;
            infoHtml += `${idx + 1}. ${unlock.node.title} — ${unlock.unlock_price}积分<br>`;
            infoHtml += `&nbsp;&nbsp;解锁人：${unlock.user.username}，${new Date(unlock.unlocked_at).toLocaleString('zh-CN')}`;
            infoHtml += `</div>`;
          });
          infoHtml += `</div>`;
        }
        infoHtml += `</div>`;

        if (window.showModal) {
          showModal({ title: '用户收益详情', content: infoHtml, showCancel: false, confirmText: '关闭' });
        } else {
          let infoText = `用户收益详情\n\n用户：${data.user.username}\n收益余额：${data.earningsBalance} 积分\n总收益：${data.totalEarnings} 积分\n已提现：${data.withdrawnAmount} 积分\n待审核：${data.pendingAmount} 积分\n解锁次数：${data.unlockCount} 次`;
          window.toast ? toast.info('用户收益详情已打印到控制台') : console.log(infoText);
        }
      } catch (e) {
        window.toast ? toast.error('加载用户收益失败: ' + e.message) : alert('加载用户收益失败: ' + e.message);
      }
    }

// HTML 转义函数
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ========== 会员管理功能 ==========

    // 加载会员统计
    async function loadMembershipStats() {
      try {
        const token = localStorage.getItem('token') || sessionStorage.getItem('token');
        
        const response = await fetch(`${API_BASE}/admin/membership/stats`, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (!response.ok) {
          throw new Error('加载会员统计失败');
        }

        const stats = await response.json();
        
        const membershipStatsDiv = document.getElementById('membershipStats');
        membershipStatsDiv.innerHTML = `
          <div class="stat-card">
            <div class="label">总会员数</div>
            <div class="value" style="color: var(--st-primary-500);">${stats.totalMembers}</div>
          </div>
          <div class="stat-card">
            <div class="label">今日新增</div>
            <div class="value" style="color: #27ae60;">${stats.newMembersToday}</div>
          </div>
          <div class="stat-card">
            <div class="label">本月新增</div>
            <div class="value" style="color: #3498db;">${stats.newMembersThisMonth}</div>
          </div>
          <div class="stat-card">
            <div class="label">即将到期</div>
            <div class="value" style="color: #f39c12;">${stats.expiringMembers}</div>
          </div>
          <div class="stat-card">
            <div class="label">活跃会员</div>
            <div class="value" style="color: #e74c3c;">${stats.activeMembers}</div>
          </div>
          <div class="stat-card">
            <div class="label">自动续费</div>
            <div class="value" style="color: #9b59b6;">${stats.autoRenewCount}</div>
          </div>
          <div class="stat-card">
            <div class="label">本月收入</div>
            <div class="value" style="color: #1abc9c;">¥${stats.revenue.toFixed(2)}</div>
          </div>
        `;
      } catch (e) {
        console.error('Failed to load membership stats:', e);
      }
    }

    // 加载会员列表
    async function loadMembers() {
      const membersDiv = document.getElementById('membersList');
      membersDiv.innerHTML = '<div class="loading"></div>';

      try {
        const token = localStorage.getItem('token') || sessionStorage.getItem('token');
        const tier = document.getElementById('tierFilter').value;
        const search = document.getElementById('searchInput').value;
        
        let url = `${API_BASE}/admin/membership/members?page=1&limit=20`;
        if (tier !== 'all') url += `&tier=${tier}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;

        const response = await fetch(url, {
          headers: {
            'Authorization': `Bearer ${token}`
          }
        });

        if (!response.ok) {
          throw new Error('加载会员列表失败');
        }

        const data = await response.json();
        const members = data.members || [];
        
        if (members.length === 0) {
          membersDiv.innerHTML = '<div class="empty">暂无会员数据</div>';
          return;
        }

        const tierNames = {
          trial: '体验会员',
          monthly: '月度会员',
          quarterly: '季度会员',
          yearly: '年度会员',
          enterprise: '企业版'
        };

        membersDiv.innerHTML = members.map(member => `
          <div class="review-item">
            <div class="header">
              <div>
                <h3>${escapeHtml(member.username)}</h3>
                <div class="meta">
                  邮箱：${escapeHtml(member.email)} | 
                  加入时间：${new Date(member.created_at).toLocaleString('zh-CN')}
                </div>
              </div>
              <span class="status ${getBadgeClass(member.membership_tier)}">
                ${tierNames[member.membership_tier] || member.membership_tier}
              </span>
            </div>
            <div class="info" style="grid-template-columns: repeat(3, 1fr);">
              <div class="info-item">
                <div class="label">到期时间</div>
                <div class="value">${member.membership_expires_at ? new Date(member.membership_expires_at).toLocaleDateString('zh-CN') : '-'}</div>
              </div>
              <div class="info-item">
                <div class="label">自动续费</div>
                <div class="value">${member.auto_renew ? '✓ 已开启' : '✗ 未开启'}</div>
              </div>
              <div class="info-item">
                <div class="label">操作</div>
                <div class="value">
                  <button class="btn" style="padding: 4px 8px; font-size: 12px; background: #3498db; color: white;" onclick="viewMemberDetail(${member.id})">
                    查看详情
                  </button>
                </div>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        membersDiv.innerHTML = `<p style="color: red;">加载失败：${e.message}</p>`;
      }
    }

    // 获取会员徽章样式
    function getBadgeClass(tier) {
      const classes = {
        free: 'badge-free',
        trial: 'badge-trial',
        monthly: 'badge-monthly',
        quarterly: 'badge-quarterly',
        yearly: 'badge-yearly',
        enterprise: 'badge-enterprise'
      };
      return classes[tier] || 'badge-free';
    }

    // 查看会员详情
    function viewMemberDetail(memberId) {
      window.toast ? toast.info('会员详情功能开发中，会员 ID: ' + memberId) : alert('会员详情功能开发中...\n会员 ID: ' + memberId);
    }

    // 启动
    document.addEventListener('DOMContentLoaded', init);
  </script>
    <script src="js/loading.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/navbar.js"></script>
