<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>StoryTree - 管理后台</title>
  <link rel="stylesheet" href="styles/design-system.css">
  <link rel="stylesheet" href="styles/animations.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/utilities.css">
    <link rel="stylesheet" href="styles/responsive.css">
  <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--st-font-sans); background: var(--st-bg-secondary); }

    .navbar {
      background: var(--st-gray-900, #111827);
      color: white;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .nav-brand { font-size: 20px; font-weight: bold; }

    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: var(--st-bg-primary, #fff);
      border-radius: var(--st-radius-lg, 8px);
      padding: 20px;
      box-shadow: var(--st-shadow-sm, 0 2px 8px rgba(0,0,0,0.08));
    }
    .stat-card .label { color: var(--st-text-secondary, #6B7280); font-size: var(--st-text-sm, 14px); margin-bottom: 8px; }
    .stat-card .value { font-size: 32px; font-weight: var(--st-font-bold, 700); color: var(--st-text-primary, #111827); }

    .review-item {
      background: var(--st-bg-primary, #fff);
      border-radius: var(--st-radius-xl, 12px);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--st-shadow-sm, 0 2px 8px rgba(0,0,0,0.08));
    }
    .review-item .header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; }
    .review-item h3 { color: var(--st-text-primary, #111827); margin-bottom: 8px; }
    .review-item .meta { color: var(--st-text-secondary, #6B7280); font-size: var(--st-text-sm, 14px); margin-bottom: 12px; }
    .review-item .content {
      background: var(--st-bg-secondary, #F9FAFB);
      padding: 16px;
      border-radius: var(--st-radius-lg, 8px);
      line-height: 1.6;
      margin-bottom: 16px;
      max-height: 200px;
      overflow-y: auto;
    }
    .review-item .reports { color: var(--st-error-500, #EF4444); font-size: var(--st-text-sm, 14px); margin-bottom: 12px; }
    .review-item .actions { display: flex; gap: 10px; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--st-radius-md, 6px);
      cursor: pointer;
      font-size: var(--st-text-sm, 14px);
      transition: all var(--st-duration-fast, 0.15s);
    }
    .btn-success { background: var(--st-success-500, #22C55E); color: white; }
    .btn-success:hover { background: var(--st-success-600, #16A34A); }
    .btn-danger { background: var(--st-error-500, #EF4444); color: white; }
    .btn-danger:hover { background: var(--st-error-600, #DC2626); }
    .btn-warning { background: var(--st-warning-500, #F59E0B); color: white; }
    .btn-warning:hover { background: var(--st-warning-600, #D97706); }

    .loading {
      text-align: center;
      padding: 40px;
    }
    .loading:after {
      content: '';
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid var(--st-gray-100, #F3F4F6);
      border-top: 3px solid var(--st-primary-500, #6366F1);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .empty { text-align: center; padding: 60px; color: var(--st-text-tertiary, #9CA3AF); }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--st-gray-200, #E5E7EB);
    }
    .tab {
      padding: 12px 24px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: var(--st-text-base, 16px);
      font-weight: var(--st-font-semibold, 600);
      color: var(--st-text-secondary, #6B7280);
      transition: all var(--st-duration-normal, 0.2s);
    }
    .tab:hover { color: var(--st-text-primary, #111827); }
    .tab.active {
      color: var(--st-text-primary, #111827);
      border-bottom-color: var(--st-primary-500, #6366F1);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .withdrawal-item {
      background: var(--st-bg-primary, #fff);
      border-radius: var(--st-radius-xl, 12px);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--st-shadow-sm, 0 2px 8px rgba(0,0,0,0.08));
    }
    .withdrawal-item .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .withdrawal-item .amount {
      font-size: 28px;
      font-weight: 700;
      color: var(--st-success-600, #16A34A);
    }
    .withdrawal-item .status {
      padding: 6px 12px;
      border-radius: var(--st-radius-full, 20px);
      font-size: 13px;
      font-weight: 600;
    }
    .withdrawal-item .status.pending { background: var(--st-warning-50, #FFFBEB); color: var(--st-warning-700, #B45309); }
    .withdrawal-item .status.approved { background: var(--st-success-50, #F0FDF4); color: var(--st-success-700, #15803D); }
    .withdrawal-item .status.rejected { background: var(--st-error-50, #FEF2F2); color: var(--st-error-700, #B91C1C); }
    .withdrawal-item .info {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
      padding: 16px;
      background: var(--st-bg-secondary, #F9FAFB);
      border-radius: var(--st-radius-lg, 8px);
    }
    .withdrawal-item .info-item {
      display: flex;
      flex-direction: column;
    }
    .withdrawal-item .info-item .label {
      color: var(--st-text-secondary, #6B7280);
      font-size: 13px;
      margin-bottom: 4px;
    }
    .withdrawal-item .info-item .value {
      color: var(--st-text-primary, #111827);
      font-weight: 600;
    }
    .withdrawal-item .actions {
      display: flex;
      gap: 10px;
    }
    .withdrawal-item textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid var(--st-gray-200, #E5E7EB);
      border-radius: var(--st-radius-md, 6px);
      font-size: var(--st-text-sm, 14px);
      margin-bottom: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
    }

    .badge-free { background: var(--st-gray-200, #E5E7EB); color: var(--st-text-secondary, #6B7280); }
    .badge-trial { background: #ffecd2; color: #d4a574; }
    .badge-monthly { background: #d5e1df; color: #2d5d5a; }
    .badge-quarterly { background: #a8d5ba; color: #1e5c3a; }
    .badge-yearly { background: #ffd700; color: #8b6900; }
    .badge-enterprise { background: #b9f2ff; color: #006a7f; }

    /* 子选项卡（内容管理内部切换） */
    .tab-inner {
      padding: 6px 16px;
      background: none;
      border: 1px solid var(--st-gray-300, #D1D5DB);
      border-radius: var(--st-radius-md, 6px);
      cursor: pointer;
      font-size: var(--st-text-sm, 14px);
      color: var(--st-text-secondary, #6B7280);
      transition: all 0.15s;
    }
    .tab-inner:hover { background: var(--st-gray-100, #F3F4F6); }
    .tab-inner.active {
      background: var(--st-primary-500, #6366F1);
      color: white;
      border-color: var(--st-primary-500, #6366F1);
    }

    /* 表格样式 */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .data-table th {
      text-align: left;
      padding: 10px 12px;
      background: var(--st-gray-50, #F9FAFB);
      border-bottom: 2px solid var(--st-gray-200, #E5E7EB);
      color: var(--st-text-secondary, #6B7280);
      font-weight: 600;
      white-space: nowrap;
    }
    .data-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--st-gray-100, #F3F4F6);
      color: var(--st-text-primary, #111827);
    }
    .data-table tr:hover td { background: var(--st-gray-50, #F9FAFB); }

    /* 简易趋势表格 */
    .trend-table td:nth-child(2), .trend-table td:nth-child(3) { text-align: right; font-variant-numeric: tabular-nums; }

    /* 小标签 */
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .tag-active { background: #d1fae5; color: #065f46; }
    .tag-inactive { background: #fee2e2; color: #991b1b; }
    .tag-admin { background: #ede9fe; color: #5b21b6; }
    .tag-user { background: #e0f2fe; color: #075985; }

    /* === 响应式适配 === */
    @media (max-width: 768px) {
      .container {
        padding: 16px 12px;
      }
      .stats {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      .tabs {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        flex-wrap: nowrap;
        gap: 4px;
        padding-bottom: 2px;
      }
      .tabs::-webkit-scrollbar { display: none; }
      .tab {
        padding: 10px 14px;
        font-size: 14px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .data-table {
        display: block;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        white-space: nowrap;
      }
      .review-item .header {
        flex-direction: column;
        gap: 8px;
      }
      .review-item .actions {
        flex-wrap: wrap;
      }
      .withdrawal-item .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .withdrawal-item .info {
        grid-template-columns: 1fr;
      }
      .withdrawal-item .amount {
        font-size: 22px;
      }
    }

    @media (max-width: 480px) {
      .navbar {
        padding: 0 12px;
        height: 52px;
        font-size: 14px;
      }
      .nav-brand {
        font-size: 16px;
      }
      .container {
        padding: 12px 8px;
      }
      .stats {
        grid-template-columns: 1fr;
      }
      .stat-card {
        padding: 14px;
      }
      .stat-card .value {
        font-size: 24px;
      }
      .tab {
        padding: 8px 12px;
        font-size: 13px;
      }
      .review-item {
        padding: 14px;
      }
      .review-item .content {
        padding: 12px;
        max-height: 150px;
      }
      .btn {
        padding: 10px 14px;
        min-height: 40px;
      }
      .withdrawal-item {
        padding: 14px;
      }
    }

    /* 暗黑模式适配 */
    @media (prefers-color-scheme: dark) {
      /* 会员等级徽章 - 暗色背景版本 */
      .badge-trial { background: rgba(255, 236, 210, 0.15); color: #f0c89a; }
      .badge-monthly { background: rgba(213, 225, 223, 0.15); color: #7fbfb9; }
      .badge-quarterly { background: rgba(168, 213, 186, 0.15); color: #6fd9a0; }
      .badge-yearly { background: rgba(255, 215, 0, 0.15); color: #ffd700; }
      .badge-enterprise { background: rgba(185, 242, 255, 0.15); color: #7dd8ec; }

      /* 状态标签 - 暗色背景版本 */
      .tag-active { background: rgba(209, 250, 229, 0.12); color: #6ee7b7; }
      .tag-inactive { background: rgba(254, 226, 226, 0.12); color: #fca5a5; }
      .tag-admin { background: rgba(237, 233, 254, 0.12); color: #c4b5fd; }
      .tag-user { background: rgba(224, 242, 254, 0.12); color: #7dd3fc; }

      /* footer */
      footer[style*="color: #6b7280"] {
        color: var(--st-text-tertiary) !important;
        border-top-color: var(--st-gray-300) !important;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🛡️ StoryTree 管理后台</div>
    <div>
      <span id="adminName">管理员</span>
      <button class="btn" style="margin-left: 16px; background: rgba(255,255,255,0.2);" onclick="location.href='index.html'">返回前台</button>
    </div>
  </nav>

  <div class="container">
    <h2 style="margin-bottom: 20px;">📊 审核统计</h2>
    <div class="stats" id="stats"></div>

    <!-- 选项卡导航 -->
    <div class="tabs" style="flex-wrap: wrap;">
      <button class="tab active" onclick="switchTab('content')">📝 内容审核</button>
      <button class="tab" onclick="switchTab('withdrawal')">💰 提现审核</button>
      <button class="tab" onclick="switchTab('membership')">👑 会员管理</button>
      <button class="tab" onclick="switchTab('users')">👥 用户管理</button>
      <button class="tab" onclick="switchTab('contentMgmt')">📚 内容管理</button>
      <button class="tab" onclick="switchTab('points')">💎 积分管理</button>
      <button class="tab" onclick="switchTab('dashboard')">📊 数据仪表盘</button>
      <button class="tab" onclick="switchTab('invitations')">🎫 邀请码管理</button>
    </div>

    <!-- 内容审核 -->
    <div id="contentTab" class="tab-content active">
      <h2 style="margin-bottom: 20px;">📝 待审核内容</h2>
      <div id="reviewQueue"></div>
    </div>

    <!-- 提现审核 -->
    <div id="withdrawalTab" class="tab-content">
      <h2 style="margin-bottom: 20px;">💰 提现审核</h2>
      <div id="withdrawalQueue"></div>
    </div>

    <!-- 会员管理 -->
    <div id="membershipTab" class="tab-content">
      <h2 style="margin-bottom: 20px;">👑 会员统计</h2>
      <div class="stats" id="membershipStats" style="margin-bottom: 30px;"></div>
      
      <h3 style="margin-bottom: 15px;">📊 会员列表</h3>
      <div style="margin-bottom: 15px; display: flex; gap: 10px;">
        <select id="tierFilter" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
          <option value="all">全部等级</option>
          <option value="trial">体验会员</option>
          <option value="monthly">月度会员</option>
          <option value="quarterly">季度会员</option>
          <option value="yearly">年度会员</option>
          <option value="enterprise">企业版</option>
        </select>
        <input type="text" id="searchInput" placeholder="搜索用户名或邮箱" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; flex: 1;">
        <button class="btn btn-success" onclick="loadMembers()">🔍 搜索</button>
      </div>
      <div id="membersList"></div>
    </div>

    <!-- 用户管理 -->
    <div id="usersTab" class="tab-content">
      <h2 style="margin-bottom: 20px;">👥 用户管理</h2>
      
      <!-- 搜索和筛选 -->
      <div style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
        <input type="text" id="userSearchInput" placeholder="搜索用户名、邮箱或微信昵称" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; flex: 1; min-width: 200px;">
        <select id="userRoleFilter" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
          <option value="all">全部用户</option>
          <option value="admin">管理员</option>
          <option value="user">普通用户</option>
        </select>
        <select id="userSortBy" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
          <option value="created_at">注册时间</option>
          <option value="points">积分</option>
          <option value="level">等级</option>
          <option value="word_count">字数</option>
        </select>
        <button class="btn btn-success" onclick="loadUsers()">🔍 搜索</button>
      </div>
      
      <!-- 用户统计 -->
      <div class="stats" id="userStats" style="margin-bottom: 20px;"></div>
      
      <!-- 用户列表 -->
      <div id="usersList"></div>
      
      <!-- 分页 -->
      <div id="usersPagination" style="margin-top: 20px; text-align: center;"></div>
    </div>

    <!-- 内容管理 -->
    <div id="contentMgmtTab" class="tab-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0;">📚 内容管理</h2>
        <div style="display: flex; gap: 10px;">
          <button class="tab-inner active" onclick="switchContentSubTab('stories')">故事管理</button>
          <button class="tab-inner" onclick="switchContentSubTab('comments')">评论管理</button>
        </div>
      </div>

      <!-- 故事管理 -->
      <div id="storiesSubTab">
        <div style="margin-bottom: 15px; display: flex; gap: 10px;">
          <input type="text" id="storySearchInput" placeholder="搜索故事标题或简介" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; flex: 1;">
          <select id="storyVisibilityFilter" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
            <option value="">全部可见性</option>
            <option value="public">公开</option>
            <option value="private">私密</option>
            <option value="password">密码保护</option>
          </select>
          <button class="btn btn-success" onclick="loadStories()">🔍 搜索</button>
        </div>
        <div id="storiesList"></div>
        <div id="storiesPagination" style="margin-top: 20px; text-align: center;"></div>
      </div>

      <!-- 评论管理 -->
      <div id="commentsSubTab" style="display: none;">
        <div style="margin-bottom: 15px; display: flex; gap: 10px;">
          <input type="text" id="commentSearchInput" placeholder="搜索评论内容" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; flex: 1;">
          <select id="commentDeletedFilter" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
            <option value="">全部评论</option>
            <option value="false">未删除</option>
            <option value="true">已删除</option>
          </select>
          <button class="btn btn-success" onclick="loadComments()">🔍 搜索</button>
        </div>
        <div id="commentsList"></div>
        <div id="commentsPagination" style="margin-top: 20px; text-align: center;"></div>
      </div>
    </div>

    <!-- 积分管理 -->
    <div id="pointsTab" class="tab-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="margin: 0;">💎 积分管理</h2>
      </div>

      <!-- 积分调整 -->
      <div class="review-item" style="margin-bottom: 20px;">
        <h3 style="margin-bottom: 15px;">手动调整积分</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <div>
            <label style="display: block; margin-bottom: 4px; font-size: 14px; color: var(--st-text-secondary);">用户 ID</label>
            <input type="number" id="pointsUserId" placeholder="输入用户 ID" style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd;">
          </div>
          <div>
            <label style="display: block; margin-bottom: 4px; font-size: 14px; color: var(--st-text-secondary);">调整数量（正数增加，负数扣除）</label>
            <input type="number" id="pointsAmount" placeholder="如：100 或 -50" style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd;">
          </div>
          <div style="grid-column: 1 / -1;">
            <label style="display: block; margin-bottom: 4px; font-size: 14px; color: var(--st-text-secondary);">调整原因</label>
            <input type="text" id="pointsReason" placeholder="请填写调整原因" style="width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd;">
          </div>
        </div>
        <div style="margin-top: 12px;">
          <button class="btn btn-success" onclick="adjustPoints()">✅ 执行调整</button>
        </div>
      </div>

      <!-- 积分交易记录 -->
      <h3 style="margin-bottom: 15px;">积分交易记录</h3>
      <div style="margin-bottom: 15px; display: flex; gap: 10px;">
        <input type="number" id="pointsTxUserId" placeholder="按用户 ID 筛选" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; width: 150px;">
        <select id="pointsTxType" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
          <option value="">全部类型</option>
          <option value="admin_add">管理员增加</option>
          <option value="admin_deduct">管理员扣除</option>
          <option value="ai_usage">AI 使用</option>
          <option value="checkin">签到</option>
          <option value="invite_reward">邀请奖励</option>
          <option value="content_reward">创作奖励</option>
        </select>
        <button class="btn btn-success" onclick="loadPointTransactions()">🔍 查询</button>
      </div>
      <div id="pointsTransactionsList"></div>
      <div id="pointsTransactionsPagination" style="margin-top: 20px; text-align: center;"></div>
    </div>

    <!-- 数据仪表盘 -->
    <div id="dashboardTab" class="tab-content">
      <h2 style="margin-bottom: 20px;">📊 数据仪表盘</h2>

      <!-- 总览数据 -->
      <div class="stats" id="dashboardOverview" style="margin-bottom: 30px;"></div>

      <!-- 用户增长趋势 -->
      <div class="review-item" style="margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">

  <script>
    const API_BASE = '/api';
    let adminToken = null;

    // 获取存储的 token
    function getToken() {
      return adminToken || localStorage.getItem('token') || sessionStorage.getItem('token');
    }

    // API 调用（统一使用 JWT Token 鉴权）
    async function apiRequest(method, path, body) {
      const token = getToken();
      const options = {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        }
      };
      if (body) {
        options.body = JSON.stringify(body);
      }
      const res = await fetch(`${API_BASE}${path}`, options);
      if (!res.ok) {
        if (res.status === 401) {
          // Token 失效，跳转登录
          localStorage.removeItem('token');
          sessionStorage.removeItem('token');
          location.href = 'login.html?redirect=admin.html';
          return;
        }
        const err = await res.json();
        throw new Error(err.error || '请求失败');
      }
      return res.json();
    }

    // 初始化：验证 JWT Token 中的管理员身份
    async function init() {
      const token = getToken();
      if (!token) {
        location.href = 'login.html?redirect=admin.html';
        return;
      }

      try {
        // 调用 /auth/me 验证身份
        const res = await fetch(`${API_BASE}/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) {
          // Token 无效或过期
          localStorage.removeItem('token');
          sessionStorage.removeItem('token');
          location.href = 'login.html?redirect=admin.html';
          return;
        }

        const data = await res.json();
        const user = data.user;

        if (!user.isAdmin) {
          alert('当前账号没有管理员权限，请使用管理员账号登录');
          location.href = 'index.html';
          return;
        }

        adminToken = token;
        document.getElementById('adminName').textContent = user.username;

        // 加载数据
        loadStats();
        loadReviewQueue();
        loadWithdrawalQueue();
      } catch (e) {
        console.error('验证管理员身份失败:', e);
        location.href = 'login.html?redirect=admin.html';
      }
    }

    // 加载统计数据
    async function loadStats() {
      try {
        // 加载内容审核统计
        const reviewRes = await apiRequest('GET', '/admin/review-queue');
        const reviewStats = reviewRes.stats;

        // 加载提现统计
        let withdrawalStats = { pending: 0, approved: 0, rejected: 0, totalAmount: 0 };
        try {
          const wsRes = await apiRequest('GET', '/withdrawals/admin/stats');
          if (wsRes) withdrawalStats = wsRes;
        } catch (e) {
          console.error('Failed to load withdrawal stats:', e);
        }

        document.getElementById('stats').innerHTML = `
          <div class="stat-card">
            <div class="label">待审核内容</div>
            <div class="value">${reviewStats.pendingCount}</div>
          </div>
          <div class="stat-card">
            <div class="label">待审核提现</div>
            <div class="value" style="color: var(--st-warning-500, #F59E0B);">${withdrawalStats.pending || 0}</div>
          </div>
          <div class="stat-card">
            <div class="label">已通过提现</div>
            <div class="value" style="color: var(--st-success-600, #16A34A);">${withdrawalStats.approved || 0}</div>
          </div>
          <div class="stat-card">
            <div class="label">提现总额</div>
            <div class="value" style="color: var(--st-primary-500, #6366F1);">${withdrawalStats.totalAmount || 0}</div>
          </div>
        `;
      } catch (e) {
        console.error('Failed to load stats:', e);
      }
    }

    // 加载审核队列
    async function loadReviewQueue() {
      const queueDiv = document.getElementById('reviewQueue');
      queueDiv.innerHTML = '<div class="loading"></div>';

      try {
        const res = await apiRequest('GET', '/admin/review-queue');
        
        // 合并待审核节点和被举报节点（去重）
        const pendingNodes = res.pending || [];
        const reportedNodes = res.reported || [];
        const seenIds = new Set(pendingNodes.map(n => n.id));
        const allItems = [...pendingNodes];
        reportedNodes.forEach(n => {
          if (!seenIds.has(n.id)) allItems.push(n);
        });

        if (allItems.length === 0) {
          queueDiv.innerHTML = '<div class="empty">暂无待审核内容</div>';
          return;
        }

        queueDiv.innerHTML = allItems.map(item => `
          <div class="review-item">
            <div class="header">
              <div>
                <h3>${item.title}</h3>
                <div class="meta">
                  作者：${item.author.username} | 
                  故事：${item.story ? item.story.title : '-'} |
                  创建时间：${new Date(item.created_at).toLocaleString('zh-CN')}
                </div>
                ${item.report_count > 0 ? `<div class="reports">⚠️ 被举报 ${item.report_count} 次</div>` : ''}
              </div>
            </div>
            <div class="content">${item.content ? item.content.substring(0, 200) + (item.content.length > 200 ? '...' : '') : '（无内容）'}</div>
            <div class="actions">
              <button class="btn btn-success" onclick="handleReview(${item.id}, 'approve')">✅ 通过</button>
              <button class="btn btn-danger" onclick="handleReview(${item.id}, 'reject')">❌ 驳回</button>
              <button class="btn btn-warning" onclick="handleReview(${item.id}, 'hide')">🚫 下架</button>
              ${item.report_count > 0 ? `<button class="btn" style="background: var(--st-gray-400, #9CA3AF); color: white;" onclick="viewReports(${item.id})">查看举报</button>` : ''}
            </div>
          </div>
        `).join('');
      } catch (e) {
        queueDiv.innerHTML = `<p style="color: red;">加载失败: ${e.message}</p>`;
      }
    }

    // 审核操作
    async function handleReview(nodeId, action) {
      const note = prompt(`请输入审核备注（可选）：`);
      
      try {
        await apiRequest('POST', '/admin/review', {
          nodeId,
          action,
          note
        });
        window.toast ? toast.success('审核成功') : console.log('审核成功');
        loadStats();
        loadReviewQueue();
      } catch (e) {
        window.toast ? toast.error('审核失败: ' + e.message) : console.error('审核失败: ' + e.message);
      }
    }

    // 查看举报
    async function viewReports(nodeId) {
      try {
        const res = await apiRequest('GET', `/admin/reports/${nodeId}`);
        
        let reportHtml = '<div style="max-height:400px;overflow-y:auto;">';
        res.reports.forEach((report, idx) => {
          reportHtml += `<div style="padding:10px 0;border-bottom:1px solid #eee;">`;
          reportHtml += `<strong>${idx + 1}. ${report.reporter.username}</strong><br>`;
          reportHtml += `原因：${report.reason}<br>`;
          if (report.description) reportHtml += `说明：${report.description}<br>`;
          reportHtml += `时间：${new Date(report.createdAt).toLocaleString('zh-CN')}`;
          reportHtml += `</div>`;
        });
        reportHtml += '</div>';

        if (window.showModal) {
          showModal({ title: '举报详情', content: reportHtml, showCancel: false, confirmText: '关闭' });
        } else {
          let reportText = `举报详情：\n\n`;
          res.reports.forEach((report, idx) => {
            reportText += `${idx + 1}. ${report.reporter.username}\n`;
            reportText += `   原因：${report.reason}\n`;
            if (report.description) reportText += `   说明：${report.description}\n`;
            reportText += `   时间：${new Date(report.createdAt).toLocaleString('zh-CN')}\n\n`;
          });
          window.toast ? toast.info('举报详情已打印到控制台') : console.log(reportText);
        }
      } catch (e) {
        window.toast ? toast.error('加载举报详情失败: ' + e.message) : alert('加载举报详情失败: ' + e.message);
      }
    }

    // ========== 提现审核系统 ==========

    // 切换选项卡
    function switchTab(tab) {
      // 更新选项卡样式
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');

      // 显示对应内容
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      const tabMap = {
        content: 'contentTab',
        withdrawal: 'withdrawalTab',
        membership: 'membershipTab',
        users: 'usersTab',
        contentMgmt: 'contentMgmtTab',
        points: 'pointsTab',
        dashboard: 'dashboardTab',
        invitations: 'invitationsTab'
      };
      const targetTab = document.getElementById(tabMap[tab]);
      if (targetTab) targetTab.classList.add('active');

      // 懒加载：首次切换到该选项卡时加载数据
      if (tab === 'membership') {
        loadMembershipStats();
        loadMembers();
      } else if (tab === 'users') {
        loadUsers();
      } else if (tab === 'contentMgmt') {
        loadStories();
      } else if (tab === 'points') {
        loadPointTransactions();
      } else if (tab === 'dashboard') {
        loadDashboardOverview();
        loadUserGrowth();
        loadContentStats();
        loadActiveUsers();
      } else if (tab === 'invitations') {
        loadInvitationStats();
        loadInviteCodes();
      }
    }

    // 加载提现审核队列
    async function loadWithdrawalQueue() {
      const queueDiv = document.getElementById('withdrawalQueue');
      queueDiv.innerHTML = '<div class="loading"></div>';

      try {
        const data = await apiRequest('GET', '/withdrawals/admin/requests');
        const requests = data.requests || [];
        
        if (requests.length === 0) {
          queueDiv.innerHTML = '<div class="empty">暂无提现申请</div>';
          return;
        }

        const statusMap = {
          pending: { text: '待审核', class: 'pending' },
          approved: { text: '已通过', class: 'approved' },
          rejected: { text: '已拒绝', class: 'rejected' }
        };

        queueDiv.innerHTML = requests.map(req => {
          const status = statusMap[req.status] || { text: req.status, class: '' };
          return `
            <div class="withdrawal-item">
              <div class="header">
                <div class="amount">${req.amount} 积分</div>
                <span class="status ${status.class}">${status.text}</span>
              </div>
              
              <div class="info">
                <div class="info-item">
                  <div class="label">申请用户</div>
                  <div class="value">${escapeHtml(req.user.username)}</div>
                </div>
                <div class="info-item">
                  <div class="label">提现方式</div>
                  <div class="value">${escapeHtml(req.payment_method)}</div>
                </div>
                <div class="info-item">
                  <div class="label">提现账号</div>
                  <div class="value">${escapeHtml(req.payment_account)}</div>
                </div>
                <div class="info-item">
                  <div class="label">申请时间</div>
                  <div class="value">${new Date(req.created_at).toLocaleString('zh-CN')}</div>
                </div>
                ${req.processed_at ? `
                  <div class="info-item">
                    <div class="label">处理时间</div>
                    <div class="value">${new Date(req.processed_at).toLocaleString('zh-CN')}</div>
                  </div>
                ` : ''}
                ${req.admin_note ? `
                  <div class="info-item" style="grid-column: 1 / -1;">
                    <div class="label">审核备注</div>
                    <div class="value">${escapeHtml(req.admin_note)}</div>
                  </div>
                ` : ''}
              </div>

              ${req.status === 'pending' ? `
                <div id="noteArea${req.id}" style="display: none;">
                  <textarea id="note${req.id}" placeholder="请输入审核备注（可选）"></textarea>
                </div>
                <div class="actions">
                  <button class="btn btn-success" onclick="approveWithdrawal(${req.id})">
                    ✅ 通过
                  </button>
                  <button class="btn btn-danger" onclick="showRejectNote(${req.id})">
                    ❌ 拒绝
                  </button>
                  <button class="btn" style="background: var(--st-gray-400, #9CA3AF); color: white;" onclick="viewUserEarnings(${req.user_id})">
                    📊 查看用户收益
                  </button>
                </div>
              ` : ''}
            </div>
          `;
        }).join('');
      } catch (e) {
        queueDiv.innerHTML = `<p style="color: red;">加载失败: ${e.message}</p>`;
      }
    }

    // 显示拒绝备注输入框
    function showRejectNote(requestId) {
      const noteArea = document.getElementById(`noteArea${requestId}`);
      const currentDisplay = noteArea.style.display;
      
      if (currentDisplay === 'none') {
        noteArea.style.display = 'block';
        // 修改按钮文字
        event.target.textContent = '❌ 确认拒绝';
        event.target.onclick = () => rejectWithdrawal(requestId);
      }
    }

    // 通过提现
    async function approveWithdrawal(requestId) {
      const doApprove = async () => {
        try {
          const data = await apiRequest('POST', `/withdrawals/admin/${requestId}/review`, {
            approved: true,
            note: document.getElementById(`note${requestId}`)?.value || ''
          });
          window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
          loadWithdrawalQueue();
          loadStats();
        } catch (e) {
          window.toast ? toast.error('操作失败: ' + e.message) : alert('操作失败: ' + e.message);
        }
      };

      if (window.showConfirm) {
        showConfirm('确定要通过这个提现申请吗？', doApprove, { title: '通过提现', confirmText: '确认通过' });
      } else if (confirm('确定要通过这个提现申请吗？')) {
        await doApprove();
      }
    }

    // 拒绝提现
    async function rejectWithdrawal(requestId) {
      const note = document.getElementById(`note${requestId}`).value.trim();
      
      if (!note) {
        window.toast ? toast.warning('拒绝提现时必须填写备注说明原因') : alert('拒绝提现时必须填写备注说明原因');
        return;
      }

      const doReject = async () => {
        try {
          const data = await apiRequest('POST', `/withdrawals/admin/${requestId}/review`, {
            approved: false,
            note: note
          });
          window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
          loadWithdrawalQueue();
          loadStats();
        } catch (e) {
          window.toast ? toast.error('操作失败: ' + e.message) : alert('操作失败: ' + e.message);
        }
      };

      if (window.showDangerConfirm) {
        showDangerConfirm('确定要拒绝这个提现申请吗？金额将退回到用户的收益余额。', doReject, { title: '拒绝提现', confirmText: '确认拒绝' });
      } else if (confirm('确定要拒绝这个提现申请吗？金额将退回到用户的收益余额。')) {
        await doReject();
      }
    }

    // 查看用户收益详情
    async function viewUserEarnings(userId) {
      try {
        const data = await apiRequest('GET', `/withdrawals/admin/user-earnings/${userId}`);
        
        let infoHtml = `<div style="line-height:2;">
          <div><strong>用户：</strong>${data.user.username}</div>
          <div><strong>收益余额：</strong>${data.earningsBalance} 积分</div>
          <div><strong>总收益：</strong>${data.totalEarnings} 积分</div>
          <div><strong>已提现：</strong>${data.withdrawnAmount} 积分</div>
          <div><strong>待审核：</strong>${data.pendingAmount} 积分</div>
          <div><strong>解锁次数：</strong>${data.unlockCount} 次</div>`;
        
        if (data.recentUnlocks && data.recentUnlocks.length > 0) {
          infoHtml += `<hr style="margin:10px 0;"><strong>最近解锁记录：</strong><div style="max-height:200px;overflow-y:auto;margin-top:6px;">`;
          data.recentUnlocks.forEach((unlock, idx) => {
            infoHtml += `<div style="padding:4px 0;border-bottom:1px solid #eee;font-size:13px;">`;
            infoHtml += `${idx + 1}. ${unlock.node.title} — ${unlock.unlock_price}积分<br>`;
            infoHtml += `&nbsp;&nbsp;解锁人：${unlock.user.username}，${new Date(unlock.unlocked_at).toLocaleString('zh-CN')}`;
            infoHtml += `</div>`;
          });
          infoHtml += `</div>`;
        }
        infoHtml += `</div>`;

        if (window.showModal) {
          showModal({ title: '用户收益详情', content: infoHtml, showCancel: false, confirmText: '关闭' });
        } else {
          let infoText = `用户收益详情\n\n用户：${data.user.username}\n收益余额：${data.earningsBalance} 积分\n总收益：${data.totalEarnings} 积分\n已提现：${data.withdrawnAmount} 积分\n待审核：${data.pendingAmount} 积分\n解锁次数：${data.unlockCount} 次`;
          window.toast ? toast.info('用户收益详情已打印到控制台') : console.log(infoText);
        }
      } catch (e) {
        window.toast ? toast.error('加载用户收益失败: ' + e.message) : alert('加载用户收益失败: ' + e.message);
      }
    }

// HTML 转义函数
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ========== 会员管理功能 ==========

    // 加载会员统计
    async function loadMembershipStats() {
      try {
        const stats = await apiRequest('GET', '/admin/membership/stats');
        
        const membershipStatsDiv = document.getElementById('membershipStats');
        membershipStatsDiv.innerHTML = `
          <div class="stat-card">
            <div class="label">总会员数</div>
            <div class="value" style="color: var(--st-primary-500);">${stats.totalMembers}</div>
          </div>
          <div class="stat-card">
            <div class="label">今日新增</div>
            <div class="value" style="color: var(--st-success-600, #16A34A);">${stats.newMembersToday}</div>
          </div>
          <div class="stat-card">
            <div class="label">本月新增</div>
            <div class="value" style="color: var(--st-primary-500, #6366F1);">${stats.newMembersThisMonth}</div>
          </div>
          <div class="stat-card">
            <div class="label">即将到期</div>
            <div class="value" style="color: var(--st-warning-500, #F59E0B);">${stats.expiringMembers}</div>
          </div>
          <div class="stat-card">

    // 加载会员列表
    async function loadMembers() {
      const membersDiv = document.getElementById('membersList');
      membersDiv.innerHTML = '<div class="loading"></div>';

      try {
        const tier = document.getElementById('tierFilter').value;
        const search = document.getElementById('searchInput').value;
        
        let url = '/admin/membership/members?page=1&limit=20';
        if (tier !== 'all') url += `&tier=${tier}`;
        if (search) url += `&search=${encodeURIComponent(search)}`;

        const data = await apiRequest('GET', url);
        const members = data.members || [];
        
        if (members.length === 0) {
          membersDiv.innerHTML = '<div class="empty">暂无会员数据</div>';

              </div>
              <div class="info-item">
                <div class="label">自动续费</div>

    // 获取会员徽章样式
    function getBadgeClass(tier) {
      const classes = {
        free: 'badge-free',
        trial: 'badge-trial',
        monthly: 'badge-monthly',
        quarterly: 'badge-quarterly',
        yearly: 'badge-yearly',
        enterprise: 'badge-enterprise'
      };
      return classes[tier] || 'badge-free';
    }

    // 查看会员详情
    function viewMemberDetail(memberId) {
      // 加载会员详情并支持调整
      const adjustMember = async (userId) => {
        const tier = document.getElementById(`memberTier_${userId}`)?.value;
        const expiresAt = document.getElementById(`memberExpires_${userId}`)?.value;
        const reason = document.getElementById(`memberReason_${userId}`)?.value;

        if (!tier || !expiresAt) {
          window.toast ? toast.warning('请填写等级和到期时间') : alert('请填写等级和到期时间');
          return;
        }

        try {
          const data = await apiRequest('POST', `/admin/membership/members/${userId}/adjust`, { tier, expiresAt, reason });
          window.toast ? toast.success(data.message || '会员状态已调整') : alert('✅ 会员状态已调整');
          loadMembers();
        } catch (e) {
          window.toast ? toast.error('调整失败: ' + e.message) : alert('调整失败: ' + e.message);
        }
      };

      // 加载会员订单
      const loadMemberOrders = async (userId) => {
        try {
          const data = await apiRequest('GET', `/admin/membership/orders?page=1&limit=10`);
          const orders = (data.orders || []).filter(o => o.user_id === userId);
          let ordersHtml = '';
          if (orders.length === 0) {
            ordersHtml = '<p style="color: var(--st-text-tertiary);">暂无订单记录</p>';
          } else {
            ordersHtml = '<div style="max-height:200px;overflow-y:auto;"><table class="data-table"><thead><tr><th>订单号</th><th>类型</th><th>金额</th><th>状态</th><th>时间</th></tr></thead><tbody>';
            orders.forEach(o => {
              const statusMap = { pending: '待支付', paid: '已支付', failed: '失败', refunded: '已退款' };
              ordersHtml += `<tr><td>${o.id}</td><td>${o.type || '-'}</td><td>¥${o.amount || 0}</td><td>${statusMap[o.status] || o.status}</td><td>${new Date(o.created_at).toLocaleString('zh-CN')}</td></tr>`;
            });
            ordersHtml += '</tbody></table></div>';
          }
          document.getElementById(`memberOrders_${userId}`).innerHTML = ordersHtml;
        } catch (e) {
          console.error('加载订单失败:', e);
        }
      };

      // 先获取会员信息
      apiRequest('GET', `/admin/membership/members?page=1&limit=100`).then(data => {
        const member = (data.members || []).find(m => m.id === memberId);
        if (!member) {
          window.toast ? toast.error('未找到会员信息') : alert('未找到会员信息');
          return;
        }

        const tierOptions = [
          { value: 'trial', label: '体验会员' },
          { value: 'monthly', label: '月度会员' },
          { value: 'quarterly', label: '季度会员' },
          { value: 'yearly', label: '年度会员' },
          { value: 'enterprise', label: '企业版' }
        ];

        const currentExpires = member.membership_expires_at
          ? new Date(member.membership_expires_at).toISOString().split('T')[0]
          : new Date(Date.now() + 30 * 24 * 3600 * 1000).toISOString().split('T')[0];

        const html = `
          <div style="line-height: 1.8;">
            <div style="margin-bottom: 16px;">
              <strong>用户：</strong>${escapeHtml(member.username)}（ID: ${member.id}）<br>
              <strong>当前等级：</strong><span class="tag ${getBadgeClass(member.membership_tier)}">${tierOptions.find(t => t.value === member.membership_tier)?.label || member.membership_tier}</span><br>
              <strong>到期时间：</strong>${member.membership_expires_at ? new Date(member.membership_expires_at).toLocaleDateString('zh-CN') : '未设置'}
            </div>
            <hr style="margin: 12px 0; border: none; border-top: 1px solid #e5e7eb;">
            <h4 style="margin-bottom: 10px;">调整会员状态</h4>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;">
              <div>
                <label style="display:block;font-size:13px;color:var(--st-text-secondary);margin-bottom:4px;">会员等级</label>
                <select id="memberTier_${member.id}" style="width:100%;padding:6px;border-radius:6px;border:1px solid #ddd;">
                  ${tierOptions.map(t => `<option value="${t.value}" ${t.value === member.membership_tier ? 'selected' : ''}>${t.label}</option>`).join('')}
                </select>
              </div>
              <div>
                <label style="display:block;font-size:13px;color:var(--st-text-secondary);margin-bottom:4px;">到期时间</label>
                <input type="date" id="memberExpires_${member.id}" value="${currentExpires}" style="width:100%;padding:6px;border-radius:6px;border:1px solid #ddd;">
              </div>
            </div>
            <div style="margin-bottom: 10px;">
              <label style="display:block;font-size:13px;color:var(--st-text-secondary);margin-bottom:4px;">调整原因</label>
              <input type="text" id="memberReason_${member.id}" placeholder="如：补偿、活动赠送等" style="width:100%;padding:6px;border-radius:6px;border:1px solid #ddd;">
            </div>
            <button class="btn btn-success" onclick="window._adjustMember(${member.id})">✅ 调整会员</button>
            <hr style="margin: 16px 0; border: none; border-top: 1px solid #e5e7eb;">
            <h4 style="margin-bottom: 10px;">订单记录</h4>
            <div id="memberOrders_${member.id}"><div class="loading"></div></div>
          </div>
        `;

        // 暴露调整函数到全局
        window._adjustMember = adjustMember;

        if (window.showModal) {
          showModal({ title: '会员详情', content: html, showCancel: false, confirmText: '关闭' });
        } else {
          // fallback
          const div = document.createElement('div');
          div.innerHTML = html;
          document.body.appendChild(div);
        }

        // 加载订单
        loadMemberOrders(member.id);
      }).catch(e => {
        window.toast ? toast.error('加载会员详情失败: ' + e.message) : alert('加载会员详情失败: ' + e.message);
      });
    }

    // ========== 用户管理功能 ==========

    let currentUserPage = 1;
    const usersPerPage = 15;

    // 加载用户列表
    async function loadUsers(page = 1) {
      currentUserPage = page;
      const usersDiv = document.getElementById('usersList');
      usersDiv.innerHTML = '<div class="loading"></div>';

      try {
        const search = document.getElementById('userSearchInput').value;
        const role = document.getElementById('userRoleFilter').value;
        const sort = document.getElementById('userSortBy').value;

        let url = `/admin/users?page=${page}&limit=${usersPerPage}&sort=${sort}&order=desc`;
        if (search) url += `&search=${encodeURIComponent(search)}`;
        if (role !== 'all') url += `&role=${role}`;

        const data = await apiRequest('GET', url);
        const users = data.users || [];
        const pagination = data.pagination || {};

        // 更新统计
        document.getElementById('userStats').innerHTML = `
          <div class="stat-card">
            <div class="label">总用户数</div>
            <div class="value">${pagination.total || 0}</div>
          </div>
        `;

        if (users.length === 0) {
          usersDiv.innerHTML = '<div class="empty">暂无用户数据</div>';
          document.getElementById('usersPagination').innerHTML = '';
          return;
        }

        usersDiv.innerHTML = users.map(user => {
          const isBanned = user.bio && user.bio.startsWith('[BANNED');
          const isDeleted = user.username && user.username.startsWith('[DELETED_');
          
          return `
            <div class="review-item" style="${isBanned ? 'border-left: 4px solid var(--st-error-500);' : ''} ${isDeleted ? 'opacity: 0.6;' : ''}">
              <div class="header">
                <div style="display: flex; align-items: center; gap: 12px;">
                  <img src="${user.avatar || '/assets/default-avatar.svg?v=2'}"
                       alt="avatar"
                       style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
                  <div>
                    <h3 style="display: flex; align-items: center; gap: 8px;">
                      ${escapeHtml(user.username)}
                      ${user.isAdmin ? '<span style="background: var(--st-primary-500); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px;">管理员</span>' : ''}
                      ${isBanned ? '<span style="background: var(--st-error-500); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px;">已封禁</span>' : ''}
                      ${isDeleted ? '<span style="background: var(--st-gray-500); color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px;">已删除</span>' : ''}
                    </h3>
                    <div class="meta">
                      ID: ${user.id} | 
                      邮箱: ${user.email || '未绑定'} | 
                      ${user.wx_nickname ? '微信: ' + escapeHtml(user.wx_nickname) + ' | ' : ''}
                      注册: ${new Date(user.createdAt).toLocaleDateString('zh-CN')}
                    </div>
                  </div>
                </div>
                <div style="text-align: right;">
                  <div style="font-size: 13px; color: var(--st-text-secondary);">
                    Lv.${user.level} | ${user.points} 积分 | ${user.word_count} 字
                  </div>
                  <div style="font-size: 12px; color: var(--st-text-tertiary); margin-top: 4px;">
                    故事: ${user._count?.authored_stories || 0} | 
                    章节: ${user._count?.authored_nodes || 0} | 
                    评论: ${user._count?.comments || 0}
                  </div>
                </div>
              </div>
              
              ${!isDeleted ? `
                <div class="actions" style="margin-top: 12px;">
                  <button class="btn" style="background: var(--st-primary-500); color: white;" onclick="viewUserDetail(${user.id})">
                    📋 详情
                  </button>
                  ${!user.isAdmin ? `
                    ${isBanned ? `
                      <button class="btn btn-success" onclick="unbanUser(${user.id}, '${escapeHtml(user.username)}')">
                        ✅ 解封
                      </button>
                    ` : `
                      <button class="btn btn-warning" onclick="banUser(${user.id}, '${escapeHtml(user.username)}')">
                        🚫 封禁
                      </button>
                    `}
                    <button class="btn" style="background: var(--st-gray-500); color: white;" onclick="resetUserPassword(${user.id}, '${escapeHtml(user.username)}')">
                      🔑 重置密码
                    </button>
                    <button class="btn btn-danger" onclick="deleteUser(${user.id}, '${escapeHtml(user.username)}')">
                      🗑️ 删除
                    </button>
                  ` : ''}
                </div>
              ` : ''}
            </div>
          `;
        }).join('');

        // 渲染分页
        renderUsersPagination(pagination);
      } catch (e) {
        usersDiv.innerHTML = `<p style="color: red;">加载失败: ${e.message}</p>`;
      }
    }

    // 渲染用户分页
    function renderUsersPagination(pagination) {
      const { page, totalPages, total } = pagination;
      if (totalPages <= 1) {
        document.getElementById('usersPagination').innerHTML = '';
        return;
      }

      let html = `<span style="margin-right: 15px; color: var(--st-text-secondary);">共 ${total} 条</span>`;
      
      if (page > 1) {
        html += `<button class="btn" style="margin: 0 4px;" onclick="loadUsers(${page - 1})">上一页</button>`;
      }
      
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
          html += `<button class="btn" style="margin: 0 4px; ${i === page ? 'background: var(--st-primary-500); color: white;' : ''}" onclick="loadUsers(${i})">${i}</button>`;
        } else if (i === page - 3 || i === page + 3) {
          html += `<span style="margin: 0 4px;">...</span>`;
        }
      }
      
      if (page < totalPages) {
        html += `<button class="btn" style="margin: 0 4px;" onclick="loadUsers(${page + 1})">下一页</button>`;
      }

      document.getElementById('usersPagination').innerHTML = html;
    }

    // 封禁用户
    async function banUser(userId, username) {
      const reason = prompt(`请输入封禁 ${username} 的原因：`);
      if (reason === null) return; // 用户取消

      const doBan = async () => {
        try {
          const data = await apiRequest('POST', `/admin/users/${userId}/ban`, { reason: reason || '违反社区规范' });
          window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
          loadUsers(currentUserPage);
        } catch (e) {
          window.toast ? toast.error('封禁失败: ' + e.message) : alert('封禁失败: ' + e.message);
        }
      };

      if (window.showDangerConfirm) {
        showDangerConfirm(`确定要封禁用户 "${username}" 吗？`, doBan, { title: '封禁用户', confirmText: '确认封禁' });
      } else if (confirm(`确定要封禁用户 "${username}" 吗？`)) {
        await doBan();
      }
    }

    // 解封用户
    async function unbanUser(userId, username) {
      const doUnban = async () => {
        try {
          const data = await apiRequest('POST', `/admin/users/${userId}/unban`);
          window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
          loadUsers(currentUserPage);
        } catch (e) {
          window.toast ? toast.error('解封失败: ' + e.message) : alert('解封失败: ' + e.message);
        }
      };

      if (window.showConfirm) {
        showConfirm(`确定要解封用户 "${username}" 吗？`, doUnban, { title: '解封用户', confirmText: '确认解封' });
      } else if (confirm(`确定要解封用户 "${username}" 吗？`)) {
        await doUnban();
      }
    }

    // 重置用户密码
    async function resetUserPassword(userId, username) {
      const newPassword = prompt(`请输入 ${username} 的新密码（至少6位）：`);
      if (!newPassword) return;

      if (newPassword.length < 6) {
        window.toast ? toast.warning('密码长度至少为6位') : alert('密码长度至少为6位');
        return;
      }

      try {
        const data = await apiRequest('POST', `/admin/users/${userId}/reset-password`, { newPassword });
        window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
      } catch (e) {
        window.toast ? toast.error('重置密码失败: ' + e.message) : alert('重置密码失败: ' + e.message);
      }
    }

    // 删除用户
    async function deleteUser(userId, username) {
      const deleteType = confirm(`删除用户 "${username}"\n\n点击"确定"进行软删除（保留数据，可恢复）\n点击"取消"后可选择硬删除（彻底删除）`);
      
      if (deleteType) {
        // 软删除
        const doSoftDelete = async () => {
          try {
            const data = await apiRequest('DELETE', `/admin/users/${userId}`);
            window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
            loadUsers(currentUserPage);
          } catch (e) {
            window.toast ? toast.error('删除失败: ' + e.message) : alert('删除失败: ' + e.message);
          }
        };

        if (window.showDangerConfirm) {
          showDangerConfirm(`确定要软删除用户 "${username}" 吗？\n\n用户数据将被保留，但账号将无法登录。`, doSoftDelete, { title: '软删除用户', confirmText: '确认删除' });
        } else {
          await doSoftDelete();
        }
      } else {
        // 询问是否硬删除
        const hardDelete = confirm(`是否要彻底删除用户 "${username}"？\n\n⚠️ 警告：硬删除将彻底删除用户及其所有关联数据，此操作不可恢复！`);
        
        if (hardDelete) {

    async function adjustPoints() {
      const userId = parseInt(document.getElementById('pointsUserId').value);
      const amount = parseInt(document.getElementById('pointsAmount').value);
      const reason = document.getElementById('pointsReason').value.trim();

      if (!userId || isNaN(userId)) { window.toast ? toast.warning('请输入有效的用户 ID') : alert('请输入有效的用户 ID'); return; }
      if (!amount || amount === 0 || isNaN(amount)) { window.toast ? toast.warning('请输入有效的调整数量（正数增加，负数扣除）') : alert('请输入有效的调整数量'); return; }
      if (!reason) { window.toast ? toast.warning('请填写调整原因') : alert('请填写调整原因'); return; }

      const doAdjust = async () => {
        try {
          const data = await apiRequest('POST', `/admin/points/users/${userId}/adjust`, { amount, reason });
          window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
          document.getElementById('pointsUserId').value = '';
          document.getElementById('pointsAmount').value = '';
          document.getElementById('pointsReason').value = '';
          loadPointTransactions();
        } catch (e) { window.toast ? toast.error('调整失败: ' + e.message) : alert('调整失败: ' + e.message); }
      };

      const actionText = amount > 0 ? `增加 ${amount} 积分` : `扣除 ${Math.abs(amount)} 积分`;
      if (window.showConfirm) {
        showConfirm(`确定为用户 ID ${userId} ${actionText}吗？\n原因：${reason}`, doAdjust, { title: '积分调整', confirmText: '确认调整' });
      } else if (confirm(`确定为用户 ID ${userId} ${actionText}吗？\n原因：${reason}`)) { await doAdjust(); }
    }

    async function generateInviteCodes() {
      const count = parseInt(document.getElementById('inviteCount').value) || 10;

      const maxUses = parseInt(document.getElementById('inviteMaxUses').value) || 1;
      const expiresInDays = parseInt(document.getElementById('inviteExpiresDays').value) || 30;

      if (count < 1 || count > 100) { window.toast ? toast.warning('数量必须在 1-100 之间') : alert('数量必须在 1-100 之间'); return; }

      try {
        const data = await apiRequest('POST', '/invitations/admin/generate', { count, bonusPoints, maxUses, expiresInDays });
        const codesArea = document.getElementById('generatedCodesArea');
        codesArea.style.display = 'block';
        codesArea.innerHTML = `
          <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;margin-top:8px;">

            </div>
            <button class="btn" style="margin-top:8px;background:var(--st-gray-500);color:white;font-size:12px;" onclick="copyInviteCodes(this)">📋 复制全部邀请码</button>

        `;
        window._lastGeneratedCodes = data.codes.map(c => c.code);
        loadInvitationStats();
        loadInviteCodes();
      } catch (e) { window.toast ? toast.error('生成失败: ' + e.message) : alert('生成失败: ' + e.message); }
    }

    function copyInviteCodes(btn) {
      const codes = window._lastGeneratedCodes || [];
      if (codes.length === 0) return;
      navigator.clipboard.writeText(codes.join('\n')).then(() => {
        btn.textContent = '✅ 已复制';
        setTimeout(() => { btn.textContent = '📋 复制全部邀请码'; }, 2000);
      }).catch(() => {
        // fallback
        const ta = document.createElement('textarea');
        ta.value = codes.join('\n');
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = '✅ 已复制';
        setTimeout(() => { btn.textContent = '📋 复制全部邀请码'; }, 2000);
      });
    }

        const data = await apiRequest('PATCH', `/invitations/admin/codes/${code}/toggle`);
        window.toast ? toast.success(data.isActive ? '邀请码已启用' : '邀请码已禁用') : alert('✅ 操作成功');
        loadInviteCodes(currentInvitePage);
        loadInvitationStats();
      } catch (e) { window.toast ? toast.error('操作失败: ' + e.message) : alert('操作失败: ' + e.message); }
    }

    // ========== 通用分页渲染 ==========

    function renderPagination(containerId, pagination, loadFn) {
      const { page, totalPages, total } = pagination;
      const container = document.getElementById(containerId);
      if (!container || totalPages <= 1) { if (container) container.innerHTML = ''; return; }
      let html = `<span style="margin-right:15px;color:var(--st-text-secondary);">共 ${total} 条</span>`;
      if (page > 1) html += `<button class="btn" style="margin:0 4px;" onclick="${loadFn.name}(${page - 1})">上一页</button>`;
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
          html += `<button class="btn" style="margin:0 4px;${i === page ? 'background:var(--st-primary-500);color:white;' : ''}" onclick="${loadFn.name}(${i})">${i}</button>`;
        } else if (i === page - 3 || i === page + 3) {
          html += '<span style="margin:0 4px;">...</span>';
        }
      }
      if (page < totalPages) html += `<button class="btn" style="margin:0 4px;" onclick="${loadFn.name}(${page + 1})">下一页</button>`;
      container.innerHTML = html;
    }
  </script>
