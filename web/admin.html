<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light dark">
  <title>StoryTree - 管理后台</title>
  <link rel="stylesheet" href="styles/design-system.css">
  <link rel="stylesheet" href="styles/animations.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/utilities.css">
  <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--st-font-sans); background: var(--st-bg-secondary); }

    .navbar {
      background: var(--st-gray-900, #111827);
      color: white;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
    }
    .nav-brand { font-size: 20px; font-weight: bold; }

    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: var(--st-bg-primary, #fff);
      border-radius: var(--st-radius-lg, 8px);
      padding: 20px;
      box-shadow: var(--st-shadow-sm, 0 2px 8px rgba(0,0,0,0.08));
    }
    .stat-card .label { color: var(--st-text-secondary, #6B7280); font-size: var(--st-text-sm, 14px); margin-bottom: 8px; }
    .stat-card .value { font-size: 32px; font-weight: var(--st-font-bold, 700); color: var(--st-text-primary, #111827); }

    .review-item {
      background: var(--st-bg-primary, #fff);
      border-radius: var(--st-radius-xl, 12px);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--st-shadow-sm, 0 2px 8px rgba(0,0,0,0.08));
    }
    .review-item .header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 16px; }
    .review-item h3 { color: var(--st-text-primary, #111827); margin-bottom: 8px; }
    .review-item .meta { color: var(--st-text-secondary, #6B7280); font-size: var(--st-text-sm, 14px); margin-bottom: 12px; }
    .review-item .content {
      background: var(--st-bg-secondary, #F9FAFB);
      padding: 16px;
      border-radius: var(--st-radius-lg, 8px);
      line-height: 1.6;
      margin-bottom: 16px;
      max-height: 200px;
      overflow-y: auto;
    }
    .review-item .reports { color: var(--st-error-500, #EF4444); font-size: var(--st-text-sm, 14px); margin-bottom: 12px; }
    .review-item .actions { display: flex; gap: 10px; }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--st-radius-md, 6px);
      cursor: pointer;
      font-size: var(--st-text-sm, 14px);
      transition: all var(--st-duration-fast, 0.15s);
    }
    .btn-success { background: var(--st-success-500, #22C55E); color: white; }
    .btn-success:hover { background: var(--st-success-600, #16A34A); }
    .btn-danger { background: var(--st-error-500, #EF4444); color: white; }
    .btn-danger:hover { background: var(--st-error-600, #DC2626); }
    .btn-warning { background: var(--st-warning-500, #F59E0B); color: white; }
    .btn-warning:hover { background: var(--st-warning-600, #D97706); }

    .loading {
      text-align: center;
      padding: 40px;
    }
    .loading:after {
      content: '';
      display: inline-block;
      width: 30px;
      height: 30px;
      border: 3px solid var(--st-gray-100, #F3F4F6);
      border-top: 3px solid var(--st-primary-500, #6366F1);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    .empty { text-align: center; padding: 60px; color: var(--st-text-tertiary, #9CA3AF); }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 2px solid var(--st-gray-200, #E5E7EB);
    }
    .tab {
      padding: 12px 24px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      font-size: var(--st-text-base, 16px);
      font-weight: var(--st-font-semibold, 600);
      color: var(--st-text-secondary, #6B7280);
      transition: all var(--st-duration-normal, 0.2s);
    }
    .tab:hover { color: var(--st-text-primary, #111827); }
    .tab.active {
      color: var(--st-text-primary, #111827);
      border-bottom-color: var(--st-primary-500, #6366F1);
    }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .withdrawal-item {
      background: var(--st-bg-primary, #fff);
      border-radius: var(--st-radius-xl, 12px);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--st-shadow-sm, 0 2px 8px rgba(0,0,0,0.08));
    }
    .withdrawal-item .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .withdrawal-item .amount {
      font-size: 28px;
      font-weight: 700;
      color: var(--st-success-600, #16A34A);
    }
    .withdrawal-item .status {
      padding: 6px 12px;
      border-radius: var(--st-radius-full, 20px);
      font-size: 13px;
      font-weight: 600;
    }
    .withdrawal-item .status.pending { background: var(--st-warning-50, #FFFBEB); color: var(--st-warning-700, #B45309); }
    .withdrawal-item .status.approved { background: var(--st-success-50, #F0FDF4); color: var(--st-success-700, #15803D); }
    .withdrawal-item .status.rejected { background: var(--st-error-50, #FEF2F2); color: var(--st-error-700, #B91C1C); }
    .withdrawal-item .info {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 16px;
      padding: 16px;
      background: var(--st-bg-secondary, #F9FAFB);
      border-radius: var(--st-radius-lg, 8px);
    }
    .withdrawal-item .info-item {
      display: flex;
      flex-direction: column;
    }
    .withdrawal-item .info-item .label {
      color: var(--st-text-secondary, #6B7280);
      font-size: 13px;
      margin-bottom: 4px;
    }
    .withdrawal-item .info-item .value {
      color: var(--st-text-primary, #111827);
      font-weight: 600;
    }
    .withdrawal-item .actions {
      display: flex;
      gap: 10px;
    }
    .withdrawal-item textarea {
      width: 100%;
      padding: 10px;
      border: 2px solid var(--st-gray-200, #E5E7EB);
      border-radius: var(--st-radius-md, 6px);
      font-size: var(--st-text-sm, 14px);
      margin-bottom: 12px;
      font-family: inherit;
      resize: vertical;
      min-height: 60px;
    }

    .badge-free { background: var(--st-gray-200, #E5E7EB); color: var(--st-text-secondary, #6B7280); }
    .badge-trial { background: #ffecd2; color: #d4a574; }
    .badge-monthly { background: #d5e1df; color: #2d5d5a; }
    .badge-quarterly { background: #a8d5ba; color: #1e5c3a; }
    .badge-yearly { background: #ffd700; color: #8b6900; }
    .badge-enterprise { background: #b9f2ff; color: #006a7f; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">🛡️ StoryTree 管理后台</div>
    <div>
      <span id="adminName">管理员</span>
      <button class="btn" style="margin-left: 16px; background: rgba(255,255,255,0.2);" onclick="location.href='index.html'">返回前台</button>
    </div>
  </nav>

  <div class="container">
    <h2 style="margin-bottom: 20px;">📊 审核统计</h2>
    <div class="stats" id="stats"></div>

    <!-- 选项卡导航 -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('content')">📝 内容审核</button>
      <button class="tab" onclick="switchTab('withdrawal')">💰 提现审核</button>
      <button class="tab" onclick="switchTab('membership')">👑 会员管理</button>
      <button class="tab" onclick="switchTab('users')">👥 用户管理</button>
    </div>

    <!-- 内容审核 -->
    <div id="contentTab" class="tab-content active">
      <h2 style="margin-bottom: 20px;">📝 待审核内容</h2>
      <div id="reviewQueue"></div>
    </div>

    <!-- 提现审核 -->
    <div id="withdrawalTab" class="tab-content">
      <h2 style="margin-bottom: 20px;">💰 提现审核</h2>
      <div id="withdrawalQueue"></div>
    </div>

    <!-- 会员管理 -->
    <div id="membershipTab" class="tab-content">
      <h2 style="margin-bottom: 20px;">👑 会员统计</h2>
      <div class="stats" id="membershipStats" style="margin-bottom: 30px;"></div>
      
      <h3 style="margin-bottom: 15px;">📊 会员列表</h3>
      <div style="margin-bottom: 15px; display: flex; gap: 10px;">
        <select id="tierFilter" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
          <option value="all">全部等级</option>
          <option value="trial">体验会员</option>
          <option value="monthly">月度会员</option>
          <option value="quarterly">季度会员</option>
          <option value="yearly">年度会员</option>
          <option value="enterprise">企业版</option>
        </select>
        <input type="text" id="searchInput" placeholder="搜索用户名或邮箱" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; flex: 1;">
        <button class="btn btn-success" onclick="loadMembers()">🔍 搜索</button>
      </div>
      <div id="membersList"></div>
    </div>

    <!-- 用户管理 -->
    <div id="usersTab" class="tab-content">
      <h2 style="margin-bottom: 20px;">👥 用户管理</h2>
      
      <!-- 搜索和筛选 -->
      <div style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
        <input type="text" id="userSearchInput" placeholder="搜索用户名、邮箱或微信昵称" style="padding: 8px 12px; border-radius: 6px; border: 1px solid #ddd; flex: 1; min-width: 200px;">
        <select id="userRoleFilter" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
          <option value="all">全部用户</option>
          <option value="admin">管理员</option>
          <option value="user">普通用户</option>
        </select>
        <select id="userSortBy" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
          <option value="created_at">注册时间</option>
          <option value="points">积分</option>
          <option value="level">等级</option>
          <option value="word_count">字数</option>
        </select>
        <button class="btn btn-success" onclick="loadUsers()">🔍 搜索</button>
      </div>
      
      <!-- 用户统计 -->
      <div class="stats" id="userStats" style="margin-bottom: 20px;"></div>
      
      <!-- 用户列表 -->
      <div id="usersList"></div>
      
      <!-- 分页 -->
      <div id="usersPagination" style="margin-top: 20px; text-align: center;"></div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let adminToken = null;

    // 获取存储的 token
    function getToken() {
      return adminToken || localStorage.getItem('token') || sessionStorage.getItem('token');
    }

    // API 调用（统一使用 JWT Token 鉴权）
    async function apiRequest(method, path, body) {
      const token = getToken();
      const options = {
        method,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        }
      };
      if (body) {
        options.body = JSON.stringify(body);
      }
      const res = await fetch(`${API_BASE}${path}`, options);
      if (!res.ok) {
        if (res.status === 401) {
          // Token 失效，跳转登录
          localStorage.removeItem('token');
          sessionStorage.removeItem('token');
          location.href = 'login.html?redirect=admin.html';
          return;
        }
        const err = await res.json();
        throw new Error(err.error || '请求失败');
      }
      return res.json();
    }

    // 初始化：验证 JWT Token 中的管理员身份
    async function init() {
      const token = getToken();
      if (!token) {
        location.href = 'login.html?redirect=admin.html';
        return;
      }

      try {
        // 调用 /auth/me 验证身份
        const res = await fetch(`${API_BASE}/auth/me`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) {
          // Token 无效或过期
          localStorage.removeItem('token');
          sessionStorage.removeItem('token');
          location.href = 'login.html?redirect=admin.html';
          return;
        }

        const data = await res.json();
        const user = data.user;

        if (!user.isAdmin) {
          alert('当前账号没有管理员权限，请使用管理员账号登录');
          location.href = 'index.html';
          return;
        }

        adminToken = token;
        document.getElementById('adminName').textContent = user.username;

        // 加载数据
        loadStats();
        loadReviewQueue();
        loadWithdrawalQueue();
      } catch (e) {
        console.error('验证管理员身份失败:', e);
        location.href = 'login.html?redirect=admin.html';
      }
    }

    // 加载统计数据
    async function loadStats() {
      try {
        // 加载内容审核统计
        const reviewRes = await apiRequest('GET', '/admin/review-queue');
        const reviewStats = reviewRes.stats;

        // 加载提现统计
        let withdrawalStats = { pending: 0, approved: 0, rejected: 0, totalAmount: 0 };
        try {
          const wsRes = await apiRequest('GET', '/withdrawals/admin/stats');
          if (wsRes) withdrawalStats = wsRes;
        } catch (e) {
          console.error('Failed to load withdrawal stats:', e);
        }

        document.getElementById('stats').innerHTML = `
          <div class="stat-card">
            <div class="label">待审核内容</div>
            <div class="value">${reviewStats.pendingCount}</div>
          </div>
          <div class="stat-card">
            <div class="label">待审核提现</div>
            <div class="value" style="color: var(--st-warning-500, #F59E0B);">${withdrawalStats.pending || 0}</div>
          </div>
          <div class="stat-card">
            <div class="label">已通过提现</div>
            <div class="value" style="color: var(--st-success-600, #16A34A);">${withdrawalStats.approved || 0}</div>
          </div>
          <div class="stat-card">
            <div class="label">提现总额</div>
            <div class="value" style="color: var(--st-primary-500, #6366F1);">${withdrawalStats.totalAmount || 0}</div>
          </div>
        `;
      } catch (e) {
        console.error('Failed to load stats:', e);
      }
    }

    // 加载审核队列
    async function loadReviewQueue() {
      const queueDiv = document.getElementById('reviewQueue');
      queueDiv.innerHTML = '<div class="loading"></div>';

      try {
        const res = await apiRequest('GET', '/admin/review-queue');
        
        // 合并待审核节点和被举报节点（去重）
        const pendingNodes = res.pending || [];
        const reportedNodes = res.reported || [];
        const seenIds = new Set(pendingNodes.map(n => n.id));
        const allItems = [...pendingNodes];
        reportedNodes.forEach(n => {
          if (!seenIds.has(n.id)) allItems.push(n);
        });

        if (allItems.length === 0) {
          queueDiv.innerHTML = '<div class="empty">暂无待审核内容</div>';
          return;
        }

        queueDiv.innerHTML = allItems.map(item => `
          <div class="review-item">
            <div class="header">
              <div>
                <h3>${item.title}</h3>
                <div class="meta">
                  作者：${item.author.username} | 
                  故事：${item.story ? item.story.title : '-'} |
                  创建时间：${new Date(item.created_at).toLocaleString('zh-CN')}
                </div>
                ${item.report_count > 0 ? `<div class="reports">⚠️ 被举报 ${item.report_count} 次</div>` : ''}
              </div>
            </div>
            <div class="content">${item.content ? item.content.substring(0, 200) + (item.content.length > 200 ? '...' : '') : '（无内容）'}</div>
            <div class="actions">
              <button class="btn btn-success" onclick="handleReview(${item.id}, 'approve')">✅ 通过</button>
              <button class="btn btn-danger" onclick="handleReview(${item.id}, 'reject')">❌ 驳回</button>
              <button class="btn btn-warning" onclick="handleReview(${item.id}, 'hide')">🚫 下架</button>
              ${item.report_count > 0 ? `<button class="btn" style="background: var(--st-gray-400, #9CA3AF); color: white;" onclick="viewReports(${item.id})">查看举报</button>` : ''}
            </div>
          </div>
        `).join('');
      } catch (e) {
        queueDiv.innerHTML = `<p style="color: red;">加载失败: ${e.message}</p>`;
      }
    }

    // 审核操作
    async function handleReview(nodeId, action) {
      const note = prompt(`请输入审核备注（可选）：`);
      
      try {
        await apiRequest('POST', '/admin/review', {
          nodeId,
          action,
          note
        });
        window.toast ? toast.success('审核成功') : console.log('审核成功');
        loadStats();
        loadReviewQueue();
      } catch (e) {
        window.toast ? toast.error('审核失败: ' + e.message) : console.error('审核失败: ' + e.message);
      }
    }

    // 查看举报
    async function viewReports(nodeId) {
      try {
        const res = await apiRequest('GET', `/admin/reports/${nodeId}`);
        
        let reportHtml = '<div style="max-height:400px;overflow-y:auto;">';
        res.reports.forEach((report, idx) => {
          reportHtml += `<div style="padding:10px 0;border-bottom:1px solid #eee;">`;
          reportHtml += `<strong>${idx + 1}. ${report.reporter.username}</strong><br>`;
          reportHtml += `原因：${report.reason}<br>`;
          if (report.description) reportHtml += `说明：${report.description}<br>`;
          reportHtml += `时间：${new Date(report.createdAt).toLocaleString('zh-CN')}`;
          reportHtml += `</div>`;
        });
        reportHtml += '</div>';

        if (window.showModal) {
          showModal({ title: '举报详情', content: reportHtml, showCancel: false, confirmText: '关闭' });
        } else {
          let reportText = `举报详情：\n\n`;
          res.reports.forEach((report, idx) => {
            reportText += `${idx + 1}. ${report.reporter.username}\n`;
            reportText += `   原因：${report.reason}\n`;
            if (report.description) reportText += `   说明：${report.description}\n`;
            reportText += `   时间：${new Date(report.createdAt).toLocaleString('zh-CN')}\n\n`;
          });
          window.toast ? toast.info('举报详情已打印到控制台') : console.log(reportText);
        }
      } catch (e) {
        window.toast ? toast.error('加载举报详情失败: ' + e.message) : alert('加载举报详情失败: ' + e.message);
      }
    }

    // ========== 提现审核系统 ==========

    // 切换选项卡
    function switchTab(tab) {
      // 更新选项卡样式
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');

      // 显示对应内容
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      if (tab === 'content') {
        document.getElementById('contentTab').classList.add('active');
      } else if (tab === 'withdrawal') {
        document.getElementById('withdrawalTab').classList.add('active');
      } else if (tab === 'membership') {
        document.getElementById('membershipTab').classList.add('active');
        loadMembershipStats();
        loadMembers();
      } else if (tab === 'users') {
        document.getElementById('usersTab').classList.add('active');
        loadUsers();
      }
    }

    // 加载提现审核队列
    async function loadWithdrawalQueue() {
      const queueDiv = document.getElementById('withdrawalQueue');
      queueDiv.innerHTML = '<div class="loading"></div>';

      try {
        const data = await apiRequest('GET', '/withdrawals/admin/requests');
        const requests = data.requests || [];
        
        if (requests.length === 0) {
          queueDiv.innerHTML = '<div class="empty">暂无提现申请</div>';
          return;
        }

        const statusMap = {
          pending: { text: '待审核', class: 'pending' },
          approved: { text: '已通过', class: 'approved' },
          rejected: { text: '已拒绝', class: 'rejected' }
        };

        queueDiv.innerHTML = requests.map(req => {
          const status = statusMap[req.status] || { text: req.status, class: '' };
          return `
            <div class="withdrawal-item">
              <div class="header">
                <div class="amount">${req.amount} 积分</div>
                <span class="status ${status.class}">${status.text}</span>
              </div>
              
              <div class="info">
                <div class="info-item">
                  <div class="label">申请用户</div>
                  <div class="value">${escapeHtml(req.user.username)}</div>
                </div>
                <div class="info-item">
                  <div class="label">提现方式</div>
                  <div class="value">${escapeHtml(req.payment_method)}</div>
                </div>
                <div class="info-item">
                  <div class="label">提现账号</div>
                  <div class="value">${escapeHtml(req.payment_account)}</div>
                </div>
                <div class="info-item">
                  <div class="label">申请时间</div>
                  <div class="value">${new Date(req.created_at).toLocaleString('zh-CN')}</div>
                </div>
                ${req.processed_at ? `
                  <div class="info-item">
                    <div class="label">处理时间</div>
                    <div class="value">${new Date(req.processed_at).toLocaleString('zh-CN')}</div>
                  </div>
                ` : ''}
                ${req.admin_note ? `
                  <div class="info-item" style="grid-column: 1 / -1;">
                    <div class="label">审核备注</div>
                    <div class="value">${escapeHtml(req.admin_note)}</div>
                  </div>
                ` : ''}
              </div>

              ${req.status === 'pending' ? `
                <div id="noteArea${req.id}" style="display: none;">
                  <textarea id="note${req.id}" placeholder="请输入审核备注（可选）"></textarea>
                </div>
                <div class="actions">
                  <button class="btn btn-success" onclick="approveWithdrawal(${req.id})">
                    ✅ 通过

    // 显示拒绝备注输入框
    function showRejectNote(requestId) {
      const noteArea = document.getElementById(`noteArea${requestId}`);
      const currentDisplay = noteArea.style.display;
      
      if (currentDisplay === 'none') {
        noteArea.style.display = 'block';
        // 修改按钮文字
        event.target.textContent = '❌ 确认拒绝';
        event.target.onclick = () => rejectWithdrawal(requestId);
      }
    }

    // 通过提现
    async function approveWithdrawal(requestId) {
      const doApprove = async () => {
        try {
          const data = await apiRequest('POST', `/withdrawals/admin/${requestId}/review`, {
            approved: true,
            note: document.getElementById(`note${requestId}`)?.value || ''
          });
          window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
          loadWithdrawalQueue();
          loadStats();
        } catch (e) {
          window.toast ? toast.error('操作失败: ' + e.message) : alert('操作失败: ' + e.message);
        }
      };

      if (window.showConfirm) {
        showConfirm('确定要通过这个提现申请吗？', doApprove, { title: '通过提现', confirmText: '确认通过' });
      } else if (confirm('确定要通过这个提现申请吗？')) {
        await doApprove();
      }
    }

    // 拒绝提现
    async function rejectWithdrawal(requestId) {
      const note = document.getElementById(`note${requestId}`).value.trim();
      
      if (!note) {
        window.toast ? toast.warning('拒绝提现时必须填写备注说明原因') : alert('拒绝提现时必须填写备注说明原因');
        return;
      }

      const doReject = async () => {
        try {
          const data = await apiRequest('POST', `/withdrawals/admin/${requestId}/review`, {
            approved: false,
            note: note
          });
          window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
          loadWithdrawalQueue();
          loadStats();
        } catch (e) {
          window.toast ? toast.error('操作失败: ' + e.message) : alert('操作失败: ' + e.message);
        }
      };

      if (window.showDangerConfirm) {
        showDangerConfirm('确定要拒绝这个提现申请吗？金额将退回到用户的收益余额。', doReject, { title: '拒绝提现', confirmText: '确认拒绝' });
      } else if (confirm('确定要拒绝这个提现申请吗？金额将退回到用户的收益余额。')) {
        await doReject();
      }
    }

    // ========== 用户管理功能 ==========

      }

    // 渲染用户分页
    function renderUsersPagination(pagination) {
      const { page, totalPages, total } = pagination;
      if (totalPages <= 1) {
        document.getElementById('usersPagination').innerHTML = '';
        return;
      }

      let html = `<span style="margin-right: 15px; color: var(--st-text-secondary);">共 ${total} 条</span>`;
      
      if (page > 1) {
        html += `<button class="btn" style="margin: 0 4px;" onclick="loadUsers(${page - 1})">上一页</button>`;
      }
      
      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= page - 2 && i <= page + 2)) {
          html += `<button class="btn" style="margin: 0 4px; ${i === page ? 'background: var(--st-primary-500); color: white;' : ''}" onclick="loadUsers(${i})">${i}</button>`;
        } else if (i === page - 3 || i === page + 3) {
          html += `<span style="margin: 0 4px;">...</span>`;
        }
      }
      
      if (page < totalPages) {
        html += `<button class="btn" style="margin: 0 4px;" onclick="loadUsers(${page + 1})">下一页</button>`;
      }

      document.getElementById('usersPagination').innerHTML = html;
    }

    // 封禁用户
    async function banUser(userId, username) {
      const reason = prompt(`请输入封禁 ${username} 的原因：`);
      if (reason === null) return; // 用户取消

      const doBan = async () => {
        try {
          const data = await apiRequest('POST', `/admin/users/${userId}/ban`, { reason: reason || '违反社区规范' });
          window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
          loadUsers(currentUserPage);
        } catch (e) {
          window.toast ? toast.error('封禁失败: ' + e.message) : alert('封禁失败: ' + e.message);
        }
      };

      if (window.showDangerConfirm) {
        showDangerConfirm(`确定要封禁用户 "${username}" 吗？`, doBan, { title: '封禁用户', confirmText: '确认封禁' });
      } else if (confirm(`确定要封禁用户 "${username}" 吗？`)) {
        await doBan();
      }
    }

          loadUsers(currentUserPage);
        } catch (e) {

    // 删除用户
    async function deleteUser(userId, username) {
      const deleteType = confirm(`删除用户 "${username}"\n\n点击"确定"进行软删除（保留数据，可恢复）\n点击"取消"后可选择硬删除（彻底删除）`);
      
      if (deleteType) {
        // 软删除
        const doSoftDelete = async () => {
          try {
            const data = await apiRequest('DELETE', `/admin/users/${userId}`);
            window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
            loadUsers(currentUserPage);
          } catch (e) {
            window.toast ? toast.error('删除失败: ' + e.message) : alert('删除失败: ' + e.message);
          }
        };

        if (window.showDangerConfirm) {
          showDangerConfirm(`确定要软删除用户 "${username}" 吗？\n\n用户数据将被保留，但账号将无法登录。`, doSoftDelete, { title: '软删除用户', confirmText: '确认删除' });
        } else {
          await doSoftDelete();
        }
      } else {
        // 询问是否硬删除
        const hardDelete = confirm(`是否要彻底删除用户 "${username}"？\n\n⚠️ 警告：硬删除将彻底删除用户及其所有关联数据，此操作不可恢复！`);
        
        if (hardDelete) {
          const finalConfirm = prompt(`请输入用户名 "${username}" 以确认彻底删除：`);
          if (finalConfirm !== username) {
            window.toast ? toast.warning('用户名不匹配，取消删除') : alert('用户名不匹配，取消删除');
            return;
          }

          try {
            const data = await apiRequest('DELETE', `/admin/users/${userId}?hardDelete=true`);
            window.toast ? toast.success(data.message) : alert('✅ ' + data.message);
            loadUsers(currentUserPage);
          } catch (e) {
            window.toast ? toast.error('删除失败: ' + e.message) : alert('删除失败: ' + e.message);
          }
        }
      }
    }

    // 启动
    document.addEventListener('DOMContentLoaded', init);
  </script>
    <script src="js/loading.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/navbar.js"></script>
</body>
