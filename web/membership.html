<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员中心 - StoryTree</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .membership-status {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .status-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }

        .badge-free { background: #e0e0e0; color: #666; }
        .badge-trial { background: #ffecd2; color: #d4a574; }
        .badge-monthly { background: #d5e1df; color: #2d5d5a; }
        .badge-quarterly { background: #a8d5ba; color: #1e5c3a; }
        .badge-yearly { background: #ffd700; color: #8b6900; }
        .badge-enterprise { background: #b9f2ff; color: #006a7f; }

        .status-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .info-item {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .info-item h3 {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .info-item p {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .tiers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .tier-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .tier-card:hover {
            transform: translateY(-5px);
        }

        .tier-card.popular {
            border: 2px solid #ffd700;
        }

        .popular-badge {
            position: absolute;
            top: 20px;
            right: -30px;
            background: #ffd700;
            color: #8b6900;
            padding: 5px 40px;
            transform: rotate(45deg);
            font-size: 0.8em;
            font-weight: bold;
        }

        .tier-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .tier-name {
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .tier-price {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .tier-price small {
            font-size: 0.4em;
            color: #666;
        }

        .tier-duration {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .tier-benefits {
            list-style: none;
            margin-bottom: 25px;
        }

        .tier-benefits li {
            padding: 8px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .tier-benefits li:last-child {
            border-bottom: none;
        }

        .tier-benefits li:before {
            content: "✓";
            color: #4caf50;
            font-weight: bold;
            margin-right: 10px;
        }

        .tier-action {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-upgrade {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-upgrade:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-current {
            background: #e0e0e0;
            color: #666;
            cursor: not-allowed;
        }

        .section-title {
            color: white;
            font-size: 1.8em;
            margin: 40px 0 20px 0;
            text-align: center;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 50px;
        }

        .error {
            background: #ff5252;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .back-link {
            display: inline-block;
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            margin-bottom: 20px;
            transition: background 0.3s ease;
        }

        .back-link:hover {
            background: rgba(255,255,255,0.3);
        }

        .quota-description {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-size: 0.9em;
            color: #666;
        }

        /* 内测公告横幅 */
        .beta-notice {
            background: linear-gradient(135deg, #fff8e1 0%, #fff3cd 100%);
            border: 1px solid #ffc107;
            border-radius: 12px;
            padding: 18px 24px;
            margin-bottom: 30px;
            display: flex;
            align-items: flex-start;
            gap: 14px;
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.2);
        }

        .beta-notice-icon {
            font-size: 24px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .beta-notice-text {
            color: #856404;
            font-size: 15px;
            line-height: 1.7;
        }

        .beta-notice-text strong {
            display: block;
            font-size: 16px;
            margin-bottom: 4px;
            color: #664d03;
        }

        /* 「即将开放」角标 */
        .coming-soon-badge {
            position: absolute;
            top: 20px;
            left: -32px;
            background: linear-gradient(135deg, #ff9800, #ffa726);
            color: white;
            padding: 5px 40px;
            transform: rotate(-45deg);
            font-size: 0.75em;
            font-weight: bold;
            letter-spacing: 1px;
            z-index: 1;
        }

        /* 价格改为免费样式 */
        .tier-price-free {
            font-size: 2em;
            font-weight: bold;
            color: #4caf50;
        }

        .tier-price-original {
            font-size: 0.9em;
            color: #bbb;
            text-decoration: line-through;
            display: block;
            margin-top: 2px;
        }

        /* 不可点击的按钮样式 */
        .btn-coming-soon {
            background: #e0e0e0;
            color: #999;
            cursor: not-allowed;
            opacity: 0.8;
        }

        .btn-coming-soon:hover {
            transform: none !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/profile.html" class="back-link">← 返回个人中心</a>
        
        <div class="header">
            <h1>🎯 会员中心</h1>
            <p>升级会员，解锁更多 AI 创作特权</p>
        </div>

        <div id="loading" class="loading">加载中...</div>
        <div id="error" class="error" style="display: none;"></div>

        <!-- 内测免费公告 -->
        <div class="beta-notice">
            <div class="beta-notice-icon">🎉</div>
            <div class="beta-notice-text">
                <strong>平台内测期间，所有会员功能限时免费开放！</strong>
                无需付费即可享受全部会员权益。付费功能将在正式上线后开放，届时提前注册的用户将享有专属优惠。
            </div>
        </div>

        <div id="content" style="display: none;">
            <!-- 当前会员状态 -->
            <div class="membership-status">
                <div class="status-header">
                    <h2>我的会员状态</h2>
                    <span id="statusBadge" class="status-badge badge-free">免费用户</span>
                </div>
                <div class="status-info">
                    <div class="info-item">
                        <h3>会员等级</h3>
                        <p id="membershipTier">-</p>
                    </div>
                    <div class="info-item">
                        <h3>到期时间</h3>
                        <p id="expiresAt">-</p>
                    </div>
                    <div class="info-item">
                        <h3>自动续费</h3>
                        <p id="autoRenew">-</p>
                    </div>
                    <div class="info-item">
                        <h3>AI 配额</h3>
                        <p id="aiQuota">-</p>
                    </div>
                </div>
            </div>

            <!-- 会员套餐 -->
            <h2 class="section-title">选择适合您的会员套餐</h2>
            <div class="tiers-grid" id="tiersGrid">
                <!-- 动态生成 -->
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        // 获取 Token（同时检查 localStorage 和 sessionStorage）
        function getToken() {
            return localStorage.getItem('token') || sessionStorage.getItem('token');
        }

        // API 请求
        async function apiRequest(endpoint, options = {}) {
            const token = getToken();
            
            if (!token) {
                // 如果没有 token，直接跳转到登录页
                window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
                return Promise.reject(new Error('未登录'));
            }
            
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };

            const response = await fetch(`${API_BASE}${endpoint}`, {
                ...options,
                headers
            });

            const data = await response.json();
            
            if (!response.ok) {
                throw new Error(data.error || '请求失败');
            }

            return data;
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // 获取会员等级徽章样式
        function getBadgeClass(tier) {
            const classes = {
                free: 'badge-free',
                trial: 'badge-trial',
                monthly: 'badge-monthly',
                quarterly: 'badge-quarterly',
                yearly: 'badge-yearly',
                enterprise: 'badge-enterprise'
            };
            return classes[tier] || 'badge-free';
        }

        // 获取会员等级名称
        function getTierName(tier) {
            const names = {
                free: '免费用户',
                trial: '体验会员',
                monthly: '月度会员',
                quarterly: '季度会员',
                yearly: '年度会员',
                enterprise: '企业版'
            };
            return names[tier] || '未知';
        }

        // 加载会员状态
        async function loadMembershipStatus() {
            try {
                const status = await apiRequest('/membership/my');
                
                const badge = document.getElementById('statusBadge');
                badge.textContent = status.membership.name;
                badge.className = `status-badge ${getBadgeClass(status.membership.tier)}`;
                
                document.getElementById('membershipTier').textContent = status.membership.name;
                document.getElementById('expiresAt').textContent = formatDate(status.membership.expiresAt);
                document.getElementById('autoRenew').textContent = status.membership.autoRenew ? '✓ 已开启' : '✗ 未开启';
                
                // 这里可以添加获取 AI 配额的逻辑
                document.getElementById('aiQuota').textContent = '查看套餐详情';
                
                // 更新购买按钮状态
                updateButtons(status.membership.tier);
                
            } catch (error) {
                console.error('加载会员状态失败:', error);
                if (error.message.includes('未登录')) {
                    window.location.href = '/login.html';
                } else {
                    throw error;
                }
            }
        }

        // 更新购买按钮
        function updateButtons(currentTier) {
            document.querySelectorAll('.btn-upgrade').forEach(btn => {
                const tierId = btn.dataset.tier;
                if (tierId === currentTier) {
                    btn.textContent = '当前套餐';
                    btn.className = 'tier-action btn-current';
                    btn.disabled = true;
                }
            });
        }

        // 加载套餐列表
        async function loadTiers() {
            try {
                const response = await apiRequest('/membership/tiers');
                const tiersGrid = document.getElementById('tiersGrid');
                
                tiersGrid.innerHTML = response.tiers.map(tier => `
                    <div class="tier-card ${tier.isPopular ? 'popular' : ''}">
                        ${tier.isPopular ? '<span class="popular-badge">热门</span>' : ''}
                        <span class="coming-soon-badge">即将开放</span>
                        <div class="tier-header">
                            <div class="tier-name">${tier.name}</div>
                            <div class="tier-price-free">限时免费</div>
                            <span class="tier-price-original">原价 ¥${tier.price}${tier.duration === 0 ? '' : tier.duration === 365 ? '/年' : tier.duration === 90 ? '/季' : tier.duration === 30 ? '/月' : `/${tier.duration}天`}</span>
                        </div>
                        <div class="tier-duration">${tier.durationText}</div>
                        <ul class="tier-benefits">
                            ${tier.benefits.map(benefit => `<li>${benefit}</li>`).join('')}
                        </ul>
                        <div class="quota-description">
                            <strong>AI 配额:</strong><br>
                            ${tier.quotaDescription.split('\n').map(line => line.trim() ? `${line}<br>` : '').join('')}
                        </div>
                        <button class="tier-action btn-coming-soon" disabled title="付费功能即将开放">
                            <i class="fas fa-clock"></i> 即将开放
                        </button>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('加载套餐列表失败:', error);
                throw error;
            }
        }

        // 购买会员
        async function purchaseMembership(tier) {
            try {
                if (!confirm(`确认购买${getTierName(tier)}吗？`)) return;
                
                const order = await apiRequest('/membership/upgrade/create', {
                    method: 'POST',
                    body: JSON.stringify({ tier })
                });
                
                // 跳转到支付页面
                if (confirm(`订单创建成功！\n\n订单金额：¥${order.finalPrice}\n套餐：${order.tierName}\n有效期：${order.durationText}\n\n点击确定前往支付`)) {
                    window.location.href = `/payment.html?orderId=${order.orderId}`;
                }
                
            } catch (error) {
                alert(`购买失败：${error.message}`);
                console.error(error);
            }
        }

        // 初始化
        async function init() {
            try {
                await loadMembershipStatus();
                await loadTiers();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').textContent = error.message;
                document.getElementById('error').style.display = 'block';
            }
        }

        init();
    </script>
</body>
</html>
