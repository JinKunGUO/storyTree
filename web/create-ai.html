<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>AI 辅助创作 - StoryTree</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/utilities.css">
    <link href="libs/fontawesome/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/components/navbar.css">
    <style>
        body {
            background: var(--st-bg-secondary);
            min-height: 100vh;
            padding-top: 64px;
        }

        /* 移动端菜单切换 */
        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            color: var(--st-text-primary);
            font-size: 24px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: block;
            }

            .nav-menu {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--st-bg-primary);
                flex-direction: column;
                padding: 10px 0;
                box-shadow: var(--st-shadow-lg);
            }

            .nav-menu.active {
                display: flex;
            }

            .nav-link {
                padding: 12px 20px;
            }
        }

        .create-ai-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            text-align: center;
            color: var(--st-text-inverted);
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .page-header p {
            font-size: 16px;
            opacity: 0.9;
        }

        /* 方法选择卡片 */
        .method-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 900px;
            margin: 0 auto 40px;
        }

        .method-card {
            background: var(--st-bg-primary);
            border-radius: var(--st-radius-2xl);
            padding: 40px 30px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s var(--st-ease-default);
            box-shadow: var(--st-shadow-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .method-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--st-shadow-xl);
            border-color: var(--st-primary-300);
        }

        .method-card.selected {
            border-color: var(--st-primary-500);
            background: linear-gradient(135deg, var(--st-primary-600/0.15), var(--st-primary-500/0.1));
            box-shadow: 0 0 0 2px var(--st-primary-500), var(--st-shadow-xl);
        }

        .method-icon {
            font-size: 56px;
            margin-bottom: 20px;
        }

        .method-card h3 {
            font-size: 22px;
            margin-bottom: 12px;
            color: var(--st-text-primary);
        }

        .method-card p {
            font-size: 14px;
            color: var(--st-text-tertiary);
            line-height: 1.7;
        }

        /* 内容区域 - 初始隐藏 */
        .method-content {
            background: var(--st-bg-primary);
            border-radius: var(--st-radius-2xl);
            padding: 40px;
            box-shadow: var(--st-shadow-lg);
            max-width: 900px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.4s var(--st-ease-default);
            display: none;
        }

        .method-content.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: var(--st-font-semibold);
            color: var(--st-text-primary);
        }

        .label-hint {
            font-weight: var(--st-font-normal);
            color: var(--st-text-tertiary);
            font-size: var(--st-text-sm);
            margin-left: 5px;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 15px;
            border: 2px solid var(--st-gray-200);
            border-radius: var(--st-radius-lg);
            font-size: var(--st-text-base);
            transition: all 0.2s var(--st-ease-default);
            font-family: inherit;
            color: var(--st-text-primary);
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--st-primary-500);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-textarea {
            resize: vertical;
            min-height: 150px;
        }

        .char-count {
            text-align: right;
            color: var(--st-text-tertiary);
            font-size: var(--st-text-sm);
            margin-top: 5px;
        }

        /* 类型选择器 */
        .genre-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .genre-tag {
            padding: 10px 20px;
            background: var(--st-gray-100);
            border-radius: var(--st-radius-full);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: var(--st-text-secondary);
            border: 2px solid transparent;
        }

        .genre-tag:hover {
            background: var(--st-gray-200);
        }

        .genre-tag.selected {
            background: var(--st-primary-100);
            color: var(--st-primary-700);
            border-color: var(--st-primary-500);
        }

        /* 按钮 */
        .btn-generate {
            background: linear-gradient(135deg, var(--st-primary-600), var(--st-primary-500));
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: var(--st-radius-lg);
            font-size: 16px;
            font-weight: var(--st-font-semibold);
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: var(--st-shadow-lg);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-back {
            background: transparent;
            color: var(--st-text-secondary);
            padding: 10px 20px;
            border: 2px solid var(--st-gray-200);
            border-radius: var(--st-radius-lg);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            margin-right: 15px;
        }

        .btn-back:hover {
            background: var(--st-gray-100);
        }

        /* 生成结果区域 */
        .result-container {
            margin-top: 30px;
            display: none;
        }

        .result-container.active {
            display: block;
        }

        .preview-card {
            background: var(--st-bg-secondary);
            border-radius: var(--st-radius-xl);
            padding: 25px;
            margin-top: 20px;
            border: 1px solid var(--st-gray-200);
        }

        .preview-section {
            margin-bottom: 20px;
        }

        .preview-section h4 {
            font-size: 16px;
            color: var(--st-text-primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .preview-section p,
        .preview-section ul {
            font-size: 14px;
            color: var(--st-text-secondary);
            line-height: 1.7;
        }

        .preview-section ul {
            list-style: disc;
            padding-left: 20px;
        }

        /* 聊天区域 */
        .chat-container {
            margin-top: 20px;
            border: 1px solid var(--st-gray-200);
            border-radius: var(--st-radius-xl);
            overflow: hidden;
        }

        .chat-history {
            max-height: 300px;
            overflow-y: auto;
            padding: 20px;
            background: var(--st-bg-secondary);
        }

        .chat-message {
            margin-bottom: 15px;
            display: flex;
            gap: 12px;
        }

        .chat-message.user {
            flex-direction: row-reverse;
        }

        .chat-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .chat-message.assistant .chat-avatar {
            background: var(--st-primary-100);
        }

        .chat-message.user .chat-avatar {
            background: var(--st-gray-200);
        }

        .chat-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: var(--st-radius-xl);
            font-size: 14px;
            line-height: 1.6;
        }

        .chat-message.assistant .chat-bubble {
            background: var(--st-bg-primary);
            border: 1px solid var(--st-gray-200);
        }

        .chat-message.user .chat-bubble {
            background: var(--st-primary-500);
            color: white;
        }

        .chat-input-area {
            display: flex;
            padding: 15px;
            background: var(--st-bg-primary);
            border-top: 1px solid var(--st-gray-200);
            gap: 10px;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid var(--st-gray-200);
            border-radius: var(--st-radius-lg);
            font-size: 14px;
        }

        .chat-input-area input:focus {
            outline: none;
            border-color: var(--st-primary-500);
        }

        .btn-send {
            background: var(--st-primary-500);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: var(--st-radius-lg);
            cursor: pointer;
            font-size: 14px;
            font-weight: var(--st-font-semibold);
            transition: all 0.2s;
        }

        .btn-send:hover {
            background: var(--st-primary-600);
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 加载动画 */
        .loading-container {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading-container.active {
            display: block;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--st-gray-200);
            border-top-color: var(--st-primary-500);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--st-text-secondary);
            font-size: 14px;
        }

        /* 按钮组 */
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid var(--st-gray-200);
        }

        .btn-confirm {
            background: linear-gradient(135deg, var(--st-success-600), var(--st-success-500));
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: var(--st-radius-lg);
            font-size: 16px;
            font-weight: var(--st-font-semibold);
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: var(--st-shadow-lg);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .create-ai-container {
                padding: 20px 15px;
            }

            .method-cards {
                grid-template-columns: 1fr;
            }

            .method-content {
                padding: 25px;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-confirm,
            .btn-generate {
                width: 100%;
                justify-content: center;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .method-cards {
                gap: 16px;
            }

            .method-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar" role="navigation" aria-label="主导航">
        <div class="navbar-content">
            <a href="/" class="nav-brand" aria-label="StoryTree 首页">
                <img src="/assets/logo.png" alt="Logo" style="width: 32px; height: 32px; border-radius: 8px; margin-right: 8px;">
                StoryTree
            </a>
            <button class="mobile-menu-toggle" id="mobileMenuToggle" onclick="toggleMobileMenu()" aria-label="展开菜单" aria-expanded="false">
                <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <div class="nav-menu" id="navMenu" role="menubar">
                <a href="/" class="nav-link" role="menuitem">
                    <i class="fas fa-home" aria-hidden="true"></i> 首页
                </a>
                <a href="/discover.html" class="nav-link" role="menuitem">
                    <i class="fas fa-compass" aria-hidden="true"></i> 发现故事
                </a>
                <a href="/create.html" class="nav-link" role="menuitem">
                    <i class="fas fa-pen" aria-hidden="true"></i> 开始创作
                </a>
                <a href="/notifications.html" class="nav-link nav-notification" id="notificationIcon" role="menuitem" aria-label="消息通知" style="display: none;">
                    <i class="fas fa-bell" aria-hidden="true"></i> 消息
                    <span class="notification-badge" id="notificationBadge" style="display: none;" aria-live="polite">0</span>
                </a>
                <a href="/profile.html" class="nav-link" id="profileLink" role="menuitem">
                    <i class="fas fa-user" aria-hidden="true"></i> 个人中心
                </a>
            </div>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="create-ai-container">
        <div class="page-header">
            <h1><i class="fas fa-wand-magic-sparkles"></i> AI 辅助创作</h1>
            <p>让 AI 帮助你整理思路，生成专业的故事立项书和大纲</p>
        </div>

        <!-- 方法选择卡片 -->
        <div class="method-cards" id="methodCards">
            <div class="method-card" data-method="project">
                <div class="method-icon">💡</div>
                <h3>智能导入立项</h3>
                <p>将你的完整想法整理成规范的项目立项书，AI 会自动推导生成大纲</p>
            </div>
            <div class="method-card" data-method="outline">
                <div class="method-icon">📝</div>
                <h3>AI 辅助大纲</h3>
                <p>只有模糊想法？AI 帮你完善世界观、角色设定和分章大纲</p>
            </div>
            <div class="method-card" data-method="pastiche">
                <div class="method-icon">📚</div>
                <h3>经典仿写</h3>
                <p>基于已有作品进行仿写、续写或同人创作，AI 分析原作风格</p>
            </div>
            <div class="method-card" data-method="template">
                <div class="method-icon">🎯</div>
                <h3>故事模板</h3>
                <p>新手友好！使用预制模板快速搭建故事框架</p>
            </div>
        </div>

        <!-- 方法内容区域 -->
        <div class="method-content" id="methodContent">
            <!-- 动态内容，根据选择的方法显示不同表单 -->
        </div>

        <!-- 加载动画 -->
        <div class="loading-container" id="loadingContainer">
            <div class="spinner"></div>
            <p class="loading-text" id="loadingText">AI 正在思考中，请稍候...</p>
        </div>

        <!-- 生成结果 -->
        <div class="result-container" id="resultContainer">
            <div class="preview-card" id="previewContent">
                <!-- 动态内容 -->
            </div>

            <!-- 聊天区域 -->
            <div class="chat-container" id="chatContainer">
                <div class="chat-history" id="chatHistory"></div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="请描述需要修改的地方，例如：希望主角性格更开朗一些...">
                    <button class="btn-send" id="btnSend">发送</button>
                </div>
            </div>

            <!-- 按钮组 -->
            <div class="button-group">
                <button class="btn-back" id="btnBack">
                    <i class="fas fa-arrow-left"></i>
                    返回修改
                </button>
                <button class="btn-confirm" id="btnConfirm">
                    <i class="fas fa-check"></i>
                    确认创建故事
                </button>
            </div>
        </div>
    </div>

    <script src="js/navbar.js"></script>
    <script>
        // 移动端菜单切换
        function toggleMobileMenu() {
            const navMenu = document.getElementById('navMenu');
            const menuToggle = document.getElementById('mobileMenuToggle');
            if (navMenu && menuToggle) {
                navMenu.classList.toggle('active');
                const isExpanded = navMenu.classList.contains('active');
                menuToggle.setAttribute('aria-expanded', isExpanded);
            }
        }
    </script>
    <script src="js/pages/create-ai.js"></script>
</body>
</html>
