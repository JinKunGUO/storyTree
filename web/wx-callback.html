<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信登录中... - StoryTree</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(120deg, #3730A3 0%, #6366F1 38%, #A78BFA 62%, #EEF2FF 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(55,48,163,.2);
            max-width: 360px;
            width: 90%;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(99,102,241,.2);
            border-top-color: #6366F1;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 1.25rem; color: #1E1B4B; margin-bottom: 8px; }
        p { font-size: .9rem; color: #6B7280; }
        .error-icon { font-size: 3rem; margin-bottom: 16px; }
        .retry-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 24px;
            background: #6366F1;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: .9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background .2s;
        }
        .retry-btn:hover { background: #4F46E5; }
    </style>
</head>
<body>
    <div class="card" id="loadingCard">
        <div class="spinner"></div>
        <h2>正在登录...</h2>
        <p>请稍候，正在完成微信授权</p>
    </div>

    <div class="card" id="errorCard" style="display:none">
        <div class="error-icon">😢</div>
        <h2>登录失败</h2>
        <p id="errorMsg">微信授权失败，请重试</p>
        <a href="/login" class="retry-btn">返回登录页</a>
    </div>

    <script>
    (async function () {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');

        function showError(msg) {
            document.getElementById('loadingCard').style.display = 'none';
            document.getElementById('errorCard').style.display = 'block';
            document.getElementById('errorMsg').textContent = msg || '微信授权失败，请重试';
        }

        /**
         * 安全验证重定向 URL
         * 只允许相对路径，禁止外部跳转
         */
        function validateRedirectUrl(url) {
            if (!url || typeof url !== 'string') {
                return '/';
            }
            try {
                url = decodeURIComponent(url);
            } catch (e) {
                return '/';
            }
            url = url.replace(/[\s\x00-\x1F\x7F]/g, '');
            // 允许相对路径（以 / 开头但不以 // 开头）
            if (url.startsWith('/') && !url.startsWith('//')) {
                return url;
            }
            // 检查是否为当前域名
            try {
                const currentHost = window.location.hostname;
                const urlObj = new URL(url, window.location.origin);
                if (urlObj.hostname === currentHost &&
                    (urlObj.protocol === 'http:' || urlObj.protocol === 'https:')) {
                    return urlObj.pathname + urlObj.search + urlObj.hash;
                }
            } catch (e) {}
            console.warn('重定向 URL 验证失败，已阻止:', url);
            return '/';
        }

        // 校验 state 防 CSRF
        const savedState = sessionStorage.getItem('wx_state');
        if (state && savedState && state !== savedState) {
            showError('安全校验失败，请重新登录');
            return;
        }
        sessionStorage.removeItem('wx_state');

        if (!code) {
            showError('未获取到微信授权码，请重试');
            return;
        }

        try {
            const res = await fetch('/api/auth/wx-web-login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code })
            });
            const data = await res.json();

            if (!res.ok) {
                showError(data.error || '登录失败，请重试');
                return;
            }

            // 保存 token 和用户信息
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));

            // 跳转到原目标页或首页（验证重定向 URL 安全性）
            const rawRedirectUrl = sessionStorage.getItem('wx_redirect') || '/';
            const redirectUrl = validateRedirectUrl(rawRedirectUrl);
            sessionStorage.removeItem('wx_redirect');
            window.location.href = redirectUrl;
        } catch (err) {
            console.error('微信回调处理失败:', err);
            showError('网络错误，请检查网络连接后重试');
        }
    })();
    </script>
</body>
</html>
