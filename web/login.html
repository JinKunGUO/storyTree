<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - StoryTree</title>
    <link rel="stylesheet" href="styles.css">
    <link href="libs/fontawesome/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-tree"></i>
                    <h1>StoryTree</h1>
                </div>
                <p class="subtitle">欢迎回来，继续你的创作之旅</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" required 
                               placeholder="请输入邮箱地址">
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" required 
                               placeholder="请输入密码">
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-options">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span class="checkmark"></span>
                        记住我
                    </label>
                    <a href="/forgot-password.html" class="forgot-password">忘记密码？</a>
                </div>

                <button type="submit" class="auth-button" id="loginBtn">
                    <span class="button-text">登录</span>
                    <span class="button-loading" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i> 登录中...
                    </span>
                </button>

                <div class="auth-footer">
                    <p>还没有账号？ <a href="/register">立即注册</a></p>
                </div>
            </form>
        </div>

        <div class="auth-image">
            <div class="image-content">
                <i class="fas fa-tree"></i>
                <h2>欢迎回来</h2>
                <p>继续你的创作，让故事之树枝繁叶茂</p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
