<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - StoryTree</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/utilities.css">
    <link rel="stylesheet" href="styles.css">
    <link href="libs/fontawesome/css/all.min.css" rel="stylesheet">
    <style>
        /* ===== 登录页全局重置 ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --primary-light: #818CF8;
            --primary-50: #EEF2FF;
            --primary-100: #E0E7FF;
            --text-primary: #1E1B4B;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --border: #E5E7EB;
            --border-focus: #6366F1;
            --bg-input: #F9FAFB;
            --error: #EF4444;
            --success: #10B981;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
            --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
            --shadow-lg: 0 20px 60px rgba(99,102,241,.15), 0 8px 24px rgba(0,0,0,.08);
            --transition: 200ms cubic-bezier(.4,0,.2,1);
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Segoe UI', sans-serif;
            /* 整页渐变背景，从左深紫到右浅紫白 */
            background: linear-gradient(120deg, #3730A3 0%, #6366F1 38%, #A78BFA 62%, #EEF2FF 100%);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== 整体布局 - 全页渐变背景，表单卡片居中浮动 ===== */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: stretch;
            position: relative;
        }

        /* ===== 左侧品牌区 ===== */
        .brand-panel {
            position: relative;
            flex: 1;
            /* 完全透明，露出 body 渐变背景 */
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 48px;
            overflow: hidden;
        }

        /* 背景装饰圆 */
        .brand-panel::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: rgba(255,255,255,.07);
            top: -120px; right: -60px;
            pointer-events: none;
        }
        .brand-panel::after {
            content: '';
            position: absolute;
            width: 320px; height: 320px;
            border-radius: 50%;
            background: rgba(255,255,255,.05);
            bottom: -80px; left: -80px;
            pointer-events: none;
        }

        /* 浮动粒子 */
        .brand-particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,.12);
            animation: float-particle 8s ease-in-out infinite;
        }
        .particle:nth-child(1) { width:12px; height:12px; top:15%; left:10%; animation-delay:0s; }
        .particle:nth-child(2) { width:8px;  height:8px;  top:35%; left:80%; animation-delay:1.5s; }
        .particle:nth-child(3) { width:16px; height:16px; top:65%; left:15%; animation-delay:3s; }
        .particle:nth-child(4) { width:6px;  height:6px;  top:80%; left:70%; animation-delay:4.5s; }
        .particle:nth-child(5) { width:10px; height:10px; top:50%; left:50%; animation-delay:2s; }
        @keyframes float-particle {
            0%, 100% { transform: translateY(0) scale(1); opacity: .6; }
            50% { transform: translateY(-20px) scale(1.1); opacity: 1; }
        }

        .brand-content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
            max-width: 380px;
        }

        .brand-logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 88px; height: 88px;
            background: rgba(255,255,255,.15);
            border-radius: 24px;
            margin-bottom: 28px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,.2);
            box-shadow: 0 8px 32px rgba(0,0,0,.12);
        }
        .brand-logo-wrap svg {
            width: 44px; height: 44px;
            fill: white;
        }

        .brand-title {
            font-size: clamp(2rem, 3vw, 2.75rem);
            font-weight: 300;          /* 轻盈细体 */
            letter-spacing: .04em;     /* 宽松字间距，更飘逸 */
            color: white;              /* 全白，告别黑色压抑 */
            margin-bottom: 16px;
            line-height: 1.15;
            text-shadow: 0 2px 20px rgba(0,0,0,.15);
        }
        .brand-title span {
            display: block;
            font-size: .48em;
            font-weight: 400;
            letter-spacing: .22em;
            opacity: .7;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: rgba(255,255,255,.85);
        }

        .brand-desc {
            font-size: 1rem;
            line-height: 1.7;
            opacity: .85;
            margin-bottom: 40px;
        }

        /* 特性标签 */
        .brand-features {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .brand-feature {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            backdrop-filter: blur(4px);
            text-align: left;
            transition: background var(--transition);
        }
        .brand-feature:hover { background: rgba(255,255,255,.16); }
        .brand-feature-icon {
            width: 36px; height: 36px;
            background: rgba(255,255,255,.2);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }
        .brand-feature-text { font-size: .875rem; opacity: .9; line-height: 1.4; }
        .brand-feature-text strong { display: block; font-weight: 600; margin-bottom: 2px; }

        /* ===== 右侧表单区 - 浮动卡片，不占满列，无硬边界 ===== */
        .form-panel {
            /* 固定宽度卡片，左右各留出空白让渐变背景透出，与品牌区视觉平衡 */
            width: 400px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 44px 36px;
            margin: 40px 48px 40px 24px;
            /* 磨砂玻璃卡片 */
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(32px) saturate(1.5);
            -webkit-backdrop-filter: blur(32px) saturate(1.5);
            border-radius: 28px;
            box-shadow:
                0 32px 80px rgba(55, 48, 163, 0.18),
                0 8px 24px rgba(0, 0, 0, 0.08),
                inset 0 1px 0 rgba(255,255,255,0.6);
            overflow-y: auto;
        }

        .form-inner {
            width: 100%;
            max-width: 400px;
        }

        /* 顶部 logo（移动端显示） */
        .mobile-brand {
            display: none;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .mobile-brand-icon {
            width: 40px; height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .mobile-brand-icon svg { width: 22px; height: 22px; fill: white; }
        .mobile-brand-name {
            font-size: 1.375rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -.02em;
        }

        /* 表单标题 */
        .form-heading {
            margin-bottom: 32px;
        }
        .form-heading h2 {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -.03em;
            margin-bottom: 6px;
        }
        .form-heading p {
            font-size: .9375rem;
            color: var(--text-secondary);
        }

        /* 表单字段 */
        .field {
            margin-bottom: 20px;
        }
        .field-label {
            display: block;
            font-size: .875rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 7px;
        }
        .field-wrap {
            position: relative;
        }
        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 15px;
            pointer-events: none;
            transition: color var(--transition);
        }
        .field-input {
            width: 100%;
            height: 48px;
            padding: 0 44px;
            background: rgba(249, 250, 251, 0.9);
            border: 1.5px solid rgba(229, 231, 235, 0.8);
            border-radius: var(--radius-md);
            font-size: .9375rem;
            color: var(--text-primary);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
            -webkit-appearance: none;
        }
        .field-input::placeholder { color: var(--text-muted); }
        .field-input:focus {
            border-color: var(--border-focus);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(99,102,241,.12);
        }
        .field-input:focus + .field-icon,
        .field-wrap:focus-within .field-icon { color: var(--primary); }
        .field-wrap:focus-within .field-icon { color: var(--primary); }

        /* 密码可见切换 */
        .field-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            transition: color var(--transition), background var(--transition);
            font-size: 15px;
        }
        .field-toggle:hover { color: var(--primary); background: var(--primary-50); }

        /* 错误提示 */
        .field-error {
            display: block;
            font-size: .8125rem;
            color: var(--error);
            margin-top: 5px;
            min-height: 18px;
            line-height: 1.4;
        }
        .field-input.has-error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(239,68,68,.1);
        }

        /* 记住我 & 忘记密码 */
        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .remember-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: .875rem;
            color: var(--text-secondary);
            user-select: none;
        }
        .remember-label input[type="checkbox"] { display: none; }
        .custom-checkbox {
            width: 18px; height: 18px;
            border: 1.5px solid var(--border);
            border-radius: 5px;
            background: white;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all var(--transition);
        }
        .remember-label input:checked ~ .custom-checkbox {
            background: var(--primary);
            border-color: var(--primary);
        }
        .custom-checkbox-tick {
            width: 10px; height: 10px;
            fill: none;
            stroke: white;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            transform: scale(.5);
            transition: all var(--transition);
        }
        .remember-label input:checked ~ .custom-checkbox .custom-checkbox-tick {
            opacity: 1;
            transform: scale(1);
        }
        .forgot-link {
            font-size: .875rem;
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: color var(--transition);
        }
        .forgot-link:hover { color: var(--primary-dark); text-decoration: underline; }

        /* 登录按钮 */
        .submit-btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, var(--primary) 0%, #7C3AED 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
            box-shadow: 0 4px 16px rgba(99,102,241,.35);
            letter-spacing: .01em;
            position: relative;
            overflow: hidden;
        }
        .submit-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background var(--transition);
        }
        .submit-btn:hover:not(:disabled)::after { background: rgba(255,255,255,.08); }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(99,102,241,.45);
        }
        .submit-btn:active:not(:disabled) { transform: translateY(0); }
        .submit-btn:disabled {
            opacity: .65;
            cursor: not-allowed;
            box-shadow: none;
        }
        .btn-spinner {
            width: 18px; height: 18px;
            border: 2.5px solid rgba(255,255,255,.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 分割线 */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-muted);
            font-size: .8125rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* 注册引导 */
        .register-hint {
            text-align: center;
            font-size: .9rem;
            color: var(--text-secondary);
        }
        .register-hint a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            transition: color var(--transition);
        }
        .register-hint a:hover { color: var(--primary-dark); }

        /* 微信登录按钮 */
        .wx-login-btn {
            width: 100%;
            height: 50px;
            background: #07C160;
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
            box-shadow: 0 4px 16px rgba(7,193,96,.3);
            text-decoration: none;
            letter-spacing: .01em;
            margin-top: 12px;
        }
        .wx-login-btn:hover {
            background: #06AD56;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(7,193,96,.4);
        }
        .wx-login-btn:active { transform: translateY(0); }
        .wx-login-btn svg { flex-shrink: 0; }

        /* 邮箱未验证提示横幅 */
        .email-unverified-banner {
            display: none;
            background: #FFF7ED;
            border: 1.5px solid #FED7AA;
            border-radius: var(--radius-md);
            padding: 14px 16px;
            margin-bottom: 20px;
            font-size: .875rem;
            color: #92400E;
            line-height: 1.5;
        }
        .email-unverified-banner.visible { display: block; }
        .email-unverified-banner strong { display: block; margin-bottom: 4px; color: #78350F; }
        .resend-verify-btn {
            display: inline-block;
            margin-top: 8px;
            padding: 5px 12px;
            background: #F97316;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: .8125rem;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
        }
        .resend-verify-btn:hover { background: #EA580C; }
        .resend-verify-btn:disabled { opacity: .6; cursor: not-allowed; }

        /* 底部版权 */
        .form-footer {
            margin-top: 40px;
            text-align: center;
            font-size: .75rem;
            color: var(--text-muted);
        }
        .form-footer a { color: var(--text-muted); text-decoration: none; }
        .form-footer a:hover { color: var(--primary); }

        /* ===== 响应式 ===== */

        /* 平板（竖屏）：隐藏品牌区，卡片全屏 */
        @media (max-width: 900px) {
            .login-page { flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
            .brand-panel { display: none; }
            .form-panel {
                width: 100%;
                max-width: 480px;
                margin: 0;
                border-radius: 24px;
                padding: 40px 32px;
                background: rgba(255,255,255,0.88);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
            }
            .mobile-brand { display: flex; }
        }

        /* 手机小屏 */
        @media (max-width: 480px) {
            .login-page { padding: 16px; }
            .form-panel {
                padding: 32px 24px;
                border-radius: 20px;
            }
            .form-heading h2 { font-size: 1.5rem; }
            .field-input { height: 52px; font-size: 1rem; }
            .submit-btn { height: 52px; font-size: 1rem; }
        }

        /* 大屏优化 */
        @media (min-width: 1400px) {
            .brand-panel { padding: 80px 72px; }
            .form-panel { width: 440px; padding: 52px 44px; margin: 48px 64px 48px 28px; }
            .form-inner { max-width: 440px; }
        }

        /* 减少动画（无障碍） */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
        }
    </style>
</head>
<body>
    <div class="login-page">

        <!-- 左侧品牌面板 -->
        <div class="brand-panel" aria-hidden="true">
            <div class="brand-particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>
            <div class="brand-content">
                <div class="brand-logo-wrap">
                    <!-- 树形 SVG icon -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C9.5 2 7.5 4 7.5 6.5c0 .8.2 1.5.5 2.1C6.3 9.1 5 10.7 5 12.5c0 1.4.7 2.7 1.8 3.5H10v4h4v-4h3.2c1.1-.8 1.8-2.1 1.8-3.5 0-1.8-1.3-3.4-3-3.9.3-.6.5-1.3.5-2.1C16.5 4 14.5 2 12 2z"/>
                    </svg>
                </div>
                <h1 class="brand-title">
                    <span>Welcome Back</span>
                    StoryTree
                </h1>
                <p class="brand-desc">每一个故事都是一片叶子，<br>每一次创作都让树更繁茂。</p>
                <div class="brand-features">
                    <div class="brand-feature">
                        <div class="brand-feature-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        </div>
                        <div class="brand-feature-text">
                            <strong>自由创作</strong>
                            构建属于你的故事宇宙
                        </div>
                    </div>
                    <div class="brand-feature">
                        <div class="brand-feature-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                        </div>
                        <div class="brand-feature-text">
                            <strong>AI 辅助续写</strong>
                            突破创作瓶颈，灵感不断
                        </div>
                    </div>
                    <div class="brand-feature">
                        <div class="brand-feature-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
                        </div>
                        <div class="brand-feature-text">
                            <strong>社区互动</strong>
                            与万千创作者共同成长
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧表单面板 -->
        <main class="form-panel">
            <div class="form-inner">

                <!-- 移动端 logo -->
                <div class="mobile-brand">
                    <div class="mobile-brand-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C9.5 2 7.5 4 7.5 6.5c0 .8.2 1.5.5 2.1C6.3 9.1 5 10.7 5 12.5c0 1.4.7 2.7 1.8 3.5H10v4h4v-4h3.2c1.1-.8 1.8-2.1 1.8-3.5 0-1.8-1.3-3.4-3-3.9.3-.6.5-1.3.5-2.1C16.5 4 14.5 2 12 2z"/>
                        </svg>
                    </div>
                    <span class="mobile-brand-name">StoryTree</span>
                </div>

                <!-- 标题 -->
                <div class="form-heading">
                    <h2>欢迎回来</h2>
                    <p>登录你的账号，继续你的创作之旅</p>
                </div>

                <!-- 邮箱未验证提示 -->
                <div class="email-unverified-banner" id="unverifiedBanner">
                    <strong>邮箱尚未验证</strong>
                    请查收验证邮件并点击链接后再登录。没收到？
                    <button class="resend-verify-btn" id="resendVerifyBtn" type="button">重新发送验证邮件</button>
                </div>

                <!-- 登录表单 -->
                <form id="loginForm" novalidate>

                    <!-- 邮箱 -->
                    <div class="field">
                        <label class="field-label" for="email">邮箱地址</label>
                        <div class="field-wrap">
                            <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            <input class="field-input" type="email" id="email" name="email"
                                   placeholder="your@email.com" autocomplete="email" required>
                        </div>
                        <span class="field-error" id="emailError" role="alert"></span>
                    </div>

                    <!-- 密码 -->
                    <div class="field">
                        <label class="field-label" for="password">密码</label>
                        <div class="field-wrap">
                            <svg class="field-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input class="field-input" type="password" id="password" name="password"
                                   placeholder="请输入密码" autocomplete="current-password" required>
                            <button type="button" class="field-toggle" id="togglePwd" aria-label="显示/隐藏密码">
                                <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                        <span class="field-error" id="passwordError" role="alert"></span>
                    </div>

                    <!-- 记住我 & 忘记密码 -->
                    <div class="form-options">
                        <label class="remember-label">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span class="custom-checkbox">
                                <svg class="custom-checkbox-tick" viewBox="0 0 12 12">
                                    <polyline points="2,6 5,9 10,3"/>
                                </svg>
                            </span>
                            记住我
                        </label>
                        <a href="/forgot-password.html" class="forgot-link">忘记密码？</a>
                    </div>

                    <!-- 提交 -->
                    <button type="submit" class="submit-btn" id="loginBtn">
                        <span id="btnText">登录</span>
                    </button>

                </form>

                <!-- 微信扫码登录 -->
                <a href="#" class="wx-login-btn" id="wxLoginBtn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8.5 10.5a1 1 0 100-2 1 1 0 000 2zm5 0a1 1 0 100-2 1 1 0 000 2z"/>
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zM6.5 9.5C6.5 7.567 9.015 6 12 6s5.5 1.567 5.5 3.5c0 1.933-2.515 3.5-5.5 3.5-.618 0-1.21-.07-1.757-.198L8 14l.5-1.5C7.03 11.85 6.5 10.73 6.5 9.5zm6.5 3.5c2.209 0 4-1.343 4-3s-1.791-3-4-3-4 1.343-4 3c0 .848.462 1.614 1.21 2.17L9.5 13.5l1.75-.875c.236.04.48.062.726.073L12 13z"/>
                    </svg>
                    微信扫码登录
                </a>

                <div class="divider">或</div>

                <!-- 注册引导 -->
                <p class="register-hint">
                    还没有账号？<a href="/register">立即免费注册</a>
                </p>

                <!-- 版权 -->
                <div class="form-footer">
                    &copy; 2026 StoryTree &nbsp;·&nbsp;
                    <a href="/user-agreement">用户协议</a>&nbsp;·&nbsp;
                    <a href="/privacy">隐私政策</a>
                </div>

            </div>
        </main>
    </div>

    <script src="auth.js"></script>
    <script src="js/loading.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script>
        // 密码显示/隐藏
        (function () {
            const btn = document.getElementById('togglePwd');
            const input = document.getElementById('password');
            const eyeOpen = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
            const eyeOff  = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
            if (btn && input) {
                btn.addEventListener('click', function () {
                    const isHidden = input.type === 'password';
                    input.type = isHidden ? 'text' : 'password';
                    btn.innerHTML = isHidden ? eyeOff : eyeOpen;
                    btn.setAttribute('aria-label', isHidden ? '隐藏密码' : '显示密码');
                });
            }
        })();

        // 表单错误样式联动
        (function () {
            ['email', 'password'].forEach(function (id) {
                const input = document.getElementById(id);
                const error = document.getElementById(id + 'Error');
                if (!input || !error) return;
                // 用 MutationObserver 监听 error 文本变化来切换 has-error 类
                const observer = new MutationObserver(function () {
                    input.classList.toggle('has-error', !!error.textContent.trim());
                });
                observer.observe(error, { childList: true, characterData: true, subtree: true });
                // 输入时清除错误
                input.addEventListener('input', function () {
                    error.textContent = '';
                    input.classList.remove('has-error');
                });
            });
        })();

        // 登录按钮加载态
        (function () {
            const form = document.getElementById('loginForm');
            const btn  = document.getElementById('loginBtn');
            const text = document.getElementById('btnText');
            if (!form || !btn) return;
            const spinner = `<span class="btn-spinner"></span>`;

            // 劫持 auth.js 的 disabled 逻辑，监听 disabled 属性变化
            const obs = new MutationObserver(function () {
                if (btn.disabled) {
                    btn.innerHTML = spinner + '<span>登录中...</span>';
                } else {
                    btn.innerHTML = '<span id="btnText">登录</span>';
                }
            });
            obs.observe(btn, { attributes: true, attributeFilter: ['disabled'] });
        })();

        // 微信扫码登录跳转
        (function () {
            const wxBtn = document.getElementById('wxLoginBtn');
            if (!wxBtn) return;

            // 从后端获取微信配置，决定是否显示按钮
            fetch('/api/auth/wx-web-config')
                .then(r => r.json())
                .then(function (cfg) {
                    if (!cfg.enabled) {
                        // AppID 未配置，隐藏按钮
                        wxBtn.style.display = 'none';
                        return;
                    }
                    // 挂载 AppID 供点击时使用
                    wxBtn._appId = cfg.wxWebAppId;
                })
                .catch(function () {
                    // 接口异常时隐藏按钮，避免用户点击后报错
                    wxBtn.style.display = 'none';
                });

            wxBtn.addEventListener('click', function (e) {
                e.preventDefault();
                const appId = wxBtn._appId;
                if (!appId) {
                    alert('微信扫码登录暂未配置，请使用邮箱登录');
                    return;
                }
                const redirectUri = encodeURIComponent(window.location.origin + '/wx-callback.html');
                const state = Math.random().toString(36).slice(2);
                sessionStorage.setItem('wx_state', state);
                sessionStorage.setItem('wx_redirect', new URLSearchParams(window.location.search).get('redirect') || '/');
                const wxUrl = `https://open.weixin.qq.com/connect/qrconnect?appid=${appId}&redirect_uri=${redirectUri}&response_type=code&scope=snsapi_login&state=${state}#wechat_redirect`;
                window.location.href = wxUrl;
            });
        })();

        // 邮箱未验证提示 & 重新发送
        (function () {
            const banner = document.getElementById('unverifiedBanner');
            const resendBtn = document.getElementById('resendVerifyBtn');
            if (!banner || !resendBtn) return;

            // 监听 auth.js 触发的自定义事件
            document.addEventListener('login:email-unverified', function (e) {
                const email = e.detail && e.detail.email;
                banner.classList.add('visible');
                resendBtn._email = email;
            });

            resendBtn.addEventListener('click', async function () {
                const email = resendBtn._email;
                if (!email) return;
                resendBtn.disabled = true;
                resendBtn.textContent = '发送中...';
                try {
                    const res = await fetch('/api/auth/resend-verification', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email })
                    });
                    if (res.ok) {
                        resendBtn.textContent = '已发送！请查收邮箱';
                    } else {
                        resendBtn.textContent = '发送失败，请稍后重试';
                        resendBtn.disabled = false;
                    }
                } catch (err) {
                    resendBtn.textContent = '发送失败，请稍后重试';
                    resendBtn.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>
