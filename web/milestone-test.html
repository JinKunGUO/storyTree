<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>积分与里程碑测试 - StoryTree</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/utilities.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--st-bg-secondary);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, var(--st-primary-500) 0%, var(--st-primary-700) 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        
        .stat-card h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
        }
        
        .badge-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
        }
        
        .badge-item {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .badge-item.unlocked {
            border-color: var(--st-primary-500);
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }
        
        .badge-item.locked {
            opacity: 0.5;
            filter: grayscale(100%);
        }
        
        .badge-emoji {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        .badge-name {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .badge-desc {
            font-size: 0.85em;
            color: #666;
        }
        
        .badge-status {
            margin-top: 10px;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }
        
        .badge-status.unlocked {
            background: #4caf50;
            color: white;
        }
        
        .badge-status.locked {
            background: #e0e0e0;
            color: #666;
        }
        
        .progress-section {
            margin-top: 30px;
        }
        
        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e0e0e0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--st-primary-500) 0%, var(--st-primary-700) 100%);
            transition: width 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.85em;
        }
        
        .next-milestone {
            margin-top: 15px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            border-left: 4px solid var(--st-primary-500);
        }
        
        .test-actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--st-primary-500) 0%, var(--st-primary-700) 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .points-history {
            max-height: 400px;
            overflow-y: auto;
        }
        
        .history-item {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .history-item:last-child {
            border-bottom: none;
        }
        
        .history-amount {
            font-weight: bold;
            font-size: 1.2em;
        }
        
        .history-amount.positive {
            color: #4caf50;
        }
        
        .history-amount.negative {
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 积分与里程碑系统</h1>
            <p>测试和查看你的创作成就</p>
        </div>

        <div id="error-message" class="error" style="display: none;"></div>
        <div id="loading" class="loading">加载中...</div>
        
        <div id="content" style="display: none;">
            <!-- 统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <h3>累计码字</h3>
                    <div class="value" id="word-count">0</div>
                    <small>字</small>
                </div>
                <div class="stat-card">
                    <h3>当前积分</h3>
                    <div class="value" id="points">0</div>
                    <small>分</small>
                </div>
                <div class="stat-card">
                    <h3>已解锁徽章</h3>
                    <div class="value" id="unlocked-badges">0</div>
                    <small>个</small>
                </div>
                <div class="stat-card">
                    <h3>补签机会</h3>
                    <div class="value" id="makeup-chances">0</div>
                    <small>次</small>
                </div>
            </div>

            <!-- 下一个里程碑进度 -->
            <div class="card">
                <h2>📈 下一个里程碑</h2>
                <div class="progress-section">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill" style="width: 0%;">
                            <span id="progress-text">0%</span>
                        </div>
                    </div>
                    <div class="next-milestone" id="next-milestone">
                        <strong>目标：</strong> <span id="milestone-target">加载中...</span>
                    </div>
                </div>
            </div>

            <!-- 徽章展示 -->
            <div class="card">
                <h2>🎖️ 成就徽章</h2>
                <div class="badge-grid" id="badge-grid">
                    <!-- 徽章将通过JavaScript动态加载 -->
                </div>
            </div>

            <!-- 积分明细 -->
            <div class="card">
                <h2>💰 积分明细</h2>
                <div class="points-history" id="points-history">
                    <!-- 积分记录将通过JavaScript动态加载 -->
                </div>
            </div>

            <!-- 测试操作 -->
            <div class="card">
                <h2>🧪 测试操作</h2>
                <div class="test-actions">
                    <button class="btn btn-primary" onclick="refreshData()">🔄 刷新数据</button>
                    <button class="btn btn-secondary" onclick="createTestStory()">📝 创建测试故事</button>
                    <button class="btn btn-secondary" onclick="createTestChapter()">✍️ 创建1500字章节</button>
                    <button class="btn btn-secondary" onclick="window.location.href='/profile.html'">👤 返回个人中心</button>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="js/loading.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script>
        const API_BASE = '/api';
        let currentStoryId = null;

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', async () => {
            if (!isLoggedIn()) {
                showError('请先登录');
                setTimeout(() => {
                    window.location.href = '/login.html';
                }, 2000);
                return;
            }

            await loadAllData();
        });

        // 加载所有数据
        async function loadAllData() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('content').style.display = 'none';

                // 并行加载所有数据
                const [userData, badgeData, pointsData] = await Promise.all([
                    fetchUserData(),
                    fetchBadges(),
                    fetchPointsHistory()
                ]);

                // 更新统计数据
                updateStats(userData);
                
                // 更新徽章显示
                updateBadges(badgeData);
                
                // 更新进度条
                updateProgress(userData.word_count, badgeData.next_milestone);
                
                // 更新积分明细
                updatePointsHistory(pointsData);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } catch (error) {
                console.error('加载数据失败:', error);
                showError('加载数据失败: ' + error.message);
                document.getElementById('loading').style.display = 'none';
            }
        }

        // 获取用户数据
        async function fetchUserData() {
            const response = await fetch(`${API_BASE}/auth/me`, {
                headers: {
                    'Authorization': `Bearer ${getToken()}`
                }
            });

            if (!response.ok) {
                throw new Error('获取用户信息失败');
            }

            const data = await response.json();
            return data.user;
        }

        // 获取徽章数据
        async function fetchBadges() {
            const response = await fetch(`${API_BASE}/badges`, {
                headers: {
                    'Authorization': `Bearer ${getToken()}`
                }
            });

            if (!response.ok) {
                throw new Error('获取徽章数据失败');
            }

            return await response.json();
        }

        // 获取积分历史
        async function fetchPointsHistory() {
            const response = await fetch(`${API_BASE}/points/history?page=1&limit=20`, {
                headers: {
                    'Authorization': `Bearer ${getToken()}`
                }
            });

            if (!response.ok) {
                // 如果API不存在，返回空数组
                return { records: [] };
            }

            return await response.json();
        }

        // 更新统计数据
        function updateStats(userData) {
            document.getElementById('word-count').textContent = userData.word_count || 0;
            document.getElementById('points').textContent = userData.points || 0;
            document.getElementById('makeup-chances').textContent = userData.makeup_chances || 0;
        }

        // 更新徽章显示
        function updateBadges(badgeData) {
            const badgeGrid = document.getElementById('badge-grid');
            badgeGrid.innerHTML = '';

            const unlockedCount = badgeData.badges.filter(b => b.unlocked).length;
            document.getElementById('unlocked-badges').textContent = unlockedCount;

            badgeData.badges.forEach(badge => {
                const badgeItem = document.createElement('div');
                badgeItem.className = `badge-item ${badge.unlocked ? 'unlocked' : 'locked'}`;
                badgeItem.innerHTML = `
                    <div class="badge-emoji">${badge.emoji}</div>
                    <div class="badge-name">${badge.name}</div>
                    <div class="badge-desc">${badge.description}</div>
                    <div class="badge-status ${badge.unlocked ? 'unlocked' : 'locked'}">
                        ${badge.unlocked ? '✓ 已解锁' : '🔒 未解锁'}
                    </div>
                `;
                badgeGrid.appendChild(badgeItem);
            });
        }

        // 更新进度条
        function updateProgress(currentWords, nextMilestone) {
            if (!nextMilestone) {
                document.getElementById('next-milestone').innerHTML = 
                    '<strong>🎉 恭喜！</strong> 你已经达成所有里程碑！';
                document.getElementById('progress-fill').style.width = '100%';
                document.getElementById('progress-text').textContent = '100%';
                return;
            }

            const targetWords = nextMilestone.words;
            const progress = Math.min((currentWords / targetWords) * 100, 100);
            
            document.getElementById('progress-fill').style.width = progress + '%';
            document.getElementById('progress-text').textContent = progress.toFixed(1) + '%';
            
            document.getElementById('milestone-target').innerHTML = 
                `${nextMilestone.badge.emoji} <strong>${nextMilestone.badge.name}</strong> - 
                ${currentWords.toLocaleString()} / ${targetWords.toLocaleString()} 字 
                (还需 ${(targetWords - currentWords).toLocaleString()} 字，奖励 ${nextMilestone.reward} 积分)`;
        }

        // 更新积分明细
        function updatePointsHistory(pointsData) {
            const historyContainer = document.getElementById('points-history');
            
            if (!pointsData.records || pointsData.records.length === 0) {
                historyContainer.innerHTML = '<div style="text-align: center; padding: 40px; color: #999;">暂无积分记录</div>';
                return;
            }

            historyContainer.innerHTML = '';
            pointsData.records.forEach(record => {
                const item = document.createElement('div');
                item.className = 'history-item';
                const isPositive = record.amount > 0;
                item.innerHTML = `
                    <div>
                        <div><strong>${record.description}</strong></div>
                        <small style="color: #999;">${new Date(record.created_at).toLocaleString('zh-CN')}</small>
                    </div>
                    <div class="history-amount ${isPositive ? 'positive' : 'negative'}">
                        ${isPositive ? '+' : ''}${record.amount}
                    </div>
                `;
                historyContainer.appendChild(item);
            });
        }

        // 刷新数据
        async function refreshData() {
            await loadAllData();
            window.toast ? toast.success('数据已刷新！') : alert('数据已刷新！');
        }

        // 创建测试故事
        async function createTestStory() {
            try {
                const response = await fetch(`${API_BASE}/stories`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${getToken()}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: `测试故事 ${new Date().toLocaleString()}`,
                        description: '这是一个用于测试码字统计的故事',
                        tags: ['测试']
                    })
                });

                if (!response.ok) {
                    throw new Error('创建故事失败');
                }

                const data = await response.json();
                currentStoryId = data.story.id;
                window.toast ? toast.success(`测试故事创建成功！ID: ${currentStoryId}`) : alert(`测试故事创建成功！ID: ${currentStoryId}`);
            } catch (error) {
                showError('创建测试故事失败: ' + error.message);
            }
        }

        // 创建测试章节
        async function createTestChapter() {
            if (!currentStoryId) {
                window.toast ? toast.warning('请先创建测试故事') : alert('请先创建测试故事');
                return;
            }

            try {
                // 生成1500字的测试内容
                let content = '';
                for (let i = 0; i < 167; i++) {
                    content += '这是测试内容。';
                }

                const response = await fetch(`${API_BASE}/nodes`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${getToken()}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        storyId: currentStoryId.toString(),
                        title: `测试章节 ${new Date().toLocaleString()}`,
                        content: content,
                        parentId: null,
                        isPublished: true
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || '创建章节失败');
                }

                const data = await response.json();
                window.toast ? toast.success(`章节创建成功！ID: ${data.node.id}，字数: ${content.length}，3秒后刷新数据...`) : alert(`章节创建成功！ID: ${data.node.id}\n字数: ${content.length}\n等待3秒后刷新数据...`);
                
                // 等待异步处理
                setTimeout(async () => {
                    await loadAllData();
                    window.toast ? toast.success('数据已刷新！请查看码字数和积分是否增加。') : alert('数据已刷新！请查看码字数和积分是否增加。');
                }, 3000);
            } catch (error) {
                showError('创建测试章节失败: ' + error.message);
            }
        }

        // 显示错误
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        // 获取token
        function getToken() {
            return localStorage.getItem('token');
        }

        // 检查是否登录
        function isLoggedIn() {
            return !!getToken();
        }
    </script>
    <!-- 页脚 -->
    <footer style="text-align: center; padding: 20px; margin-top: 40px; border-top: 1px solid #e5e7eb; color: #6b7280; font-size: 14px;">
        <p>© 2026 StoryTree. 用心创作每一个故事。</p>

            <span style="margin: 0 8px;">|</span>

                <img src="/assets/beian-icon.png" alt="公安备案图标" style="width: 14px; height: 14px; vertical-align: middle;">
                浙公网安备 33011002019543 号
            </a></p>
    </footer>

</body>
</html>
