<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发现故事 - StoryTree</title>
    <!-- 字体预连接（提升加载速度） -->
    <!-- 设计系统 -->
    <link rel="stylesheet" href="styles/design-system.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/utilities.css">
    <link href="libs/fontawesome/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: var(--st-bg-secondary);
            min-height: 100vh;
        }

        /* ===== 导航栏 ===== */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--st-gray-200);
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            transition: box-shadow var(--st-duration-normal) var(--st-ease-default);
        }
        .navbar.scrolled { box-shadow: var(--st-shadow-md); }
        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: var(--st-container-xl);
            margin: 0 auto;
            height: 64px;
            padding: 0 var(--st-page-padding-x-lg);
        }
        .nav-brand {
            display: flex; align-items: center; gap: var(--st-space-2);
            font-family: var(--st-font-display); font-size: var(--st-text-2xl);
            font-weight: var(--st-font-bold); color: var(--st-primary-600);
            text-decoration: none;
        }
        .nav-brand:hover { color: var(--st-primary-700); text-decoration: none; }
        .nav-menu { display: flex; gap: var(--st-space-1); align-items: center; }
        .nav-link {
            display: flex; align-items: center; gap: var(--st-space-2);
            color: var(--st-text-secondary); text-decoration: none;
            padding: var(--st-space-2) var(--st-space-3);
            border-radius: var(--st-radius-lg); font-size: var(--st-text-sm);
            font-weight: var(--st-font-medium);
            transition: all var(--st-duration-fast) var(--st-ease-default);
        }
        .nav-link:hover { background: var(--st-primary-50); color: var(--st-primary-600); text-decoration: none; }
        .nav-link.active { background: var(--st-primary-100); color: var(--st-primary-700); }
        .nav-link.nav-link-primary {
            background: var(--st-gradient-brand); color: white;
            padding: var(--st-space-2) var(--st-space-4);
        }
        .nav-link.nav-link-primary:hover {
            background: var(--st-gradient-brand-hover); color: white;
            transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.3);
        }
        .nav-notification { position: relative; }
        .notification-badge {
            position: absolute; top: 2px; right: 4px;
            background: var(--st-error-500); color: white;
            border-radius: var(--st-radius-full); padding: 1px 5px;
            font-size: 10px; font-weight: var(--st-font-bold); min-width: 16px;
            text-align: center; line-height: 1.4;
        }
        .mobile-menu-toggle {
            display: none; background: none; border: none;
            font-size: var(--st-text-xl); cursor: pointer;
            color: var(--st-text-secondary); padding: var(--st-space-2);
            border-radius: var(--st-radius-md); transition: all var(--st-duration-fast);
        }
        .mobile-menu-toggle:hover { background: var(--st-gray-100); color: var(--st-text-primary); }
        @media (max-width: 768px) {
            .navbar-content { padding: 0 var(--st-page-padding-x); }
            .mobile-menu-toggle { display: flex; align-items: center; justify-content: center; }
            .nav-menu {
                display: none; position: fixed; top: 64px; left: 0; right: 0;
                background: white; flex-direction: column;
                padding: var(--st-space-4); gap: var(--st-space-1);
                box-shadow: var(--st-shadow-lg); border-top: 1px solid var(--st-gray-100); z-index: 999;
            }
            .nav-menu.active { display: flex; }
            .nav-link { width: 100%; padding: var(--st-space-3) var(--st-space-4); font-size: var(--st-text-base); }
        }

        /* ===== 页面头部 Hero ===== */
        .discover-hero {
            position: relative;
            padding: calc(64px + var(--st-space-16)) var(--st-page-padding-x-lg) var(--st-space-16);
            background: var(--st-gradient-bg);
            overflow: hidden;
            text-align: center;
        }
        .discover-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.06;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .discover-hero-content {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
            color: white;
            animation: slideInUp var(--st-duration-slow) var(--st-ease-out);
        }
        .discover-hero-title {
            font-family: var(--st-font-display);
            font-size: clamp(2rem, 6vw, 3rem);
            font-weight: var(--st-font-bold);
            margin-bottom: var(--st-space-4);
        }
        .discover-hero-desc {
            font-size: var(--st-text-lg);
            opacity: 0.9;
            margin-bottom: var(--st-space-8);
        }

        /* ===== 搜索区域 ===== */
        .search-section {
            background: white;
            border-radius: var(--st-radius-2xl);
            padding: var(--st-space-6);
            box-shadow: var(--st-shadow-xl);
            max-width: 700px;
            margin: 0 auto;
        }
        .search-box {
            display: flex;
            gap: var(--st-space-3);
            margin-bottom: var(--st-space-4);
        }
        .search-input-wrap {
            flex: 1;
            position: relative;
        }
        .search-input-wrap i {
            position: absolute;
            left: var(--st-space-4);
            top: 50%;
            transform: translateY(-50%);
            color: var(--st-gray-400);
        }
        .search-input {
            width: 100%;
            padding: var(--st-space-3) var(--st-space-4) var(--st-space-3) var(--st-space-10);
            border: 2px solid var(--st-gray-200);
            border-radius: var(--st-radius-lg);
            font-size: var(--st-text-base);
            font-family: var(--st-font-sans);
            transition: all var(--st-duration-fast);
            background: var(--st-gray-50);
        }
        .search-input:focus {
            outline: none;
            border-color: var(--st-primary-500);
            background: white;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
        }
        .filter-tabs {
            display: flex;
            gap: var(--st-space-2);
            flex-wrap: wrap;
        }
        .filter-tab {
            display: inline-flex;
            align-items: center;
            gap: var(--st-space-1);
            padding: var(--st-space-2) var(--st-space-4);
            background: var(--st-gray-100);
            border: 2px solid transparent;
            border-radius: var(--st-radius-full);
            font-size: var(--st-text-sm);
            font-weight: var(--st-font-medium);
            color: var(--st-text-secondary);
            cursor: pointer;
            transition: all var(--st-duration-fast);
        }
        .filter-tab:hover { background: var(--st-primary-50); color: var(--st-primary-600); border-color: var(--st-primary-200); }
        .filter-tab.active { background: var(--st-primary-500); color: white; border-color: var(--st-primary-500); }
        @media (max-width: 640px) {
            .search-box { flex-direction: column; }
            .discover-hero { padding: calc(64px + var(--st-space-10)) var(--st-page-padding-x) var(--st-space-10); }
        }

        /* ===== 主内容区 ===== */
        .discover-main {
            max-width: var(--st-container-xl);
            margin: 0 auto;
            padding: var(--st-space-12) var(--st-page-padding-x-lg);
        }
        @media (max-width: 768px) {
            .discover-main { padding: var(--st-space-8) var(--st-page-padding-x); }
        }

        /* ===== 热门故事特殊布局 ===== */
        .hot-stories-layout {
            display: grid;
            grid-template-columns: 1.8fr 1fr;
            gap: var(--st-space-6);
            margin-bottom: var(--st-space-12);
        }
        @media (max-width: 1024px) {
            .hot-stories-layout { grid-template-columns: 1fr; }
        }
        .featured-story-card {
            background: white;
            border-radius: var(--st-radius-2xl);
            overflow: hidden;
            box-shadow: var(--st-shadow-lg);
            cursor: pointer;
            transition: all var(--st-duration-slow) var(--st-ease-bounce);
            border: 1px solid var(--st-gray-100);
        }
        .featured-story-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--st-shadow-xl);
        }
        .featured-cover {
            height: 280px;
            background: linear-gradient(135deg, #EC4899, #F43F5E);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 4rem;
            position: relative;
        }
        .featured-badge {
            position: absolute;
            top: var(--st-space-4);
            left: var(--st-space-4);
            background: var(--st-gradient-gold);
            color: white;
            padding: var(--st-space-2) var(--st-space-4);
            border-radius: var(--st-radius-full);
            font-size: var(--st-text-sm);
            font-weight: var(--st-font-bold);
            display: flex;
            align-items: center;
            gap: var(--st-space-2);
            box-shadow: 0 4px 12px rgba(255,165,0,0.4);
        }
        .featured-stats {
            position: absolute;
            bottom: var(--st-space-4);
            right: var(--st-space-4);
            display: flex;
            gap: var(--st-space-2);
        }
        .featured-stat-pill {
            background: rgba(255,255,255,0.92);
            color: var(--st-primary-700);
            padding: var(--st-space-1) var(--st-space-3);
            border-radius: var(--st-radius-full);
            font-size: var(--st-text-xs);
            font-weight: var(--st-font-semibold);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .featured-body { padding: var(--st-space-5); }
        .featured-title {
            font-size: var(--st-text-xl);
            font-weight: var(--st-font-bold);
            color: var(--st-text-primary);
            margin-bottom: var(--st-space-2);
        }
        .featured-desc {
            font-size: var(--st-text-sm);
            color: var(--st-text-secondary);
            line-height: var(--st-leading-relaxed);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: var(--st-space-3);
        }
        .featured-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: var(--st-space-3);
            border-top: 1px solid var(--st-gray-100);
            font-size: var(--st-text-sm);
            color: var(--st-text-tertiary);
        }

        /* 排行榜 */
        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: var(--st-space-3);
        }
        .ranking-item {
            display: flex;
            align-items: center;
            gap: var(--st-space-3);
            background: white;
            border-radius: var(--st-radius-xl);
            padding: var(--st-space-4);
            box-shadow: var(--st-shadow-sm);
            border: 1px solid var(--st-gray-100);
            cursor: pointer;
            transition: all var(--st-duration-normal) var(--st-ease-bounce);
        }
        .ranking-item:hover {
            transform: translateX(6px);
            box-shadow: var(--st-shadow-md);
            border-color: var(--st-primary-200);
        }
        .rank-badge {
            width: 36px;
            height: 36px;
            border-radius: var(--st-radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--st-text-sm);
            font-weight: var(--st-font-bold);
            flex-shrink: 0;
        }
        .rank-badge.rank-2 { background: linear-gradient(135deg, #C0C0C0, #A0A0A0); color: white; }
        .rank-badge.rank-3 { background: linear-gradient(135deg, #CD7F32, #A0522D); color: white; }
        .rank-badge.rank-other { background: var(--st-gray-100); color: var(--st-gray-500); }
        .ranking-content { flex: 1; min-width: 0; }
        .ranking-title {
            font-size: var(--st-text-sm);
            font-weight: var(--st-font-semibold);
            color: var(--st-text-primary);
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ranking-meta {
            font-size: var(--st-text-xs);
            color: var(--st-text-tertiary);
            display: flex;
            gap: var(--st-space-3);
        }

        /* ===== 故事网格 ===== */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--st-space-6);
        }
        .section-title {
            font-family: var(--st-font-display);
            font-size: var(--st-text-2xl);
            font-weight: var(--st-font-bold);
            color: var(--st-text-primary);
            display: flex;
            align-items: center;
            gap: var(--st-space-2);
        }
        .stories-count {
            font-size: var(--st-text-sm);
            color: var(--st-text-tertiary);
            font-weight: var(--st-font-normal);
        }
        .stories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--st-space-6);
        }
        @media (max-width: 640px) { .stories-grid { grid-template-columns: 1fr; } }

        /* 骨架屏 */
        .skeleton-card {
            background: white; border-radius: var(--st-radius-xl);
            overflow: hidden; border: 1px solid var(--st-gray-100);
        }
        .skeleton-cover {
            height: 200px;
            background: linear-gradient(90deg, var(--st-gray-100) 25%, var(--st-gray-200) 50%, var(--st-gray-100) 75%);
            background-size: 200% 100%; animation: skeleton-loading 1.5s infinite;
        }
        .skeleton-body { padding: var(--st-space-5); }
        .skeleton-line {
            height: 14px; border-radius: var(--st-radius-sm); margin-bottom: var(--st-space-3);
            background: linear-gradient(90deg, var(--st-gray-100) 25%, var(--st-gray-200) 50%, var(--st-gray-100) 75%);
            background-size: 200% 100%; animation: skeleton-loading 1.5s infinite;
        }
        .skeleton-line.short { width: 60%; }
        .skeleton-line.medium { width: 80%; }
        .skeleton-line.full { width: 100%; }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* 空状态 */
        .empty-state {
            text-align: center; padding: var(--st-space-16) var(--st-space-6);
            grid-column: 1 / -1;
        }
        .empty-state-icon { font-size: 4rem; color: var(--st-gray-300); margin-bottom: var(--st-space-4); }
        .empty-state-title { font-size: var(--st-text-xl); font-weight: var(--st-font-semibold); color: var(--st-text-secondary); margin-bottom: var(--st-space-2); }
        .empty-state-desc { color: var(--st-text-tertiary); margin-bottom: var(--st-space-6); }

        /* ===== 页脚 ===== */
        .footer {
            background: var(--st-gray-900); color: var(--st-gray-400);
            text-align: center; padding: var(--st-space-8) var(--st-page-padding-x);
            font-size: var(--st-text-sm); margin-top: var(--st-space-16);
        }

        /* ===== 高级筛选面板 ===== */
        .advanced-filter-toggle {
            display: inline-flex;
            align-items: center;
            gap: var(--st-space-2);
            padding: var(--st-space-2) var(--st-space-4);
            background: transparent;
            border: 2px solid var(--st-gray-200);
            border-radius: var(--st-radius-full);
            font-size: var(--st-text-sm);
            font-weight: var(--st-font-medium);
            color: var(--st-text-secondary);
            cursor: pointer;
            transition: all var(--st-duration-fast);
            margin-top: var(--st-space-3);
        }
        .advanced-filter-toggle:hover,
        .advanced-filter-toggle.active {
            background: var(--st-primary-50);
            border-color: var(--st-primary-300);
            color: var(--st-primary-600);
        }
        .advanced-filter-toggle .toggle-arrow {
            transition: transform var(--st-duration-fast);
        }
        .advanced-filter-toggle.active .toggle-arrow {
            transform: rotate(180deg);
        }

        .advanced-filter-panel {
            display: none;
            margin-top: var(--st-space-4);
            padding-top: var(--st-space-4);
            border-top: 1px solid var(--st-gray-100);
            animation: slideInUp var(--st-duration-normal) var(--st-ease-out);
        }
        .advanced-filter-panel.open { display: block; }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: var(--st-space-4);
            margin-bottom: var(--st-space-4);
        }
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: var(--st-space-2);
            min-width: 140px;
        }
        .filter-group-label {
            font-size: var(--st-text-xs);
            font-weight: var(--st-font-semibold);
            color: var(--st-text-tertiary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .filter-chips {
            display: flex;
            flex-wrap: wrap;
            gap: var(--st-space-2);
        }
        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px var(--st-space-3);
            background: var(--st-gray-100);
            border: 1px solid transparent;
            border-radius: var(--st-radius-full);
            font-size: var(--st-text-xs);
            font-weight: var(--st-font-medium);
            color: var(--st-text-secondary);
            cursor: pointer;
            transition: all var(--st-duration-fast);
            user-select: none;
        }
        .filter-chip:hover {
            background: var(--st-primary-50);
            color: var(--st-primary-600);
            border-color: var(--st-primary-200);
        }
        .filter-chip.active {
            background: var(--st-primary-100);
            color: var(--st-primary-700);
            border-color: var(--st-primary-300);
        }

        /* 已激活的筛选标签 */
        .active-filters {
            display: flex;
            flex-wrap: wrap;
            gap: var(--st-space-2);
            margin-top: var(--st-space-3);
        }
        .active-filter-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px var(--st-space-3);
            background: var(--st-primary-100);
            color: var(--st-primary-700);
            border-radius: var(--st-radius-full);
            font-size: var(--st-text-xs);
            font-weight: var(--st-font-medium);
        }
        .active-filter-tag .remove-tag {
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: var(--st-primary-500);
            display: flex;
            align-items: center;
            font-size: 12px;
            line-height: 1;
        }
        .active-filter-tag .remove-tag:hover { color: var(--st-error-500); }

        /* ===== 视图切换 ===== */
        .view-toggle {
            display: flex;
            gap: 4px;
            background: var(--st-gray-100);
            border-radius: var(--st-radius-lg);
            padding: 3px;
        }
        .view-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            border-radius: var(--st-radius-md);
            color: var(--st-text-tertiary);
            cursor: pointer;
            transition: all var(--st-duration-fast);
            font-size: 14px;
        }
        .view-btn:hover { color: var(--st-text-primary); }
        .view-btn.active {
            background: white;
            color: var(--st-primary-600);
            box-shadow: var(--st-shadow-sm);
        }

        /* 列表视图样式 */
        .stories-grid.list-view {
            grid-template-columns: 1fr;
        }
        .stories-grid.list-view .story-card {
            display: grid;
            grid-template-columns: 120px 1fr;
        }
        .stories-grid.list-view .story-card-cover {
            height: 100%;
            min-height: 100px;
            border-radius: var(--st-radius-xl) 0 0 var(--st-radius-xl);
        }
        .stories-grid.list-view .story-card-content {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        @media (max-width: 480px) {
            .stories-grid.list-view .story-card {
                grid-template-columns: 80px 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 跳过链接 -->
    <a href="#main" class="skip-link">跳到主要内容</a>

    <!-- 导航栏 -->
    <nav class="navbar" id="navbar" role="navigation" aria-label="主导航">
        <div class="navbar-content">
            <a href="/" class="nav-brand" aria-label="StoryTree 首页">
                <i class="fas fa-tree" aria-hidden="true"></i>
                StoryTree
            </a>
            <button class="mobile-menu-toggle" id="mobileMenuToggle" onclick="toggleMobileMenu()" aria-label="展开菜单" aria-expanded="false">
                <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <div class="nav-menu" id="navMenu">
                <a href="/" class="nav-link">
                    <i class="fas fa-home" aria-hidden="true"></i> 首页
                </a>
                <a href="/discover" class="nav-link active">
                    <i class="fas fa-compass" aria-hidden="true"></i> 发现故事
                </a>
                <a href="/membership.html" class="nav-link">

                        <div class="skeleton-cover"></div>

    <!-- 页脚 -->
    <footer class="footer" role="contentinfo">
        <p>&copy; 2026 StoryTree. 用心创作每一个故事。</p>
    </footer>

    <script>
        // ===== 工具函数 =====
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        const coverGradients = [
            'linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%)',
            'linear-gradient(135deg, #EC4899 0%, #F43F5E 100%)',
            'linear-gradient(135deg, #0EA5E9 0%, #6366F1 100%)',
            'linear-gradient(135deg, #10B981 0%, #0EA5E9 100%)',
            'linear-gradient(135deg, #F59E0B 0%, #EF4444 100%)',
            'linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%)',
        ];

        // ===== 导航栏 =====
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            navbar.classList.toggle('scrolled', window.scrollY > 20);
        }, { passive: true });

        // ===== 认证状态 =====
        function checkAuthStatus() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            const show = (id) => { const el = document.getElementById(id); if (el) el.style.display = 'flex'; };
            const hide = (id) => { const el = document.getElementById(id); if (el) el.style.display = 'none'; };
            if (token) {
                hide('loginLink'); hide('registerLink');
                show('profileLink'); show('logoutLink'); show('notificationIcon');
                loadUnreadCount();
            } else {
                show('loginLink'); show('registerLink');
                hide('profileLink'); hide('logoutLink'); hide('notificationIcon');
            }
        }

        async function loadUnreadCount() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            if (!token) return;
            try {
                const res = await fetch('/api/notifications', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const data = await res.json();
                    const badge = document.getElementById('notificationBadge');
                    if (badge && data.unreadCount > 0) {
                        badge.textContent = data.unreadCount > 99 ? '99+' : data.unreadCount;
                        badge.style.display = 'inline-block';
                    }
                }
            } catch (e) {}
        }

        function logout() {
            ['token','user'].forEach(k => { localStorage.removeItem(k); sessionStorage.removeItem(k); });
            window.location.href = '/login';
            return false;
        }

        // ===== 数据 =====
        let allStories = [];
        let currentFilter = 'all';

        async function loadStories() {
            try {
                const res = await fetch('/api/stories');
                const data = await res.json();
                if (data.stories && data.stories.length > 0) {
                    allStories = data.stories;
                    if (allStories.length >= 3) displayHotStories(allStories);
                    displayStories(allStories);
                } else {
                    showEmptyState();
                }
            } catch (e) {
                console.error('加载故事失败:', e);
                showErrorState();
            }
        }

        // ===== 热门故事 =====
        function displayHotStories(stories) {
            const hotStories = [...stories]
                .sort((a, b) => (b._count?.nodes || 0) - (a._count?.nodes || 0))
                .slice(0, 5);
            if (!hotStories.length) return;

            document.getElementById('hotStoriesSection').style.display = 'block';
            const top = hotStories[0];
            const coverGrad = 'linear-gradient(135deg, #EC4899 0%, #F43F5E 100%)';

            document.getElementById('featuredStoryCard').innerHTML = `
                <div class="featured-story-card" onclick="window.location.href='/story?id=${top.id}'" tabindex="0" role="button" aria-label="阅读：${escapeHtml(top.title)}">
                    <div class="featured-cover" style="background: ${coverGrad}">
                        <i class="fas fa-crown" aria-hidden="true"></i>
                        <div class="featured-badge">
                            <i class="fas fa-trophy" aria-hidden="true"></i> 最热门
                        </div>
                        <div class="featured-stats">
                            <span class="featured-stat-pill"><i class="fas fa-book-open"></i> ${top._count?.nodes || 0}章</span>
                            <span class="featured-stat-pill"><i class="fas fa-bookmark"></i> ${top._count?.bookmarks || 0}</span>
                        </div>
                    </div>
                    <div class="featured-body">
                        <h3 class="featured-title">${escapeHtml(top.title)}</h3>
                        <p class="featured-desc">${escapeHtml(top.description || '这个故事正在等待你的探索...')}</p>
                        <div class="featured-meta">
                            <span><i class="fas fa-user-circle" aria-hidden="true"></i> ${escapeHtml(top.author?.username || '匿名')}</span>
                            <span><i class="fas fa-eye" aria-hidden="true"></i> ${top._count?.followers || 0} 关注</span>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('rankingList').innerHTML = hotStories.slice(1).map((story, i) => {
                const rank = i + 2;
                const rankClass = rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
                return `
                    <div class="ranking-item" onclick="window.location.href='/story?id=${story.id}'" tabindex="0" role="button" aria-label="阅读：${escapeHtml(story.title)}">
                        <div class="rank-badge ${rankClass}">${rank}</div>
                        <div class="ranking-content">
                            <div class="ranking-title">${escapeHtml(story.title)}</div>
                            <div class="ranking-meta">
                                <span><i class="fas fa-user" aria-hidden="true"></i> ${escapeHtml(story.author?.username || '匿名')}</span>
                                <span><i class="fas fa-book" aria-hidden="true"></i> ${story._count?.nodes || 0}章</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ===== 故事列表 =====
        function displayStories(stories) {
            const grid = document.getElementById('storiesGrid');
            const countEl = document.getElementById('storiesCount');
            if (countEl) countEl.textContent = `（${stories.length}）`;

            if (!stories.length) { showEmptyState(); return; }

            grid.innerHTML = stories.map((story, idx) => `
                <article class="story-card" onclick="window.location.href='/story?id=${story.id}'" tabindex="0" role="button" aria-label="阅读故事：${escapeHtml(story.title)}">
                    <div class="story-card-cover" style="background: ${coverGradients[idx % coverGradients.length]}">
                        <i class="fas fa-book-open" aria-hidden="true"></i>
                        ${story._count?.nodes > 0 ? `<span class="story-card-badge">${story._count.nodes} 章节</span>` : ''}
                    </div>
                    <div class="story-card-content">
                        <h3 class="story-card-title">${escapeHtml(story.title)}</h3>
                        <p class="story-card-desc">${escapeHtml(story.description || '这个故事正在等待你的探索...')}</p>
                        <div class="story-card-meta">
                            <span class="story-card-author">
                                <i class="fas fa-user-circle" aria-hidden="true"></i>
                                ${escapeHtml(story.author?.username || '匿名作者')}
                            </span>
                            <span class="story-card-stats">
                                <span class="story-card-stat">
                                    <i class="fas fa-eye" aria-hidden="true"></i>
                                    ${story._count?.followers || 0}
                                </span>
                            </span>
                        </div>
                    </div>
                </article>
            `).join('');

            grid.querySelectorAll('.story-card, .ranking-item, .featured-story-card').forEach(el => {
                el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); } });
            });
        }

        // ===== 搜索 =====
        function searchStories() {
            const term = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!term) { applyFilter(currentFilter); return; }
            const filtered = allStories.filter(s =>
                s.title?.toLowerCase().includes(term) ||
                s.description?.toLowerCase().includes(term) ||
                s.author?.username?.toLowerCase().includes(term)
            );
            displayStories(filtered);
            document.getElementById('hotStoriesSection').style.display = 'none';
        }

        // ===== 筛选 =====
        function applyFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(t => {
                const isActive = t.dataset.filter === filter;
                t.classList.toggle('active', isActive);
                t.setAttribute('aria-selected', isActive);
            });

            let filtered = [...allStories];
            const hotSection = document.getElementById('hotStoriesSection');

            switch (filter) {
                case 'all':
                    if (allStories.length >= 3) hotSection.style.display = 'block';
                    break;
                case 'popular':
                    hotSection.style.display = 'none';
                    filtered.sort((a, b) => (b._count?.nodes || 0) - (a._count?.nodes || 0));
                    break;
                case 'new':
                    hotSection.style.display = 'none';
                    filtered.sort((a, b) => new Date(b.createdAt || b.created_at || 0) - new Date(a.createdAt || a.created_at || 0));
                    break;
                case 'completed':
                    hotSection.style.display = 'none';
                    filtered = filtered.filter(s => s.status === 'COMPLETED');
                    break;
            }
            displayStories(filtered);
        }

        // ===== 空/错误状态 =====
        function showEmptyState() {
            document.getElementById('storiesGrid').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon"><i class="fas fa-book-open" aria-hidden="true"></i></div>
                    <h3 class="empty-state-title">暂无故事</h3>
                    <p class="empty-state-desc">快来创建第一个故事吧！</p>
                    <a href="/create" class="btn btn-primary"><i class="fas fa-pen-nib" aria-hidden="true"></i> 开始创作</a>
                </div>
            `;
        }

        function showErrorState() {
            document.getElementById('storiesGrid').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon"><i class="fas fa-exclamation-circle" aria-hidden="true"></i></div>
                    <h3 class="empty-state-title">加载失败</h3>
                    <p class="empty-state-desc">网络异常，请稍后重试</p>
                    <button class="btn btn-secondary" onclick="loadStories()"><i class="fas fa-redo" aria-hidden="true"></i> 重新加载</button>
                </div>
            `;
        }

        // ===== 移动端菜单 =====
        function toggleMobileMenu() {
            const menu = document.getElementById('navMenu');
            const toggle = document.getElementById('mobileMenuToggle');
            const isOpen = menu.classList.toggle('active');
            toggle.setAttribute('aria-expanded', isOpen);
            toggle.querySelector('i').className = isOpen ? 'fas fa-times' : 'fas fa-bars';
        }

        document.addEventListener('click', e => {
            const menu = document.getElementById('navMenu');
            const toggle = document.getElementById('mobileMenuToggle');
            if (menu?.classList.contains('active') && !menu.contains(e.target) && !toggle?.contains(e.target)) {
                menu.classList.remove('active');
                toggle?.setAttribute('aria-expanded', 'false');
                if (toggle) toggle.querySelector('i').className = 'fas fa-bars';
            }
        });

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', () => {
            checkAuthStatus();
            loadStories();

            document.getElementById('searchInput').addEventListener('keydown', e => {
                if (e.key === 'Enter') searchStories();
            });

            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.addEventListener('click', () => applyFilter(tab.dataset.filter));
            });

            // 恢复视图偏好
            const savedView = localStorage.getItem('discover_view') || 'grid';
            if (savedView === 'list') switchView('list', false);
        });

        // ===== 高级筛选 =====
        const advancedFilters = { sort: 'default', status: 'all', length: 'all' };

        function toggleAdvancedFilter() {
            const panel = document.getElementById('advancedFilterPanel');
            const toggle = document.getElementById('advancedFilterToggle');
            const isOpen = panel.classList.toggle('open');
            toggle.classList.toggle('active', isOpen);
            toggle.setAttribute('aria-expanded', isOpen);
        }

        function toggleFilterChip(chip) {
            const type = chip.dataset.type;
            const value = chip.dataset.value;
            // 同组内单选
            chip.closest('.filter-chips').querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            advancedFilters[type] = value;
            updateActiveFilterTags();
            applyAdvancedFilters();
        }

        function updateActiveFilterTags() {
            const container = document.getElementById('activeFilters');
            const tags = [];
            const labelMap = {
                sort: { default: null, chapters: '章节最多', bookmarks: '收藏最多', followers: '关注最多' },
                status: { all: null, ongoing: '连载中', completed: '已完结' },
                length: { all: null, short: '短篇', medium: '中篇', long: '长篇' }
            };
            Object.entries(advancedFilters).forEach(([type, value]) => {
                const label = labelMap[type]?.[value];
                if (label) {
                    tags.push(`<span class="active-filter-tag">
                        ${label}
                        <button class="remove-tag" onclick="removeFilterTag('${type}')" aria-label="移除筛选：${label}">
                            <i class="fas fa-times"></i>
                        </button>
                    </span>`);
                }
            });
            if (tags.length) {
                container.innerHTML = tags.join('');
                container.style.display = 'flex';
            } else {
                container.style.display = 'none';
            }
        }

        function removeFilterTag(type) {
            advancedFilters[type] = type === 'sort' ? 'default' : 'all';
            // 重置对应chip的active状态
            document.querySelectorAll(`.filter-chip[data-type="${type}"]`).forEach(c => {
                c.classList.toggle('active', c.dataset.value === advancedFilters[type]);
            });
            updateActiveFilterTags();
            applyAdvancedFilters();
        }

        function resetAdvancedFilters() {
            advancedFilters.sort = 'default';
            advancedFilters.status = 'all';
            advancedFilters.length = 'all';
            document.querySelectorAll('.filter-chip').forEach(c => {
                const defaultValue = c.dataset.type === 'sort' ? 'default' : 'all';
                c.classList.toggle('active', c.dataset.value === defaultValue);
            });
            updateActiveFilterTags();
            applyAdvancedFilters();
        }

        function applyAdvancedFilters() {
            let filtered = [...allStories];

            // 应用基础筛选（来自filter-tab）
            switch (currentFilter) {
                case 'popular':
                    filtered.sort((a, b) => (b._count?.nodes || 0) - (a._count?.nodes || 0));
                    break;
                case 'new':
                    filtered.sort((a, b) => new Date(b.createdAt || b.created_at || 0) - new Date(a.createdAt || a.created_at || 0));
                    break;
                case 'completed':
                    filtered = filtered.filter(s => s.status === 'COMPLETED');
                    break;
            }

            // 完结状态过滤
            if (advancedFilters.status === 'ongoing') {
                filtered = filtered.filter(s => s.status !== 'COMPLETED');
            } else if (advancedFilters.status === 'completed') {
                filtered = filtered.filter(s => s.status === 'COMPLETED');
            }

            // 内容长度过滤
            const chapters = s => s._count?.nodes || 0;
            if (advancedFilters.length === 'short') {
                filtered = filtered.filter(s => chapters(s) < 5);
            } else if (advancedFilters.length === 'medium') {
                filtered = filtered.filter(s => chapters(s) >= 5 && chapters(s) <= 20);
            } else if (advancedFilters.length === 'long') {
                filtered = filtered.filter(s => chapters(s) > 20);
            }

            // 高级排序（覆盖基础排序）
            if (advancedFilters.sort === 'chapters') {
                filtered.sort((a, b) => (b._count?.nodes || 0) - (a._count?.nodes || 0));
            } else if (advancedFilters.sort === 'bookmarks') {
                filtered.sort((a, b) => (b._count?.bookmarks || 0) - (a._count?.bookmarks || 0));
            } else if (advancedFilters.sort === 'followers') {
                filtered.sort((a, b) => (b._count?.followers || 0) - (a._count?.followers || 0));
            }

            displayStories(filtered);
            const hotSection = document.getElementById('hotStoriesSection');
            if (currentFilter !== 'all' || advancedFilters.status !== 'all' || advancedFilters.length !== 'all') {
                hotSection.style.display = 'none';
            } else if (allStories.length >= 3) {
                hotSection.style.display = 'block';
            }
        }

        // ===== 视图切换 =====
        let currentView = 'grid';

        function switchView(view, save = true) {
            currentView = view;
            const grid = document.getElementById('storiesGrid');
            const gridBtn = document.getElementById('gridViewBtn');
            const listBtn = document.getElementById('listViewBtn');

            if (view === 'list') {
                grid.classList.add('list-view');
                gridBtn.classList.remove('active');
                listBtn.classList.add('active');
                gridBtn.setAttribute('aria-pressed', 'false');
                listBtn.setAttribute('aria-pressed', 'true');
            } else {
                grid.classList.remove('list-view');
                gridBtn.classList.add('active');
                listBtn.classList.remove('active');
                gridBtn.setAttribute('aria-pressed', 'true');
                listBtn.setAttribute('aria-pressed', 'false');
            }
            if (save) localStorage.setItem('discover_view', view);
        }
    </script>
    <script src="js/loading.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/navbar.js"></script>
</body>
</html>
