<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发现故事 - StoryTree</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-top: 80px;
        }

        .discover-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 42px;
            margin-bottom: 15px;
        }

        .page-header p {
            font-size: 18px;
            opacity: 0.9;
        }

        .search-filter {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-2px);
        }

        .filter-tags {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-tag {
            padding: 8px 16px;
            background: #f5f5f5;
            border: 2px solid transparent;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-tag:hover,
        .filter-tag.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .stories-section {
            margin-bottom: 50px;
        }

        .section-title {
            color: white;
            font-size: 28px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #ffd700;
        }

        /* 热门故事特殊布局 */
        .hot-stories-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .featured-story {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .featured-story:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
        }

        .featured-story .story-cover {
            height: 350px;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            position: relative;
        }

        .featured-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        .featured-badge i {
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .hot-stats {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
        }

        .hot-stat-item {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            color: #667eea;
        }

        .top-stories-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .top-story-item {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .top-story-item:hover {
            transform: translateX(5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .top-rank {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .top-rank.rank-1 {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: white;
        }

        .top-rank.rank-2 {
            background: linear-gradient(135deg, #c0c0c0, #808080);
            color: white;
        }

        .top-rank.rank-3 {
            background: linear-gradient(135deg, #cd7f32, #8b4513);
            color: white;
        }

        .top-rank.rank-other {
            background: #f5f5f5;
            color: #999;
        }

        .top-story-content {
            flex: 1;
            min-width: 0;
        }

        .top-story-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .top-story-meta {
            font-size: 12px;
            color: #999;
            display: flex;
            gap: 10px;
        }

        /* 普通故事网格 */
        .stories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .story-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .story-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .story-cover {
            height: 200px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            position: relative;
        }

        .story-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
        }

        .story-content {
            padding: 25px;
        }

        .story-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #333;
        }

        .story-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .story-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
            color: #999;
            font-size: 14px;
        }

        .story-author {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .story-stats {
            display: flex;
            gap: 15px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .loading i {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: white;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        /* 特色功能区 */
        .features-section {
            margin-top: 80px;
            padding-top: 60px;
            border-top: 2px solid rgba(255, 255, 255, 0.2);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-top: 30px;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
            background: white;
        }

        .feature-icon {
            font-size: 64px;
            margin-bottom: 20px;
            color: #667eea;
        }

        .feature-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #333;
        }

        .feature-description {
            color: #666;
            line-height: 1.6;
            font-size: 15px;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .hot-stories-container {
                grid-template-columns: 1fr;
            }

            .features-grid {
                grid-template-columns: 1fr;
            }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 32px;
            }

            .search-box {
                flex-direction: column;
            }

            .stories-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="nav-brand">
                <i class="fas fa-tree"></i>
                StoryTree
            </a>
            <div class="nav-menu">
                <a href="/" class="nav-link">首页</a>
                <a href="/discover" class="nav-link" style="color: #667eea;">发现故事</a>
                <a href="/create" class="nav-link">开始创作</a>
                <a href="/login" class="nav-link" id="loginLink">登录</a>
                <a href="/register" class="nav-link primary" id="registerLink">注册</a>
                <a href="/profile" class="nav-link" id="profileLink" style="display: none;">
                    <i class="fas fa-user"></i> 个人中心
                </a>
            </div>
        </div>
    </nav>

    <div class="discover-container">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1><i class="fas fa-compass"></i> 发现精彩故事</h1>
            <p>探索无限可能的故事世界</p>
        </div>

        <!-- 搜索和筛选 -->
        <div class="search-filter">
            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索故事标题、作者...">
                <button class="search-btn" onclick="searchStories()">
                    <i class="fas fa-search"></i> 搜索
                </button>
            </div>
            <div class="filter-tags">
                <span class="filter-tag active" data-filter="all">全部</span>
                <span class="filter-tag" data-filter="popular">热门</span>
                <span class="filter-tag" data-filter="new">最新</span>
                <span class="filter-tag" data-filter="completed">已完结</span>
            </div>
        </div>

        <!-- 热门故事（特殊布局） -->
        <div class="stories-section" id="hotStoriesSection" style="display: none;">
            <h2 class="section-title">
                <i class="fas fa-fire"></i>
                热门故事
            </h2>
            <div class="hot-stories-container" id="hotStoriesContainer">
                <!-- 左侧：最热门故事大卡片 -->
                <div id="featuredStoryCard"></div>
                <!-- 右侧：TOP 2-5排行榜 -->
                <div class="top-stories-list" id="topStoriesList"></div>
            </div>
        </div>

        <!-- 全部故事列表 -->
        <div class="stories-section">
            <h2 class="section-title">
                <i class="fas fa-book"></i>
                <span id="storiesListTitle">全部故事</span>
            </h2>
            <div class="stories-grid" id="storiesGrid">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>正在加载精彩故事...</p>
                </div>
            </div>
        </div>

        <!-- 特色功能区（移到底部） -->
        <div class="features-section">
            <div class="page-header">
                <h2 style="font-size: 32px; margin-bottom: 10px;">探索StoryTree的无限可能</h2>
                <p>三大特色功能，助力你的创作之旅</p>
            </div>
            <div class="features-grid">
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-pen-nib"></i>
                    </div>
                    <div class="feature-title">创作故事</div>
                    <div class="feature-description">
                        创建属于你自己的故事，每个章节都可以有无限可能，让想象自由飞翔。
                    </div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="feature-title">AI辅助创作</div>
                    <div class="feature-description">
                        使用AI智能续写功能，为你的故事提供灵感和创意，让创作更加轻松。
                    </div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="feature-title">社区互动</div>
                    <div class="feature-description">
                        与读者和作者互动，评论、点赞、分享，共同构建活跃的故事社区。
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allStories = [];
        let currentFilter = 'all';

        // 检查登录状态
        function checkAuthStatus() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            const loginLink = document.getElementById('loginLink');
            const registerLink = document.getElementById('registerLink');
            const profileLink = document.getElementById('profileLink');
            
            if (token) {
                loginLink.style.display = 'none';
                registerLink.style.display = 'none';
                profileLink.style.display = 'block';
            }
        }

        // 加载所有故事
        async function loadStories() {
            try {
                const response = await fetch('/api/stories');
                const data = await response.json();
                
                if (data.stories && data.stories.length > 0) {
                    allStories = data.stories;
                    
                    // 显示热门故事（如果有足够的故事）
                    if (allStories.length >= 3) {
                        displayHotStories(allStories);
                    }
                    
                    displayStories(allStories);
                } else {
                    showEmptyState();
                }
            } catch (error) {
                console.error('加载故事失败:', error);
                showError();
            }
        }

        // 显示热门故事（特殊布局）
        function displayHotStories(stories) {
            // 按章节数排序，取前5个
            const hotStories = [...stories]
                .sort((a, b) => (b._count?.nodes || 0) - (a._count?.nodes || 0))
                .slice(0, 5);

            if (hotStories.length === 0) return;

            // 显示热门故事区域
            document.getElementById('hotStoriesSection').style.display = 'block';

            // 第1名：大卡片
            const topStory = hotStories[0];
            const featuredCard = document.getElementById('featuredStoryCard');
            featuredCard.innerHTML = `
                <div class="featured-story" onclick="window.location.href='/story?id=${topStory.id}'">
                    <div class="story-cover">
                        <i class="fas fa-crown"></i>
                        <div class="featured-badge">
                            <i class="fas fa-trophy"></i>
                            <span>最热门</span>
                        </div>
                        <div class="hot-stats">
                            <span class="hot-stat-item"><i class="fas fa-book"></i> ${topStory._count?.nodes || 0}章</span>
                            <span class="hot-stat-item"><i class="fas fa-heart"></i> ${topStory._count?.bookmarks || 0}收藏</span>
                        </div>
                    </div>
                    <div class="story-content">
                        <div class="story-title">${escapeHtml(topStory.title)}</div>
                        <div class="story-description">${escapeHtml(topStory.description || '暂无描述')}</div>
                        <div class="story-meta">
                            <div class="story-author">
                                <i class="fas fa-user-circle"></i>
                                <span>${escapeHtml(topStory.author?.username || '未知作者')}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // 第2-5名：排行榜
            const topList = document.getElementById('topStoriesList');
            const topListHTML = hotStories.slice(1, 5).map((story, index) => {
                const rank = index + 2;
                const rankClass = rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
                return `
                    <div class="top-story-item" onclick="window.location.href='/story?id=${story.id}'">
                        <div class="top-rank ${rankClass}">${rank}</div>
                        <div class="top-story-content">
                            <div class="top-story-title">${escapeHtml(story.title)}</div>
                            <div class="top-story-meta">
                                <span><i class="fas fa-user"></i> ${escapeHtml(story.author?.username || '未知')}</span>
                                <span><i class="fas fa-book"></i> ${story._count?.nodes || 0}章</span>
                                <span><i class="fas fa-heart"></i> ${story._count?.bookmarks || 0}收藏</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            topList.innerHTML = topListHTML;
        }

        // 显示故事
        function displayStories(stories) {
            const storiesGrid = document.getElementById('storiesGrid');
            
            if (stories.length === 0) {
                showEmptyState();
                return;
            }

            const storiesHTML = stories.map(story => `
                <div class="story-card" onclick="window.location.href='/story?id=${story.id}'">
                    <div class="story-cover">
                        <i class="fas fa-book-open"></i>
                        <span class="story-badge">${story._count?.nodes || 0} 章节</span>
                    </div>
                    <div class="story-content">
                        <div class="story-title">${escapeHtml(story.title)}</div>
                        <div class="story-description">${escapeHtml(story.description || '暂无描述')}</div>
                        <div class="story-meta">
                            <div class="story-author">
                                <i class="fas fa-user-circle"></i>
                                <span>${escapeHtml(story.author?.username || '未知作者')}</span>
                            </div>
                            <div class="story-stats">
                                <span><i class="fas fa-eye"></i> ${story.views || 0}</span>
                                <span><i class="fas fa-heart"></i> ${story._count?.likes || 0}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
            
            storiesGrid.innerHTML = storiesHTML;
        }

        // 搜索故事
        function searchStories() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            if (!searchTerm) {
                displayStories(allStories);
                return;
            }

            const filtered = allStories.filter(story => 
                story.title.toLowerCase().includes(searchTerm) ||
                story.description?.toLowerCase().includes(searchTerm) ||
                story.author.username.toLowerCase().includes(searchTerm)
            );

            displayStories(filtered);
        }

        // 筛选故事
        function filterStories(filter) {
            currentFilter = filter;
            
            // 更新筛选标签样式
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.classList.remove('active');
            });
            event.target.classList.add('active');

            let filtered = [...allStories];

            // 根据筛选条件显示/隐藏热门故事区域
            const hotSection = document.getElementById('hotStoriesSection');
            const listTitle = document.getElementById('storiesListTitle');

            switch(filter) {
                case 'all':
                    // 显示热门故事区域
                    if (allStories.length >= 3) {
                        hotSection.style.display = 'block';
                    }
                    listTitle.textContent = '全部故事';
                    break;
                case 'popular':
                    // 隐藏热门故事区域（避免重复）
                    hotSection.style.display = 'none';
                    listTitle.textContent = '热门故事';
                    // 按章节数排序
                    filtered.sort((a, b) => (b._count?.nodes || 0) - (a._count?.nodes || 0));
                    break;
                case 'new':
                    hotSection.style.display = 'none';
                    listTitle.textContent = '最新故事';
                    filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                    break;
                case 'completed':
                    hotSection.style.display = 'none';
                    listTitle.textContent = '已完结故事';
                    filtered = filtered.filter(s => s.status === 'COMPLETED');
                    break;
            }

            displayStories(filtered);
        }

        // 显示空状态
        function showEmptyState() {
            const storiesGrid = document.getElementById('storiesGrid');
            storiesGrid.innerHTML = `
                <div class="empty-state" style="grid-column: 1/-1;">
                    <i class="fas fa-book"></i>
                    <h3>暂无故事</h3>
                    <p>快来创建第一个故事吧！</p>
                </div>
            `;
        }

        // 显示错误
        function showError() {
            const storiesGrid = document.getElementById('storiesGrid');
            storiesGrid.innerHTML = `
                <div class="empty-state" style="grid-column: 1/-1;">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>加载失败</h3>
                    <p>请刷新页面重试</p>
                </div>
            `;
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 搜索框回车事件
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
            loadStories();

            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchStories();
                }
            });

            // 筛选标签点击事件
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.addEventListener('click', function() {
                    filterStories(this.dataset.filter);
                });
            });
        });
    </script>
</body>
</html>
