<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>故事详情 - StoryTree</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-top: 80px;
        }

        .story-detail-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 故事头部 */
        .story-header {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .story-header-content {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: 30px;
        }

        .story-cover {
            width: 200px;
            height: 280px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .story-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .story-info {
            flex: 1;
        }

        .story-title {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }

        .story-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #666;
            font-size: 14px;
        }

        .meta-item i {
            color: #667eea;
        }

        .story-tags {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tag {
            background: #f0f0f0;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: #666;
        }

        .story-description {
            color: #666;
            line-height: 1.8;
            margin-bottom: 20px;
        }

        .story-stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 14px;
            color: #999;
            margin-top: 5px;
        }

        .story-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 25px;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        /* 作者信息 */
        .author-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .author-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
        }

        .author-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .author-details {
            flex: 1;
        }

        .author-name {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .author-stats {
            font-size: 14px;
            color: #999;
        }

        .btn-follow {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-follow:hover {
            background: #764ba2;
        }

        /* 章节列表 */
        .chapters-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .section-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .chapter-sort {
            display: flex;
            gap: 10px;
        }

        .sort-btn {
            padding: 8px 15px;
            background: #f0f0f0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .sort-btn.active {
            background: #667eea;
            color: white;
        }

        .chapters-list {
            display: grid;
            gap: 15px;
        }

        .chapter-item {
            display: flex;
            align-items: center;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .chapter-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .chapter-number {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 20px;
        }

        .chapter-info {
            flex: 1;
        }

        .chapter-title {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .chapter-meta {
            display: flex;
            gap: 15px;
            font-size: 14px;
            color: #999;
        }

        .chapter-status {
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
        }

        .status-published {
            background: #e8f5e9;
            color: #4caf50;
        }

        .status-draft {
            background: #fff3e0;
            color: #ff9800;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading i {
            font-size: 32px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .story-header-content {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .story-cover {
                margin: 0 auto;
            }

            .story-meta,
            .story-stats,
            .story-actions {
                justify-content: center;
            }

            .story-title {
                font-size: 24px;
            }

            .chapter-number {
                width: 40px;
                height: 40px;
                margin-right: 15px;
            }

            .chapter-title {
                font-size: 16px;
            }
        }

        /* 消息提示 */
        .message {
            position: fixed;
            top: 100px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        .message-success {
            border-left: 4px solid #4caf50;
        }

        .message-error {
            border-left: 4px solid #f44336;
        }

        .message i {
            font-size: 20px;
        }

        .message-success i {
            color: #4caf50;
        }

        .message-error i {
            color: #f44336;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .fade-out {
            animation: fadeOut 0.3s ease-out forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateX(400px);
            }
        }

        /* 编辑模态框 */
        .edit-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .edit-modal.active {
            display: flex;
        }

        .edit-modal-content {
            background: white;
            border-radius: 20px;
            max-width: 600px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease-out;
        }

        @keyframes modalSlideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .edit-modal-header {
            padding: 30px 30px 20px;
            border-bottom: 2px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .edit-modal-header h2 {
            font-size: 24px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: #999;
            cursor: pointer;
            transition: all 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close-btn:hover {
            background: #f0f0f0;
            color: #333;
        }

        .edit-modal-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .cover-upload {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .cover-preview {
            width: 120px;
            height: 168px;
            border-radius: 10px;
            overflow: hidden;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed #ddd;
        }

        .cover-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cover-preview i {
            font-size: 32px;
            color: #ccc;
        }

        .cover-upload-btn {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .cover-upload-btn:hover {
            background: #764ba2;
        }

        .edit-modal-footer {
            padding: 20px 30px 30px;
            display: flex;
            gap: 15px;
            justify-content: flex-end;
        }

        .btn-cancel {
            padding: 12px 30px;
            background: #f0f0f0;
            color: #666;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .btn-save {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-save:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="logo">
                <i class="fas fa-tree"></i>
                StoryTree
            </a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="/">首页</a></li>
                <li><a href="/discover">发现</a></li>
                <li><a href="/create">创作</a></li>
                <li><a href="/profile" id="profileLink" style="display: none;">个人中心</a></li>
                <li><a href="/login" id="loginLink">登录</a></li>
                <li><a href="#" id="logoutLink" style="display: none;">退出</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- 故事详情 -->
    <div class="story-detail-container">
        <!-- 加载状态 -->
        <div id="loadingState" class="loading">
            <i class="fas fa-spinner"></i>
            <p>加载中...</p>
        </div>

        <!-- 故事内容 -->
        <div id="storyContent" style="display: none;">
            <!-- 故事头部 -->
            <div class="story-header">
                <div class="story-header-content">
                    <div class="story-cover">
                        <img id="storyCover" src="/assets/default-cover.jpg" alt="故事封面">
                    </div>
                    <div class="story-info">
                        <h1 class="story-title" id="storyTitle">故事标题</h1>
                        <div class="story-meta">
                            <div class="meta-item">
                                <i class="fas fa-user"></i>
                                <span id="storyAuthor">作者</span>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-calendar"></i>
                                <span id="storyDate">创建时间</span>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-tag"></i>
                                <span id="storyGenre">类型</span>
                            </div>
                        </div>
                        <div class="story-tags" id="storyTags"></div>
                        <p class="story-description" id="storyDescription">故事简介...</p>
                        <div class="story-stats">
                            <div class="stat-item">
                                <div class="stat-value" id="viewCount">0</div>
                                <div class="stat-label">阅读量</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="likeCount">0</div>
                                <div class="stat-label">点赞数</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="chapterCount">0</div>
                                <div class="stat-label">章节数</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value" id="wordCount">0</div>
                                <div class="stat-label">字数</div>
                            </div>
                        </div>
                        <div class="story-actions">
                            <button class="btn btn-primary" id="startReadBtn">
                                <i class="fas fa-book-open"></i>
                                开始阅读
                            </button>
                            <button class="btn btn-primary" id="writeChapterBtn" style="display: none;">
                                <i class="fas fa-pen"></i>
                                续写章节
                            </button>
                            <button class="btn btn-primary" id="editStoryBtn" style="display: none;">
                                <i class="fas fa-edit"></i>
                                编辑故事
                            </button>
                            <button class="btn btn-secondary" id="likeBtn">
                                <i class="far fa-heart"></i>
                                收藏
                            </button>
                            <button class="btn btn-secondary" id="shareBtn">
                                <i class="fas fa-share-alt"></i>
                                分享
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 作者信息 -->
            <div class="author-section">
                <div class="author-info">
                    <div class="author-avatar">
                        <img id="authorAvatar" src="/assets/default-avatar.png" alt="作者头像">
                    </div>
                    <div class="author-details">
                        <div class="author-name" id="authorName">作者名称</div>
                        <div class="author-stats">
                            <span id="authorStories">0</span> 部作品 · 
                            <span id="authorFollowers">0</span> 关注者
                        </div>
                    </div>
                    <button class="btn-follow" id="followBtn">
                        <i class="fas fa-plus"></i> 关注
                    </button>
                </div>
            </div>

            <!-- 章节列表 -->
            <div class="chapters-section">
                <div class="section-header">
                    <h2 class="section-title">章节目录</h2>
                    <div class="chapter-sort">
                        <button class="sort-btn active" data-sort="asc">正序</button>
                        <button class="sort-btn" data-sort="desc">倒序</button>
                    </div>
                </div>
                <div class="chapters-list" id="chaptersList">
                    <!-- 章节列表将在这里动态加载 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑故事模态框 -->
    <div class="edit-modal" id="editModal">
        <div class="edit-modal-content">
            <div class="edit-modal-header">
                <h2>
                    <i class="fas fa-edit"></i>
                    编辑故事信息
                </h2>
                <button class="close-btn" id="closeEditModal">×</button>
            </div>
            <div class="edit-modal-body">
                <form id="editStoryForm">
                    <div class="form-group">
                        <label for="editTitle">故事标题 *</label>
                        <input type="text" id="editTitle" name="title" required 
                               placeholder="输入故事标题" maxlength="100">
                        <div class="form-hint">最多100个字符</div>
                    </div>

                    <div class="form-group">
                        <label for="editDescription">故事简介 *</label>
                        <textarea id="editDescription" name="description" required 
                                  placeholder="简要描述你的故事..." maxlength="500"></textarea>
                        <div class="form-hint">最多500个字符</div>
                    </div>

                    <div class="form-group">
                        <label>故事封面</label>
                        <div class="cover-upload">
                            <div class="cover-preview" id="editCoverPreview">
                                <i class="fas fa-image"></i>
                            </div>
                            <div>
                                <input type="file" id="editCoverInput" accept="image/*" style="display: none;">
                                <button type="button" class="cover-upload-btn" id="editCoverBtn">
                                    <i class="fas fa-upload"></i> 选择图片
                                </button>
                                <div class="form-hint" style="margin-top: 10px;">
                                    支持 JPG、PNG 格式<br>
                                    建议尺寸：400x560px
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="edit-modal-footer">
                <button class="btn-cancel" id="cancelEdit">取消</button>
                <button class="btn-save" id="saveEdit">
                    <i class="fas fa-save"></i>
                    保存修改
                </button>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="share.js"></script>
    <script>
        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
            loadStoryDetail();

            // 汉堡菜单
            const hamburger = document.getElementById('hamburger');
            const navMenu = document.getElementById('navMenu');
            hamburger?.addEventListener('click', () => {
                navMenu?.classList.toggle('active');
            });
            
            // 分享按钮
            document.getElementById('shareBtn')?.addEventListener('click', function() {
                if (window.currentStory) {
                    shareManager.showSharePanel({
                        storyId: window.currentStory.id,
                        title: window.currentStory.title,
                        description: window.currentStory.description,
                        image: window.currentStory.coverImage
                    });
                }
            });
        });

        // 加载故事详情
        async function loadStoryDetail() {
            const urlParams = new URLSearchParams(window.location.search);
            const storyId = urlParams.get('id');

            console.log('开始加载故事，ID:', storyId);

            if (!storyId) {
                showError('故事ID不存在');
                window.location.href = '/discover';
                return;
            }

            try {
                // 加载故事信息
                console.log('正在请求API...');
                const response = await fetch(`/api/stories/${storyId}`);
                console.log('API响应状态:', response.status);
                
                if (!response.ok) {
                    throw new Error('加载故事失败');
                }

                const data = await response.json();
                console.log('API返回数据:', data);
                
                const story = data.story || data; // 兼容两种返回格式
                const nodes = data.nodes || []; // 获取章节列表
                
                console.log('解析后的story:', story);
                console.log('解析后的nodes:', nodes);
                
                renderStory(story);
                renderChapters(nodes);

                // 排序按钮
                document.querySelectorAll('.sort-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        
                        const sortOrder = this.dataset.sort;
                        const sortedChapters = sortOrder === 'asc' ? nodes : [...nodes].reverse();
                        renderChapters(sortedChapters);
                    });
                });

                // 隐藏加载状态，显示内容
                console.log('准备显示内容...');
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('storyContent').style.display = 'block';
                console.log('内容已显示');

            } catch (error) {
                console.error('加载故事错误:', error);
                console.error('错误堆栈:', error.stack);
                showError('加载失败，请稍后重试');
                
                // 即使出错也隐藏加载状态
                document.getElementById('loadingState').style.display = 'none';
            }
        }

        // 渲染故事信息
        function renderStory(story) {
            try {
                console.log('开始渲染故事信息...');
                
                // 保存故事数据到全局变量
                window.currentStory = story;
                
                document.getElementById('storyTitle').textContent = story.title || '未命名故事';
                document.getElementById('storyAuthor').textContent = story.author?.username || '未知作者';
                
                // 安全处理日期
                try {
                    const date = new Date(story.createdAt);
                    document.getElementById('storyDate').textContent = date.toLocaleDateString('zh-CN');
                } catch (e) {
                    console.error('日期格式错误:', e);
                    document.getElementById('storyDate').textContent = '未知时间';
                }
                
                document.getElementById('storyGenre').textContent = story.genre || '未分类';
                document.getElementById('storyDescription').textContent = story.description || '暂无简介';
                
                // 统计数据
                document.getElementById('viewCount').textContent = story.views || 0;
                document.getElementById('likeCount').textContent = story.likes || 0;
                document.getElementById('chapterCount').textContent = story.nodeCount || 0;
                document.getElementById('wordCount').textContent = calculateWordCount(story);

                // 封面图片
                if (story.coverImage) {
                    document.getElementById('storyCover').src = story.coverImage;
                }

                // 作者信息
                if (story.author) {
                    document.getElementById('authorName').textContent = story.author.username;
                    if (story.author.avatar) {
                        document.getElementById('authorAvatar').src = story.author.avatar;
                    }
                }

                // 检查是否是作者，显示编辑按钮
                checkIfAuthor(story);
                
                // 检查收藏状态并初始化收藏按钮
                checkBookmarkStatus(story.id);

                // 开始阅读按钮
                const startReadBtn = document.getElementById('startReadBtn');
                // 移除旧的事件监听器
                const newStartReadBtn = startReadBtn.cloneNode(true);
                startReadBtn.parentNode.replaceChild(newStartReadBtn, startReadBtn);
                
                newStartReadBtn.addEventListener('click', () => {
                    const firstChapter = document.querySelector('.chapter-item');
                    if (firstChapter) {
                        firstChapter.click();
                    } else {
                        showError('还没有章节可以阅读');
                    }
                });
                
                console.log('故事信息渲染完成');
            } catch (error) {
                console.error('渲染故事信息时出错:', error);
                console.error('错误堆栈:', error.stack);
                throw error; // 重新抛出错误以便外层捕获
            }
        }

        // 检查是否是作者
        async function checkIfAuthor(story) {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            if (!token) return;

            try {
                const response = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    const userData = await response.json();
                    const currentUserId = userData.user.id;

                    // 如果当前用户是故事作者，显示编辑和续写按钮
                    if (story.authorId === currentUserId || story.author?.id === currentUserId) {
                        // 显示编辑故事按钮
                        const editBtn = document.getElementById('editStoryBtn');
                        editBtn.style.display = 'inline-flex';
                        editBtn.addEventListener('click', () => openEditModal(story));
                        
                        // 显示续写章节按钮
                        const writeBtn = document.getElementById('writeChapterBtn');
                        writeBtn.style.display = 'inline-flex';
                        writeBtn.addEventListener('click', () => {
                            // 跳转到写作页面
                            window.location.href = `/write?storyId=${story.id}`;
                        });
                    }
                }
            } catch (error) {
                console.error('检查作者权限错误:', error);
            }
        }

        // 打开编辑模态框
        function openEditModal(story) {
            const modal = document.getElementById('editModal');
            
            // 填充表单数据
            document.getElementById('editTitle').value = story.title || '';
            document.getElementById('editDescription').value = story.description || '';
            
            // 显示封面预览
            const coverPreview = document.getElementById('editCoverPreview');
            if (story.coverImage) {
                coverPreview.innerHTML = `<img src="${story.coverImage}" alt="封面">`;
            } else {
                coverPreview.innerHTML = '<i class="fas fa-image"></i>';
            }
            
            // 显示模态框
            modal.classList.add('active');
        }

        // 关闭编辑模态框
        function closeEditModal() {
            const modal = document.getElementById('editModal');
            modal.classList.remove('active');
        }

        // 保存编辑
        async function saveStoryEdit() {
            const title = document.getElementById('editTitle').value.trim();
            const description = document.getElementById('editDescription').value.trim();

            // 验证
            if (!title) {
                showError('请输入故事标题');
                return;
            }

            if (!description) {
                showError('请输入故事简介');
                return;
            }

            const saveBtn = document.getElementById('saveEdit');
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 保存中...';

            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                
                const response = await fetch(`/api/stories/${window.currentStory.id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        title,
                        description
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || '保存失败');
                }

                const data = await response.json();
                
                showSuccess('保存成功！');
                closeEditModal();
                
                // 刷新页面显示
                setTimeout(() => {
                    window.location.reload();
                }, 1500);

            } catch (error) {
                console.error('保存故事错误:', error);
                showError(error.message || '保存失败，请重试');
                saveBtn.disabled = false;
                saveBtn.innerHTML = '<i class="fas fa-save"></i> 保存修改';
            }
        }

        // 初始化编辑模态框事件
        document.addEventListener('DOMContentLoaded', function() {
            // 关闭按钮
            document.getElementById('closeEditModal')?.addEventListener('click', closeEditModal);
            document.getElementById('cancelEdit')?.addEventListener('click', closeEditModal);
            
            // 保存按钮
            document.getElementById('saveEdit')?.addEventListener('click', saveStoryEdit);
            
            // 点击模态框背景关闭
            document.getElementById('editModal')?.addEventListener('click', function(e) {
                if (e.target === this) {
                    closeEditModal();
                }
            });

            // 封面上传
            document.getElementById('editCoverBtn')?.addEventListener('click', function() {
                document.getElementById('editCoverInput').click();
            });

            document.getElementById('editCoverInput')?.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('editCoverPreview').innerHTML = 
                            `<img src="${e.target.result}" alt="封面预览">`;
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        // 加载章节列表
        async function loadChapters(storyId) {
            try {
                const response = await fetch(`/api/stories/${storyId}/nodes`);
                if (!response.ok) {
                    throw new Error('加载章节失败');
                }

                const chapters = await response.json();
                renderChapters(chapters);

                // 排序按钮
                document.querySelectorAll('.sort-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
                        this.classList.add('active');
                        
                        const sortOrder = this.dataset.sort;
                        const sortedChapters = sortOrder === 'asc' ? chapters : [...chapters].reverse();
                        renderChapters(sortedChapters);
                    });
                });

            } catch (error) {
                console.error('加载章节错误:', error);
                showError('加载章节失败');
            }
        }

        // 渲染章节列表
        function renderChapters(chapters) {
            const container = document.getElementById('chaptersList');
            
            if (chapters.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-book"></i>
                        <p>还没有章节</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = chapters.map((chapter, index) => `
                <div class="chapter-item" data-chapter-id="${chapter.id}">
                    <div class="chapter-number">${index + 1}</div>
                    <div class="chapter-info">
                        <div class="chapter-title">${chapter.title}</div>
                        <div class="chapter-meta">
                            <span><i class="fas fa-eye"></i> ${chapter.views || 0} 阅读</span>
                            <span><i class="fas fa-comment"></i> ${chapter.commentCount || 0} 评论</span>
                            <span><i class="fas fa-clock"></i> ${new Date(chapter.createdAt).toLocaleDateString('zh-CN')}</span>
                        </div>
                    </div>
                    <div class="chapter-status ${chapter.isPublished ? 'status-published' : 'status-draft'}">
                        ${chapter.isPublished ? '已发布' : '草稿'}
                    </div>
                </div>
            `).join('');

            // 添加点击事件
            container.querySelectorAll('.chapter-item').forEach(item => {
                item.addEventListener('click', function() {
                    const chapterId = this.dataset.chapterId;
                    window.location.href = `/chapter?id=${chapterId}`;
                });
            });
        }

        // 计算总字数
        function calculateWordCount(story) {
            // 这里应该从后端获取实际字数
            return story.wordCount || 0;
        }

        // 显示错误消息
        function showError(message) {
            showMessage(message, 'error');
        }

        // 显示成功消息
        function showSuccess(message) {
            showMessage(message, 'success');
        }

        // 显示消息
        function showMessage(message, type = 'info') {
            const messageEl = document.createElement('div');
            messageEl.className = `message message-${type}`;
            messageEl.innerHTML = `
                <i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i>
                <span>${message}</span>
            `;

            document.body.appendChild(messageEl);

            setTimeout(() => {
                messageEl.classList.add('fade-out');
                setTimeout(() => messageEl.remove(), 300);
            }, 3000);
        }

        // 检查收藏状态
        async function checkBookmarkStatus(storyId) {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            const likeBtn = document.getElementById('likeBtn');
            
            if (!token) {
                // 未登录，显示登录提示
                likeBtn.addEventListener('click', () => {
                    showError('请先登录');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                });
                return;
            }

            try {
                const response = await fetch(`/api/bookmarks/check/${storyId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    updateBookmarkButton(data.isBookmarked);
                }
            } catch (error) {
                console.error('检查收藏状态失败:', error);
            }

            // 添加点击事件
            likeBtn.addEventListener('click', () => toggleBookmark(storyId));
        }

        // 更新收藏按钮状态
        function updateBookmarkButton(isBookmarked) {
            const likeBtn = document.getElementById('likeBtn');
            const icon = likeBtn.querySelector('i');
            
            if (isBookmarked) {
                icon.classList.remove('far');
                icon.classList.add('fas');
                likeBtn.innerHTML = '<i class="fas fa-heart"></i> 已收藏';
                likeBtn.style.background = '#ff6b6b';
                likeBtn.style.color = 'white';
            } else {
                icon.classList.remove('fas');
                icon.classList.add('far');
                likeBtn.innerHTML = '<i class="far fa-heart"></i> 收藏';
                likeBtn.style.background = '';
                likeBtn.style.color = '';
            }
        }

        // 切换收藏状态
        async function toggleBookmark(storyId) {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            
            if (!token) {
                showError('请先登录');
                setTimeout(() => {
                    window.location.href = '/login';
                }, 1500);
                return;
            }

            const likeBtn = document.getElementById('likeBtn');
            const icon = likeBtn.querySelector('i');
            const isBookmarked = icon.classList.contains('fas');

            // 禁用按钮防止重复点击
            likeBtn.disabled = true;

            try {
                if (isBookmarked) {
                    // 取消收藏
                    const response = await fetch(`/api/bookmarks/${storyId}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (!response.ok) {
                        throw new Error('取消收藏失败');
                    }

                    updateBookmarkButton(false);
                    showSuccess('已取消收藏');
                } else {
                    // 添加收藏
                    const response = await fetch('/api/bookmarks', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ storyId: parseInt(storyId) })
                    });

                    if (!response.ok) {
                        const error = await response.json();
                        throw new Error(error.error || '收藏失败');
                    }

                    updateBookmarkButton(true);
                    showSuccess('收藏成功');
                }
            } catch (error) {
                console.error('收藏操作失败:', error);
                showError(error.message || '操作失败，请重试');
            } finally {
                likeBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
