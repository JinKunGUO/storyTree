<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryTree - 故事树</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 全局样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            line-height: 1.6;
        }

        /* 导航栏 */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 20px rgba(0, 0, 0, 0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 0 20px;
        }

        .navbar-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            height: 70px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            text-decoration: none;
        }

        .nav-brand i {
            font-size: 28px;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-link {
            color: #333;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-link:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .nav-link.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .nav-link.primary:hover {
            background: linear-gradient(135deg, #764ba2, #667eea);
        }

        /* 通知图标 */
        .notification-icon {
            position: relative;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
        }

        .notification-icon:hover {
            background: #f0f0f0;
        }

        .notification-badge {
            position: absolute;
            top: 2px;
            right: 8px;
            background: #ff4757;
            color: white;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 11px;
            font-weight: bold;
            min-width: 18px;
            text-align: center;
        }

        /* 移动端菜单 */
        .mobile-menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #333;
        }

        .nav-menu {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-menu.active {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            background: white;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            z-index: 1001;
        }

        @media (max-width: 768px) {
            .mobile-menu-toggle {
                display: block;
            }

            .nav-menu {
                display: none;
            }

            .nav-menu.active {
                display: flex;
            }

            .navbar-content {
                position: relative;
            }
        }
        /* 主要内容 */
        .main-content {
            margin-top: 90px;
            padding: 20px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 英雄区域 */
        .hero {
            text-align: center;
            padding: 80px 20px;
            color: white;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .hero p {
            font-size: 20px;
            margin-bottom: 40px;
            opacity: 0.9;
        }

        .hero-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-3px);
        }

        /* 功能区域 */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin: 60px 0;
        }

        .feature-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-card i {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .feature-card h3 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #333;
        }

        .feature-card p {
            color: #666;
            line-height: 1.6;
        }

        /* 故事展示区 */
        .stories-section {
            margin: 60px 0;
        }

        .section-header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .section-header h2 {
            font-size: 36px;
            margin-bottom: 15px;
        }

        .stories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .story-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .story-card:hover {
            transform: translateY(-5px);
        }

        .story-image {
            height: 200px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }

        .story-content {
            padding: 20px;
        }

        .story-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #333;
        }

        .story-description {
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .story-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #999;
            font-size: 14px;
        }

        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading i {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .navbar-content {
                flex-direction: column;
                height: auto;
                padding: 15px 0;
            }

            .nav-menu {
                margin-top: 15px;
                flex-direction: column;
                gap: 15px;
            }

            .hero h1 {
                font-size: 36px;
            }

            .hero-buttons {
                flex-direction: column;
                align-items: center;
            }

            .features {
                grid-template-columns: 1fr;
                margin: 40px 0;
            }

            .main-content {
                margin-top: 120px;
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .hero h1 {
                font-size: 28px;
            }

            .hero p {
                font-size: 16px;
            }

            .feature-card {
                padding: 30px 20px;
            }
        }

        /* 交互效果 */
        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="nav-brand">
                <i class="fas fa-tree"></i>
                StoryTree
            </a>
            <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
            <div class="nav-menu" id="navMenu">
                <a href="/" class="nav-link">首页</a>
                <a href="/discover" class="nav-link">发现故事</a>
                <a href="/my-stories.html" class="nav-link" id="myStoriesLink" style="display: none;">
                    <i class="fas fa-book"></i> 我的故事
                </a>
                <a href="/create" class="nav-link">开始创作</a>
                <a href="/notifications.html" class="notification-icon" id="notificationIcon" style="display: none;">
                    <i class="fas fa-bell" style="font-size: 18px;"></i>
                    <span class="notification-badge" id="notificationBadge" style="display: none;">0</span>
                </a>
                <a href="/login" class="nav-link" id="loginLink">登录</a>
                <a href="/register" class="nav-link primary" id="registerLink">注册</a>
                <a href="/profile" class="nav-link" id="profileLink" style="display: none;">
                    <i class="fas fa-user"></i> 个人中心
                </a>
                <a href="/login" class="nav-link" id="logoutLink" style="display: none;" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> 退出
                </a>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="main-content">
        <!-- 英雄区域 -->
        <section class="hero">
            <h1>欢迎来到 StoryTree</h1>
            <p>在这里，每个故事都是一片叶子，共同组成属于你的故事森林</p>
            <div class="hero-buttons">
                <a href="/register" class="btn btn-primary" id="startBtn">立即开始</a>
                <a href="/discover" class="btn btn-secondary">探索故事</a>
            </div>
        </section>

        <!-- 功能介绍 -->
        <section class="features">
            <div class="feature-card">
                <i class="fas fa-pen-fancy"></i>
                <h3>创作故事</h3>
                <p>创建属于你自己的故事，每个章节都可以有无限可能，让想象自由飞翔。</p>
            </div>
            <div class="feature-card">
                <i class="fas fa-robot"></i>
                <h3>AI辅助创作</h3>
                <p>使用AI智能续写功能，为你的故事提供灵感和创意，让创作更加轻松。</p>
            </div>
            <div class="feature-card">
                <i class="fas fa-comments"></i>
                <h3>社区互动</h3>
                <p>与读者和作者互动，评论、点赞、分享，共同构建活跃的故事社区。</p>
            </div>
        </section>

        <!-- 热门故事 -->
        <section class="stories-section">
            <div class="section-header">
                <h2>热门故事</h2>
                <p>发现最受欢迎的故事</p>
            </div>
            <div class="stories-grid" id="storiesGrid">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    <p>正在加载精彩故事...</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        // 检查用户登录状态
        function checkAuthStatus() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            const loginLink = document.getElementById('loginLink');
            const registerLink = document.getElementById('registerLink');
            const profileLink = document.getElementById('profileLink');
            const logoutLink = document.getElementById('logoutLink');
            const myStoriesLink = document.getElementById('myStoriesLink');
            const notificationIcon = document.getElementById('notificationIcon');
            
            if (token) {
                loginLink.style.display = 'none';
                registerLink.style.display = 'none';
                profileLink.style.display = 'block';
                logoutLink.style.display = 'block';
                if (myStoriesLink) myStoriesLink.style.display = 'block';
                if (notificationIcon) {
                    notificationIcon.style.display = 'block';
                    loadUnreadCount();
                }
            } else {
                loginLink.style.display = 'block';
                registerLink.style.display = 'block';
                profileLink.style.display = 'none';
                logoutLink.style.display = 'none';
                if (myStoriesLink) myStoriesLink.style.display = 'none';
                if (notificationIcon) notificationIcon.style.display = 'none';
            }
        }

        // 加载未读通知数量
        async function loadUnreadCount() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            if (!token) return;

            try {
                const response = await fetch('/api/notifications', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    const data = await response.json();
                    const badge = document.getElementById('notificationBadge');
                    if (badge && data.unreadCount > 0) {
                        badge.textContent = data.unreadCount > 99 ? '99+' : data.unreadCount;
                        badge.style.display = 'block';
                    }
                }
            } catch (error) {
                console.error('加载未读通知数失败:', error);
            }
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            sessionStorage.removeItem('token');
            sessionStorage.removeItem('user');
            window.location.href = '/login';
            return false;
        }

        // 加载热门故事
        async function loadStories() {
            try {
                const response = await fetch('/api/stories');
                const data = await response.json();
                
                const storiesGrid = document.getElementById('storiesGrid');
                if (data.stories && data.stories.length > 0) {
                    const storiesHTML = data.stories.slice(0, 6).map(story => `
                        <div class="story-card" onclick="window.location.href='/story/${story.id}'">
                            <div class="story-image">
                                <i class="fas fa-book-open"></i>
                            </div>
                            <div class="story-content">
                                <div class="story-title">${story.title}</div>
                                <div class="story-description">${story.description || '暂无描述'}</div>
                                <div class="story-meta">
                                    <span>作者: ${story.author.username}</span>
                                    <span>${story._count.nodes} 章节</span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                    
                    storiesGrid.innerHTML = storiesHTML;
                } else {
                    storiesGrid.innerHTML = `
                        <div style="text-align: center; color: #666; padding: 40px; grid-column: 1/-1;">
                            <i class="fas fa-book" style="font-size: 48px; margin-bottom: 20px; color: #999;"></i>
                            <p>暂无故事，快来创建第一个故事吧！</p>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById('storiesGrid').innerHTML = `
                    <div style="text-align: center; color: #666; padding: 40px; grid-column: 1/-1;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 48px; margin-bottom: 20px; color: #999;"></i>
                        <p>加载故事失败，请稍后重试</p>
                    </div>
                `;
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
            loadStories();
            
            // 添加淡入动画
            document.body.classList.add('fade-in');
            
            // 确保"立即开始"按钮可以点击
            const startBtn = document.getElementById('startBtn');
            if (startBtn) {
                startBtn.addEventListener('click', function(e) {
                    // 确保链接正常工作
                    console.log('立即开始按钮被点击');
                    // 不阻止默认行为，让链接正常跳转
                });
            }
        });

        // 移动端菜单切换
        function toggleMobileMenu() {
            const navMenu = document.getElementById('navMenu');
            navMenu.classList.toggle('active');
        }

        // 点击外部关闭菜单
        document.addEventListener('click', function(e) {
            const navMenu = document.getElementById('navMenu');
            const menuToggle = document.querySelector('.mobile-menu-toggle');
            
            if (navMenu && menuToggle && !navMenu.contains(e.target) && !menuToggle.contains(e.target)) {
                navMenu.classList.remove('active');
            }
        });
    </script>
</body>
</html>
