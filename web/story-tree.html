<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>故事分支树 - StoryTree</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/utilities.css">
    <link href="libs/fontawesome/css/all.min.css" rel="stylesheet">
    <!-- ECharts -->
    <script src="libs/echarts/echarts.min.js"></script>
    <style>
        body {
            background: var(--st-bg-secondary);
            min-height: 100vh;
            padding-top: 64px;
        }

        .tree-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 返回按钮 */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: white;
            color: var(--st-primary-500);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            text-decoration: none;
        }

        .back-btn:hover {
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* 标签页 */
        .tabs {
            background: white;
            border-radius: 20px 20px 0 0;
            padding: 0;
            display: flex;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 20px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #999;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn:first-child {
            border-radius: 20px 0 0 0;
        }

        .tab-btn:last-child {
            border-radius: 0 20px 0 0;
        }

        .tab-btn.active {
            color: var(--st-primary-500);
            background: #f9f9f9;
            border-bottom-color: var(--st-primary-500);
        }

        .tab-btn:hover:not(.active) {
            background: #f5f5f5;
            color: var(--st-primary-500);
        }

        /* 内容区 */
        .tab-content {
            background: white;
            border-radius: 0 0 20px 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, var(--st-primary-500) 0%, var(--st-primary-700) 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .stat-card-icon {
            font-size: 32px;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .stat-card-value {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-card-label {
            font-size: 14px;
            opacity: 0.9;
        }

        /* 树状图容器 */
        .tree-chart {
            width: 100%;
            height: 700px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            background: #fafafa;
        }

        /* 工具栏 */
        .tree-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 10px;
        }

        .tree-toolbar-left,
        .tree-toolbar-right {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .toolbar-btn {
            padding: 8px 16px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar-btn:hover {
            border-color: var(--st-primary-500);
            color: var(--st-primary-500);
        }

        .toolbar-btn.active {
            background: var(--st-primary-500);
            color: white;
            border-color: var(--st-primary-500);
        }

        /* 节点详情卡片 */
        .node-detail {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            display: none;
        }

        .node-detail.active {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .node-detail-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .node-detail-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .node-detail-close {
            background: none;
            border: none;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .node-detail-close:hover {
            background: #e0e0e0;
            color: #333;
        }

        .node-detail-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .detail-item {
            background: white;
            padding: 15px;
            border-radius: 10px;
        }

        .detail-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .node-detail-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .detail-btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, var(--st-primary-500) 0%, var(--st-primary-700) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .detail-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* 加载状态 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .loading i {
            font-size: 48px;
            animation: spin 1s linear infinite;
            color: var(--st-primary-500);
            margin-bottom: 20px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .tree-chart {
                height: 500px;
            }

            .tabs {
                flex-direction: column;
            }

            .tab-btn {
                border-radius: 0 !important;
                border-bottom: 1px solid #f0f0f0;
            }

            .tab-btn:first-child {
                border-radius: 20px 20px 0 0 !important;
            }

            .tab-btn:last-child {
                border-bottom: none;
            }

            .tree-toolbar {
                flex-direction: column;
                gap: 10px;
            }

            .tree-toolbar-left,
            .tree-toolbar-right {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar" role="navigation" aria-label="主导航">
        <div class="navbar-content">
            <a href="/" class="nav-brand" aria-label="StoryTree 首页">
                <i class="fas fa-tree" aria-hidden="true"></i>

            </a>

    <!-- 主内容 -->
    <div class="tree-container">
        <!-- 返回按钮 -->
        <a href="#" class="back-btn" id="backBtn">
            <i class="fas fa-arrow-left"></i>
            返回故事详情
        </a>

        <!-- 加载状态 -->
        <div id="loadingState" class="loading">
            <i class="fas fa-spinner"></i>
            <p>加载中...</p>
        </div>

        <!-- 主内容 -->
        <div id="mainContent" style="display: none;">
            <!-- 标签页 -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="tree">
                    <i class="fas fa-sitemap"></i>
                    分支树状图
                </button>
                <button class="tab-btn" data-tab="stats">
                    <i class="fas fa-chart-bar"></i>
                    统计分析
                </button>
            </div>

            <!-- 树状图标签 -->
            <div class="tab-content active" id="treeTab">
                <!-- 工具栏 -->
                <div class="tree-toolbar">
                    <div class="tree-toolbar-left">
                        <button class="toolbar-btn active" id="layoutVertical">
                            <i class="fas fa-arrows-alt-v"></i>
                            垂直布局
                        </button>
                        <button class="toolbar-btn" id="layoutHorizontal">
                            <i class="fas fa-arrows-alt-h"></i>
                            水平布局
                        </button>
                        <button class="toolbar-btn" id="layoutRadial">
                            <i class="fas fa-circle-notch"></i>
                            径向布局
                        </button>
                    </div>
                    <div class="tree-toolbar-right">
                        <button class="toolbar-btn" id="zoomIn">
                            <i class="fas fa-search-plus"></i>
                            放大
                        </button>
                        <button class="toolbar-btn" id="zoomOut">
                            <i class="fas fa-search-minus"></i>
                            缩小
                        </button>
                        <button class="toolbar-btn" id="resetZoom">
                            <i class="fas fa-undo"></i>
                            重置视图
                        </button>
                        <button class="toolbar-btn" id="exportImage">
                            <i class="fas fa-download"></i>
                            导出图片
                        </button>
                    </div>
                </div>

                <!-- 树状图 -->
                <div class="tree-chart" id="treeChart"></div>

                <!-- 节点详情 -->
                <div class="node-detail" id="nodeDetail">
                    <div class="node-detail-header">
                        <div class="node-detail-title">
                            <i class="fas fa-book"></i>
                            <span id="nodeTitle">章节标题</span>
                        </div>
                        <button class="node-detail-close" id="closeNodeDetail">×</button>
                    </div>
                    <div class="node-detail-content" id="nodeDetailContent">
                        <!-- 动态加载 -->
                    </div>
                    <div class="node-detail-actions">
                        <button class="detail-btn" id="readNode">
                            <i class="fas fa-book-open"></i>
                            阅读章节

                            <i class="fas fa-pen"></i>
                            续写分支
                        </button>
                        <button class="detail-btn" id="publishDraftNode" style="display: none; background: linear-gradient(135deg, #059669 0%, #047857 100%);">
                            <i class="fas fa-paper-plane"></i>
                            发布草稿
                        </button>

                </div>
            </div>

            <!-- 统计分析标签 -->
            <div class="tab-content" id="statsTab">
                <!-- 统计卡片 -->
                <div class="stats-grid" id="statsGrid">
                    <!-- 动态加载 -->
                </div>

                <!-- 详细统计图表 -->
                <div style="margin-top: 30px;">
                    <h3 style="margin-bottom: 20px; color: #333;">
                        <i class="fas fa-chart-line"></i>
                        详细统计

                </div>

    <script src="auth.js"></script>
    <script src="js/ws-client.js"></script>
    <script>
        let treeChart = null;
        let statsChart = null;
        let currentStory = null;
        let treeData = null;
        let currentLayout = 'vertical';
        let selectedNodeId = null;
        
        // 作者颜色映射表
        const authorColorMap = new Map();
        const authorColors = [
            '#4caf50', // 绿色
            '#2196f3', // 蓝色
            '#ff9800', // 橙色
            '#e91e63', // 粉色
            '#9c27b0', // 紫色
            '#00bcd4', // 青色
            '#ff5722', // 深橙色
            '#795548', // 棕色
            '#607d8b', // 蓝灰色
            '#8bc34a'  // 浅绿色
        ];
        let colorIndex = 0;

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            checkAuthStatus();
            loadStoryTree();
            
            // 初始化 WebSocket 连接
            StoryTreeWS.connect();
            
            // WebSocket 实时监听故事树更新（新章节发布等）
            StoryTreeWS.on('tree:update', (data) => {
                console.log('收到故事树更新推送:', data);
                loadStoryTree();
            });
            
            // 同时监听 AI 任务完成（AI 创作的新章节完成时刷新树）
            StoryTreeWS.on('task:status', (data) => {
                if (data.status === 'completed') {
                    console.log('AI任务完成，刷新故事树');
                    loadStoryTree();
                }
            });
            
            // 启动自动刷新机制（降级兜底）
            startAutoRefresh();

            // 汉堡菜单
            const hamburger = document.getElementById('hamburger');
            const navMenu = document.getElementById('navMenu');
            hamburger?.addEventListener('click', () => {
                navMenu?.classList.toggle('active');
            });

            // 标签页切换
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const tabName = this.dataset.tab;
                    switchTab(tabName);
                });
            });

            // 布局切换
            document.getElementById('layoutVertical')?.addEventListener('click', () => changeLayout('vertical'));
            document.getElementById('layoutHorizontal')?.addEventListener('click', () => changeLayout('horizontal'));
            document.getElementById('layoutRadial')?.addEventListener('click', () => changeLayout('radial'));

            // 放大
            document.getElementById('zoomIn')?.addEventListener('click', () => {
                if (treeChart) {
                    const option = treeChart.getOption();
                    const currentZoom = option.series[0].zoom || 1;
                    const newZoom = Math.min(currentZoom * 1.2, 5); // 最大5倍
                    treeChart.setOption({
                        series: [{
                            zoom: newZoom
                        }]
                    });
                }
            });

            // 缩小
            document.getElementById('zoomOut')?.addEventListener('click', () => {
                if (treeChart) {
                    const option = treeChart.getOption();
                    const currentZoom = option.series[0].zoom || 1;
                    const newZoom = Math.max(currentZoom / 1.2, 0.2); // 最小0.2倍
                    treeChart.setOption({
                        series: [{
                            zoom: newZoom
                        }]
                    });
                }
            });

            // 重置视图 - 还原当前布局的初始状态
            document.getElementById('resetZoom')?.addEventListener('click', () => {
                if (treeChart && treeData) {
                    // 重新渲染当前布局以还原到初始状态
                    renderTree(treeData.tree);
                    showMessage('已重置当前布局视图', 'success');
                }
            });

            // 导出图片
            document.getElementById('exportImage')?.addEventListener('click', exportTreeImage);

            // 关闭节点详情
            document.getElementById('closeNodeDetail')?.addEventListener('click', () => {
                document.getElementById('nodeDetail').classList.remove('active');
            });

            // 返回按钮
            document.getElementById('backBtn')?.addEventListener('click', function(e) {
                e.preventDefault();
                const urlParams = new URLSearchParams(window.location.search);
                const storyId = urlParams.get('id');
                window.location.href = `/story?id=${storyId}`;
            });
        });

        // 加载故事树
        async function loadStoryTree() {
            const urlParams = new URLSearchParams(window.location.search);
            const storyId = urlParams.get('id');

            if (!storyId) {
                showError('故事ID不存在');
                window.location.href = '/discover.html';
                return;
            }

            try {
                const response = await fetch(`/api/stories/${storyId}/tree`);
                
                if (!response.ok) {
                    throw new Error('加载失败');
                }

                const data = await response.json();
                console.log('树状图数据:', data);

                // 检查是否有新章节
                const oldNodeCount = treeData?.stats?.totalNodes || 0;
                const newNodeCount = data.stats.totalNodes;
                
                if (oldNodeCount > 0 && newNodeCount > oldNodeCount) {
                    const addedNodes = newNodeCount - oldNodeCount;
                    showSuccess(`🎉 发现 ${addedNodes} 个新章节！`);
                }

                treeData = data;
                currentStory = { id: storyId, title: data.tree.name };

                // 初始化作者颜色映射
                initAuthorColors(data.tree);

                // 渲染树状图
                renderTree(data.tree);

                // 渲染统计信息
                renderStats(data.stats);

                // 显示内容
                document.getElementById('loadingState').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                
                // 如果节点数量较多，显示提示
                if (data.stats.totalNodes > 20 && oldNodeCount === 0) {
                    showMessage(`当前故事共有 ${data.stats.totalNodes} 个章节，建议使用缩放功能查看`, 'info');
                }

            } catch (error) {
                console.error('加载故事树错误:', error);
                showError('加载失败，请稍后重试');
                document.getElementById('loadingState').style.display = 'none';
            }
        }

        // 自动刷新机制（降级兜底：WebSocket 连接时 60 秒，断开时 15 秒）
        let autoRefreshInterval = null;
        
        function startAutoRefresh() {
            // 清除旧的定时器
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
            
            const interval = StoryTreeWS.isConnected() ? 60000 : 15000;
            autoRefreshInterval = setInterval(() => {
                console.log('🔄 自动检查新章节...');
                loadStoryTree();
            }, interval);
            
            console.log(`✅ 自动刷新已启动，每${interval / 1000}秒检查一次新章节`);
        }
        
        // 页面可见性变化时控制自动刷新
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 页面隐藏时停止自动刷新
                if (autoRefreshInterval) {
                    clearInterval(autoRefreshInterval);
                    console.log('⏸️ 页面隐藏，暂停自动刷新');
                }
            } else {
                // 页面显示时恢复自动刷新
                startAutoRefresh();
                // 立即刷新一次
                loadStoryTree();
                console.log('▶️ 页面显示，恢复自动刷新');
            }
        });
        
        // 页面卸载时清理定时器
        window.addEventListener('beforeunload', () => {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
        });

        // 初始化作者颜色映射
        function initAuthorColors(tree) {
            authorColorMap.clear();
            colorIndex = 0;
            
            // 递归遍历树节点，收集所有作者
            function collectAuthors(node) {
                if (node.authorId && !authorColorMap.has(node.authorId)) {
                    // 为新作者分配颜色
                    authorColorMap.set(node.authorId, authorColors[colorIndex % authorColors.length]);
                    colorIndex++;
                }
                
                if (node.children && node.children.length > 0) {
                    node.children.forEach(child => collectAuthors(child));
                }
            }
            
            collectAuthors(tree);
            console.log('作者颜色映射:', authorColorMap);
        }

        // 获取作者颜色
        function getAuthorColor(authorId, isAI) {
            if (isAI) {
                return 'var(--st-primary-700)'; // AI固定使用紫色
            }
            return authorColorMap.get(authorId) || '#4caf50'; // 默认绿色
        }

        // 渲染树状图
        function renderTree(tree) {
            const chartDom = document.getElementById('treeChart');
            
            if (!treeChart) {
                treeChart = echarts.init(chartDom);
            }

            // 根据不同布局设置不同的边距和居中方式
            let layoutConfig = {};
            if (currentLayout === 'vertical') {
                // 垂直布局：从上到下，水平居中
                layoutConfig = {
                    top: '10%',
                    left: 'center',
                    bottom: '10%',
                    right: 'auto',
                    orient: 'TB',
                    labelPosition: 'bottom',
                    labelAlign: 'center',
                    leavesLabelPosition: 'bottom',
                    leavesLabelAlign: 'center'
                };
            } else if (currentLayout === 'horizontal') {
                // 水平布局：从左到右，垂直居中
                layoutConfig = {
                    top: 'middle',
                    left: '5%',
                    bottom: 'auto',
                    right: '5%',
                    orient: 'LR',
                    labelPosition: 'right',
                    labelAlign: 'left',
                    leavesLabelPosition: 'right',
                    leavesLabelAlign: 'left'
                };
            } else if (currentLayout === 'radial') {
                // 径向布局：圆形放射状，完全居中
                layoutConfig = {
                    top: 'middle',
                    left: 'center',
                    bottom: 'auto',
                    right: 'auto',
                    orient: 'radial',
                    labelPosition: 'radial',
                    labelAlign: 'right',
                    leavesLabelPosition: 'radial',
                    leavesLabelAlign: 'left'
                };
            }

            const option = {
                tooltip: {
                    trigger: 'item',
                    triggerOn: 'mousemove',
                    formatter: function(params) {
                        const data = params.data;
                        if (!data.id || data.id === currentStory.id) {
                            return `<strong>${data.name}</strong>`;
                        }
                        
                        // 获取作者颜色
                        const authorColor = getAuthorColor(data.authorId, data.aiGenerated);
                        
                        return `
                            <div style="padding: 10px;">
                                <strong style="font-size: 16px;">${data.name}</strong><br/>
                                <hr style="margin: 8px 0; border: none; border-top: 1px solid #eee;"/>
                                <div style="font-size: 13px; line-height: 1.8;">
                                    <i class="fas fa-user" style="color: ${authorColor};"></i> 
                                    <strong style="color: ${authorColor};">作者：${data.author || '未知'}</strong><br/>
                                    <i class="fas fa-robot"></i> 创作方式：${data.aiGenerated ? '<span style="color: var(--st-primary-700);">AI创作 🤖</span>' : '<span style="color: ' + authorColor + ';">人类创作 👤</span>'}<br/>
                                    <i class="fas fa-eye"></i> 阅读：${data.readCount || 0}<br/>
                                    <i class="fas fa-comment"></i> 评论：${data.commentCount || 0}<br/>
                                    <i class="fas fa-star"></i> 评分：${(data.ratingAvg || 0).toFixed(1)} (${data.ratingCount || 0}人)
                                </div>
                            </div>
                        `;
                    }
                },
                // 启用工具箱，包含缩放和还原功能
                toolbox: {
                    show: false  // 隐藏默认工具箱，使用自定义按钮
                },
                series: [
                    {
                        type: 'tree',
                        data: [tree],
                        top: layoutConfig.top,
                        left: layoutConfig.left,
                        bottom: layoutConfig.bottom,
                        right: layoutConfig.right,
                        symbolSize: (value, params) => {
                            // 统一节点大小
                            if (!params.data.id || params.data.id === currentStory.id) {
                                return 25; // 根节点稍大
                            }
                            return 20; // 其他节点统一大小
                        },
                        symbol: function(value, params) {
                            // 根节点使用星形
                            if (!params.data.id || params.data.id === currentStory.id) {
                                return 'star';
                            }
                            // AI创作使用菱形
                            if (params.data.aiGenerated) {
                                return 'diamond';
                            }
                            // 人类创作使用圆形
                            return 'circle';
                        },
                        label: {
                            position: layoutConfig.labelPosition,
                            verticalAlign: 'middle',
                            align: layoutConfig.labelAlign,
                            fontSize: 12,
                            formatter: function(params) {
                                const data = params.data;
                                let label = data.name;
                                
                                // 添加AI标记
                                if (data.aiGenerated) {
                                    label += ' 🤖';
                                }
                                
                                // 添加草稿标记（如果有isPublished字段）
                                if (data.isPublished === false) {
                                    label += ' [草稿]';
                                }
                                
                                return label;
                            }
                        },
                        leaves: {
                            label: {
                                position: layoutConfig.leavesLabelPosition,
                                verticalAlign: 'middle',
                                align: layoutConfig.leavesLabelAlign
                            }
                        },
                        emphasis: {
                            focus: 'descendant'
                        },
                        expandAndCollapse: true,
                        initialTreeDepth: -1, // -1 表示展开所有节点
                        animationDuration: 550,
                        animationDurationUpdate: 750,
                        itemStyle: {
                            color: function(params) {
                                // 根节点使用特殊颜色
                                if (!params.data.id || params.data.id === currentStory.id) {
                                    return 'var(--st-primary-500)';
                                }
                                // 根据作者ID和AI标识获取颜色
                                return getAuthorColor(params.data.authorId, params.data.aiGenerated);
                            },
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        lineStyle: {
                            color: '#ccc',
                            width: 2,
                            curveness: 0.5
                        },
                        orient: layoutConfig.orient,
                        layout: currentLayout === 'radial' ? 'radial' : 'orthogonal',
                        // 启用缩放和拖拽
                        roam: true,
                        // 设置缩放范围
                        scaleLimit: {
                            min: 0.2,
                            max: 5
                        },
                        // 径向布局的初始设置
                        ...(currentLayout === 'radial' ? {
                            initialTreeDepth: -1
                        } : {})
                    }
                ]
            };

            treeChart.setOption(option, true);  // 使用 true 参数完全重置图表

            // 点击事件
            treeChart.off('click');
            treeChart.on('click', function(params) {
                // 排除根节点点击
                if (!params.data.id || params.data.id === currentStory.id) {
                    return; // 根节点不响应点击
                }
                // 只有章节节点才显示详情
                if (params.data.id) {
                    showNodeDetail(params.data);
                }
            });

            // 响应式
            window.addEventListener('resize', () => {
                treeChart?.resize();
            });
        }

        // 渲染统计信息
        function renderStats(stats) {
            const statsGrid = document.getElementById('statsGrid');
            
            statsGrid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-card-icon"><i class="fas fa-book"></i></div>
                    <div class="stat-card-value">${stats.totalNodes}</div>
                    <div class="stat-card-label">总章节数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-icon"><i class="fas fa-code-branch"></i></div>
                    <div class="stat-card-value">${stats.totalBranches}</div>
                    <div class="stat-card-label">分支点数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-icon"><i class="fas fa-eye"></i></div>
                    <div class="stat-card-value">${stats.totalReads}</div>
                    <div class="stat-card-label">总阅读量</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-icon"><i class="fas fa-comment"></i></div>
                    <div class="stat-card-value">${stats.totalComments}</div>
                    <div class="stat-card-label">总评论数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-icon"><i class="fas fa-robot"></i></div>
                    <div class="stat-card-value">${stats.aiNodes}</div>
                    <div class="stat-card-label">AI创作</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-icon"><i class="fas fa-user"></i></div>
                    <div class="stat-card-value">${stats.humanNodes}</div>
                    <div class="stat-card-label">人类创作</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-icon"><i class="fas fa-layer-group"></i></div>
                    <div class="stat-card-value">${stats.maxDepth}</div>
                    <div class="stat-card-label">最大深度</div>
                </div>
                <div class="stat-card">
                    <div class="stat-card-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-card-value">${stats.authors}</div>
                    <div class="stat-card-label">创作者数</div>
                </div>
            `;

            // 渲染统计图表
            renderStatsChart(stats);
        }

        // 渲染统计图表
        function renderStatsChart(stats) {
            const chartDom = document.getElementById('statsChart');
            
            if (!statsChart) {
                statsChart = echarts.init(chartDom);
            }

            const option = {
                title: {
                    text: 'AI vs 人类创作对比',
                    left: 'center'
                },
                tooltip: {
                    trigger: 'item',
                    formatter: '{b}: {c} ({d}%)'
                },
                legend: {
                    orient: 'vertical',
                    left: 'left',
                    top: 'center'
                },
                series: [
                    {
                        type: 'pie',
                        radius: ['40%', '70%'],
                        avoidLabelOverlap: false,
                        itemStyle: {
                            borderRadius: 10,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        label: {
                            show: true,
                            formatter: '{b}: {c}'
                        },
                        emphasis: {
                            label: {
                                show: true,
                                fontSize: 20,
                                fontWeight: 'bold'
                            }
                        },
                        data: [
                            { 
                                value: stats.aiNodes, 
                                name: 'AI创作',
                                itemStyle: { color: 'var(--st-primary-700)' }
                            },
                            { 
                                value: stats.humanNodes, 
                                name: '人类创作',
                                itemStyle: { color: '#4caf50' }
                            }
                        ]
                    }
                ]
            };

            statsChart.setOption(option);

            // 响应式
            window.addEventListener('resize', () => {
                statsChart?.resize();
            });
        }

        // 显示节点详情
        function showNodeDetail(nodeData) {
            selectedNodeId = nodeData.id;
            
            document.getElementById('nodeTitle').textContent = nodeData.name;
            
            const content = document.getElementById('nodeDetailContent');
            const isDraft = nodeData.isPublished === false;
            content.innerHTML = `
                <div class="detail-item">
                    <div class="detail-label">作者</div>
                    <div class="detail-value">${nodeData.author || '未知'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">状态</div>
                    <div class="detail-value" style="color: ${isDraft ? '#f59e0b' : '#059669'};">${isDraft ? '📝 草稿' : '✅ 已发布'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">路径</div>
                    <div class="detail-value">${nodeData.path || '-'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">阅读量</div>
                    <div class="detail-value">${nodeData.readCount || 0}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">评论数</div>
                    <div class="detail-value">${nodeData.commentCount || 0}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">评分</div>
                    <div class="detail-value">${(nodeData.ratingAvg || 0).toFixed(1)} <small style="color: #999;">(${nodeData.ratingCount || 0}人)</small></div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">分支数</div>
                    <div class="detail-value">${nodeData.branchCount || 0}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">创作方式</div>
                    <div class="detail-value">${nodeData.aiGenerated ? '🤖 AI创作' : '👤 人类创作'}</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">创建时间</div>
                    <div class="detail-value">${new Date(nodeData.createdAt).toLocaleDateString('zh-CN')}</div>
                </div>
            `;

            // 设置按钮事件
            document.getElementById('readNode').onclick = () => {
                window.location.href = `/chapter?id=${selectedNodeId}`;
            };

            document.getElementById('continueNode').onclick = () => {
                window.location.href = `/write?storyId=${currentStory.id}&parentId=${selectedNodeId}`;
            };

            // 草稿节点：显示「发布草稿」按钮（仅当前用户是节点作者时）
            const publishBtn = document.getElementById('publishDraftNode');
            if (publishBtn) {
                if (isDraft && window.currentUserId && nodeData.authorId === window.currentUserId) {
                    publishBtn.style.display = 'flex';
                    publishBtn.onclick = () => publishDraftNode(selectedNodeId, nodeData.name);
                } else {
                    publishBtn.style.display = 'none';
                }
            }

            document.getElementById('nodeDetail').classList.add('active');
        }

        // 发布草稿节点
        async function publishDraftNode(nodeId, nodeTitle) {
            if (!confirm(`确定要将草稿章节《${nodeTitle}》正式发布吗？\n\n发布后所有读者均可看到此章节。`)) {
                return;
            }
            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                if (!token) { showError('请先登录'); return; }
                showSuccess('正在发布...');
                const response = await fetch(`/api/nodes/${nodeId}/publish`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.error || '发布失败');
                }
                showSuccess('草稿已发布！即将刷新...');
                setTimeout(() => window.location.reload(), 1500);
            } catch (error) {
                showError(error.message || '发布失败');
            }
        }

        // 切换标签页
        function switchTab(tabName) {
            // 更新按钮状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });

            // 更新内容显示
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.toggle('active', content.id === `${tabName}Tab`);
            });

            // 如果切换到统计标签，刷新图表
            if (tabName === 'stats' && statsChart) {
                setTimeout(() => statsChart.resize(), 100);
            }
        }

        // 切换布局
        function changeLayout(layout) {
            currentLayout = layout;

            // 更新按钮状态
            document.querySelectorAll('.tree-toolbar-left .toolbar-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            if (layout === 'vertical') {
                document.getElementById('layoutVertical').classList.add('active');
            } else if (layout === 'horizontal') {
                document.getElementById('layoutHorizontal').classList.add('active');
            } else if (layout === 'radial') {
                document.getElementById('layoutRadial').classList.add('active');
            }

            // 重新渲染树状图
            if (treeData) {
                renderTree(treeData.tree);
            }
        }

        // 导出图片
        function exportTreeImage() {
            if (!treeChart) return;

            const url = treeChart.getDataURL({
                type: 'png',
                pixelRatio: 2,
                backgroundColor: '#fff'
            });

            const link = document.createElement('a');
            link.href = url;
            link.download = `${currentStory.title}-分支树.png`;
            link.click();

            showSuccess('图片已导出');
        }

        // 显示消息
        function showError(message) {
            showMessage(message, 'error');
        }

        function showSuccess(message) {
            showMessage(message, 'success');
        }

        function showMessage(message, type = 'info') {
            const messageEl = document.createElement('div');
            messageEl.className = `message message-${type}`;
            messageEl.innerHTML = `
                <i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i>
                <span>${message}</span>
            `;
            messageEl.style.cssText = `
                position: fixed;
                top: 100px;
                right: 20px;
                background: white;
                padding: 15px 25px;
                border-radius: 10px;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                display: flex;
                align-items: center;
                gap: 10px;
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
                border-left: 4px solid ${type === 'error' ? '#f44336' : '#4caf50'};
            `;

            document.body.appendChild(messageEl);

            setTimeout(() => {
                messageEl.style.animation = 'fadeOut 0.3s ease-out forwards';
                setTimeout(() => messageEl.remove(), 300);
            }, 3000);
        }
    </script>
    <script src="js/loading.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/navbar.js"></script>
</body>
</html>
