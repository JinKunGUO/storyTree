<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - StoryTree</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/utilities.css">
    <link href="libs/fontawesome/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/pages/profile.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar" role="navigation" aria-label="主导航">
        <div class="navbar-content">
            <a href="/" class="nav-brand" aria-label="StoryTree 首页">
                <i class="fas fa-tree" aria-hidden="true"></i>
                StoryTree
            </a>
            <button class="mobile-menu-toggle" id="mobileMenuToggle" onclick="toggleMobileMenu()" aria-label="展开菜单" aria-expanded="false">
                <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <div class="nav-menu" id="navMenu" role="menubar">
                <a href="/" class="nav-link" role="menuitem">
                    <i class="fas fa-home" aria-hidden="true"></i> 首页
                </a>
                <a href="/discover.html" class="nav-link" role="menuitem">
                    <i class="fas fa-compass" aria-hidden="true"></i> 发现故事
                </a>
                <a href="/membership.html" class="nav-link" role="menuitem">
                    <i class="fas fa-crown" aria-hidden="true"></i> 会员中心
                </a>
                <a href="/points-mall.html" class="nav-link" role="menuitem">
                    <i class="fas fa-shopping-cart" aria-hidden="true"></i> 积分商城
                </a>
                <a href="/notifications.html" class="nav-link nav-notification" id="notificationIcon" role="menuitem" aria-label="消息通知">
                    <i class="fas fa-bell" aria-hidden="true"></i> 消息
                    <span class="notification-badge" id="notificationBadge" style="display: none;" aria-live="polite">0</span>
                </a>
                <a href="/profile.html" class="nav-link active" id="profileLink" role="menuitem">
                    <i class="fas fa-user" aria-hidden="true"></i> 个人中心
                </a>
                <a href="/login.html" class="nav-link" onclick="logout(); return false;" role="menuitem">
                    <i class="fas fa-sign-out-alt" aria-hidden="true"></i> 退出
                </a>
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <!-- 个人信息 -->
        <div class="profile-header" id="profileHeader">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>加载中...</p>
            </div>
        </div>

        <!-- 签到日历（隐藏） -->
        <div class="content-section" style="display: none;">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-calendar-check"></i> 每日签到</h2>
                <div class="checkin-stats">
                    <span class="checkin-stat-item">
                        <i class="fas fa-fire"></i> 
                        连续 <strong id="consecutiveDays">0</strong> 天
                    </span>
                    <span class="checkin-stat-item">
                        <i class="fas fa-ticket-alt"></i> 
                        补签 <strong id="makeupChancesDisplay">0</strong> 次
                    </span>
                </div>
            </div>
            
<div class="checkin-container">
                <!-- 月份选择器 -->
                <div class="calendar-header">
                    <button class="calendar-nav-btn" onclick="changeMonth(-1)">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <div class="calendar-month" id="calendarMonth">2026 年 3 月</div>
                    <button class="calendar-nav-btn" onclick="changeMonth(1)">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>

                <!-- 日历 -->
                <div class="calendar-grid" id="calendarGrid">
                    <div class="calendar-day-header">日</div>
                    <div class="calendar-day-header">一</div>
                    <div class="calendar-day-header">二</div>
                    <div class="calendar-day-header">三</div>
                    <div class="calendar-day-header">四</div>
                    <div class="calendar-day-header">五</div>
                    <div class="calendar-day-header">六</div>
                    <!-- 日期将通过 JavaScript 动态生成 -->
                </div>

                <!-- 签到统计 -->
                <div class="checkin-summary">
                    <div class="summary-item">
                        <div class="summary-value" id="totalCheckins">0</div>
                        <div class="summary-label">累计签到</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value" id="totalCheckinPoints">0</div>
                        <div class="summary-label">签到积分</div>
                    </div>
                    <div class="summary-item">
                        <div class="summary-value" id="makeupCount">0</div>
                        <div class="summary-label">补签次数</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 我的故事 -->
        <div class="content-section">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-book-open"></i> 我的故事</h2>
                <a href="/create.html" class="btn btn-primary">
                    <i class="fas fa-plus"></i> 创建新故事
                </a>
            </div>
            <div class="stories-list" id="storiesList">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                </div>
            </div>
        </div>

        <!-- 我关注的故事 -->
        <div class="content-section">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-star"></i> 我关注的故事</h2>
            </div>
            <div class="stories-list" id="followedStoriesList">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                </div>
            </div>
        </div>

        <!-- 我的粉丝和故事追更者（两栏布局） -->
        <div class="two-column-section">
            <!-- 我的粉丝 -->
            <div class="content-section column-item">
                <div class="section-header">
                    <h2 class="section-title"><i class="fas fa-users"></i> 我的粉丝</h2>
                    <button class="view-more-btn" id="viewMoreFollowers" style="display: none;" onclick="toggleFollowersView()">
                        查看全部
                    </button>
                </div>
                <div id="followersList" class="compact-list">
                    <div class="loading">
                        <i class="fas fa-spinner"></i>
                    </div>
                </div>
            </div>

            <!-- 我的故事追更者 -->
            <div class="content-section column-item">
                <div class="section-header">
                    <h2 class="section-title"><i class="fas fa-book-reader"></i> 我的故事追更者</h2>
                    <button class="view-more-btn" id="viewMoreStoryFollowers" style="display: none;" onclick="toggleStoryFollowersView()">
                        查看全部
                    </button>
                </div>
                <div id="storyFollowersList" class="compact-list">
                    <div class="loading">
                        <i class="fas fa-spinner"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 我的协作申请 -->
        <div class="content-section">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-user-plus"></i> 我的协作申请</h2>
            </div>
            <div id="collaborationRequestsList">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                </div>
            </div>
        </div>

        <!-- AI 使用统计 -->
        <div class="content-section">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-robot"></i> AI 使用统计</h2>
            </div>
            <div id="aiUsageStats" class="ai-usage-container">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                </div>
            </div>
        </div>

        <!-- 我的邀请码（独占整行） -->
        <div class="content-section">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-gift"></i> 我的邀请码</h2>
                <button onclick="showInviteRules()" style="
                    background: none;
                    border: 1px solid #ccc;
                    border-radius: 50%;
                    width: 20px;
                    height: 20px;
                    cursor: pointer;
                    color: var(--st-primary-500);
                    font-size: 14px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    transition: all 0.3s;
                    padding: 0;
                    line-height: 1;
                    margin-left: 8px;
                " onmouseover="this.style.borderColor='var(--st-primary-500)'; this.style.background='var(--st-primary-500)'; this.style.color='white';" 
                   onmouseout="this.style.borderColor='#ccc'; this.style.background='none'; this.style.color='var(--st-primary-500)';" 
                   title="查看邀请码规则">?</button>
            </div>
            <div id="invitationSection">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                </div>
            </div>
            
            <!-- 兑换邀请码输入框 -->
            <div style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #e0e0e0;">
                <h3 style="margin: 0 0 15px 0; color: #333; font-size: 16px;">
                    <i class="fas fa-ticket-alt"></i> 兑换邀请码
                </h3>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input 
                        type="text" 
                        id="inviteCodeInput" 
                        placeholder="请输入 8 位邀请码"
                        maxlength="8"
                        style="
                            flex: 1;
                            padding: 12px 15px;
                            border: 2px solid #e0e0e0;
                            border-radius: 8px;
                            font-size: 14px;
                            transition: all 0.3s;
                            outline: none;
                        "
                        onfocus="this.style.borderColor='var(--st-primary-500)'; this.style.boxShadow='0 0 0 3px rgba(102, 126, 234, 0.1)';"
                        onblur="this.style.borderColor='#e0e0e0'; this.style.boxShadow='none';"
                    />
                    <button 
                        onclick="redeemInviteCode()"
                        style="
                            padding: 12px 25px;
                            background: linear-gradient(135deg, var(--st-primary-500) 0%, var(--st-primary-700) 100%);
                            color: white;
                            border: none;
                            border-radius: 8px;
                            font-size: 14px;
                            font-weight: 600;
                            cursor: pointer;
                            transition: all 0.3s;
                            white-space: nowrap;
                        "
                        onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 5px 15px rgba(102, 126, 234, 0.4)';"
                        onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='none';"
                    >
                        <i class="fas fa-gift"></i> 兑换积分
                    </button>
                </div>
                <div id="redeemMessage" style="margin-top: 10px; font-size: 14px;"></div>
            </div>
        </div>

        <!-- 收益管理（即将开放占位卡片） -->
        <div class="content-section" style="
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f2ff 100%);
            border: 2px dashed #c5cae9;
        ">
            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px;">
                <!-- 左侧：图标 + 标题 + 说明 -->
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div style="
                        width: 56px;
                        height: 56px;
                        border-radius: 14px;
                        background: linear-gradient(135deg, var(--st-primary-500), var(--st-primary-700));
                        display: flex;
                        align-items: center;
                        justify-content: center;
                        flex-shrink: 0;
                        opacity: 0.7;
                    ">
                        <i class="fas fa-wallet" style="font-size: 24px; color: white;"></i>
                    </div>
                    <div>
                        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 6px;">
                            <h2 style="margin: 0; font-size: 18px; color: #333; font-weight: 700;">
                                收益管理
                            </h2>
                            <span style="
                                background: linear-gradient(135deg, #ff9800, #ffa726);
                                color: white;
                                padding: 2px 10px;
                                border-radius: 20px;
                                font-size: 12px;
                                font-weight: 600;
                                letter-spacing: 0.5px;
                            ">即将开放</span>
                        </div>
                        <p style="margin: 0; color: #888; font-size: 14px; line-height: 1.6;">
                            查看创作收益、申请提现等功能即将上线，敬请期待。
                        </p>
                    </div>
                </div>
                <!-- 右侧：功能预告标签 -->
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <span style="
                        padding: 6px 14px;
                        background: white;
                        border: 1px solid #e0e0e0;
                        border-radius: 20px;
                        font-size: 13px;
                        color: #999;
                        display: flex;
                        align-items: center;
                        gap: 6px;
                    "><i class="fas fa-chart-line"></i> 收益统计</span>
                    <span style="
                        padding: 6px 14px;
                        background: white;
                        border: 1px solid #e0e0e0;
                        border-radius: 20px;
                        font-size: 13px;
                        color: #999;
                        display: flex;
                        align-items: center;
                        gap: 6px;
                    "><i class="fas fa-hand-holding-usd"></i> 申请提现</span>
                    <span style="
                        padding: 6px 14px;
                        background: white;
                        border: 1px solid #e0e0e0;
                        border-radius: 20px;
                        font-size: 13px;
                        color: #999;
                        display: flex;
                        align-items: center;
                        gap: 6px;
                    "><i class="fas fa-history"></i> 提现记录</span>
                </div>
            </div>
        </div>
    </div>

<script src="js/pages/profile.js"></script>
    <script src="js/loading.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/navbar.js"></script>
</body>
</html>
