<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - StoryTree</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding-top: 80px;
        }

        .profile-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .profile-header {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
        }

        .profile-name {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .profile-email {
            color: #666;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .profile-bio {
            color: #999;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .profile-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .stat-icon {
            font-size: 36px;
            color: #667eea;
            margin-bottom: 15px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #999;
            font-size: 14px;
        }

        .content-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }

        .stories-list {
            display: grid;
            gap: 20px;
        }

        .story-item {
            display: flex;
            gap: 20px;
            padding: 20px;
            border: 2px solid #f0f0f0;
            border-radius: 15px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .story-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }

        .story-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            flex-shrink: 0;
        }

        .story-details {
            flex: 1;
        }

        .story-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
        }

        .story-meta {
            display: flex;
            gap: 20px;
            color: #999;
            font-size: 14px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading i {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }

            .profile-name {
                font-size: 24px;
            }

            .profile-actions {
                flex-direction: column;
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .story-item {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="/" class="nav-brand">
                <i class="fas fa-tree"></i>
                StoryTree
            </a>
            <div class="nav-menu">
                <a href="/" class="nav-link">首页</a>
                <a href="/discover" class="nav-link">发现故事</a>
                <a href="/create" class="nav-link">开始创作</a>
                <a href="/profile" class="nav-link" style="color: #667eea;">
                    <i class="fas fa-user"></i> 个人中心
                </a>
                <a href="/login" class="nav-link" onclick="logout(); return false;">
                    <i class="fas fa-sign-out-alt"></i> 退出
                </a>
            </div>
        </div>
    </nav>

    <div class="profile-container">
        <!-- 个人信息 -->
        <div class="profile-header" id="profileHeader">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <p>加载中...</p>
            </div>
        </div>

        <!-- 统计数据 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-book"></i></div>
                <div class="stat-value" id="storyCount">-</div>
                <div class="stat-label">创作故事</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
                <div class="stat-value" id="nodeCount">-</div>
                <div class="stat-label">章节数量</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-heart"></i></div>
                <div class="stat-value" id="likeCount">-</div>
                <div class="stat-label">获得点赞</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-eye"></i></div>
                <div class="stat-value" id="viewCount">-</div>
                <div class="stat-label">总浏览量</div>
            </div>
        </div>

        <!-- 我的故事 -->
        <div class="content-section">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-book-open"></i> 我的故事</h2>
                <a href="/create" class="btn btn-primary">
                    <i class="fas fa-plus"></i> 创建新故事
                </a>
            </div>
            <div class="stories-list" id="storiesList">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;

        // 检查登录状态
        function checkAuthStatus() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            
            if (!token) {
                window.location.href = '/login?redirect=/profile';
                return false;
            }
            return true;
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            sessionStorage.removeItem('token');
            sessionStorage.removeItem('user');
            window.location.href = '/login';
        }

        // 加载用户信息
        async function loadUserProfile() {
            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                
                console.log('开始加载用户信息...');
                console.log('Token存在:', !!token);
                console.log('Token长度:', token ? token.length : 0);
                
                if (!token) {
                    console.error('Token不存在，跳转到登录页');
                    window.location.href = '/login?redirect=/profile';
                    return;
                }
                
                console.log('请求 /api/auth/me...');
                const response = await fetch('/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                console.log('API响应状态:', response.status);
                console.log('响应Content-Type:', response.headers.get('content-type'));

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ error: '未知错误' }));
                    console.error('API错误:', errorData);
                    throw new Error(errorData.error || '获取用户信息失败');
                }

                const data = await response.json();
                console.log('用户信息:', data);
                
                currentUser = data.user;
                
                displayUserProfile(data.user);
                loadUserStats(data.user.id);
                loadUserStories(data.user.id);
            } catch (error) {
                console.error('加载用户信息错误:', error);
                alert('加载失败，请重新登录');
                logout();
            }
        }

        // 显示用户信息
        function displayUserProfile(user) {
            const profileHeader = document.getElementById('profileHeader');
            
            profileHeader.innerHTML = `
                <div class="profile-avatar">
                    <i class="fas fa-user"></i>
                </div>
                <div class="profile-info">
                    <div class="profile-name">${escapeHtml(user.username)}</div>
                    <div class="profile-email">
                        <i class="fas fa-envelope"></i>
                        ${escapeHtml(user.email)}
                    </div>
                    <div class="profile-bio">
                        ${escapeHtml(user.bio || '这个人很懒，还没有写个人简介...')}
                    </div>
                    <div class="profile-actions">
                        <a href="/create" class="btn btn-primary">
                            <i class="fas fa-pen"></i> 创作新故事
                        </a>
                        <button class="btn btn-secondary" onclick="alert('编辑功能开发中...')">
                            <i class="fas fa-edit"></i> 编辑资料
                        </button>
                    </div>
                </div>
            `;
        }

        // 加载用户统计
        async function loadUserStats(userId) {
            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                
                console.log('开始加载用户统计, userId:', userId);
                
                // 使用 /api/users/:id 获取用户信息（包含_count）
                const response = await fetch(`/api/users/${userId}`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                console.log('用户统计API响应状态:', response.status);

                if (!response.ok) {
                    console.error('加载用户统计失败:', response.status);
                    return;
                }
                
                const data = await response.json();
                console.log('用户统计数据:', data);
                
                // 从_count中提取统计数据
                const storyCount = data.user?._count?.stories || 0;
                const nodeCount = data.user?._count?.nodes || 0;
                
                document.getElementById('storyCount').textContent = storyCount;
                document.getElementById('nodeCount').textContent = nodeCount;
                
                // 点赞数和浏览量需要从故事中计算，先显示为0
                // 这些数据会在loadUserStories中更新
                document.getElementById('likeCount').textContent = 0;
                document.getElementById('viewCount').textContent = 0;
            } catch (error) {
                console.error('加载统计数据错误:', error);
            }
        }

        // 加载用户故事
        async function loadUserStories(userId) {
            try {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                
                console.log('开始加载用户故事, userId:', userId);
                console.log('请求 /api/users/' + userId + '/stories');
                
                const response = await fetch(`/api/users/${userId}/stories`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                console.log('故事API响应状态:', response.status);
                console.log('故事API响应Content-Type:', response.headers.get('content-type'));

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('故事API错误响应:', errorText);
                    throw new Error('加载故事失败: ' + response.status);
                }

                const data = await response.json();
                console.log('故事API返回数据:', data);
                console.log('故事数量:', data.stories?.length || 0);
                
                displayUserStories(data.stories);
            } catch (error) {
                console.error('加载故事错误:', error);
                showEmptyStories();
            }
        }

        // 显示用户故事
        function displayUserStories(stories) {
            const storiesList = document.getElementById('storiesList');
            
            console.log('收到的故事数据:', stories);
            
            if (!stories || stories.length === 0) {
                showEmptyStories();
                return;
            }

            // 计算总的点赞数和浏览量
            let totalLikes = 0;
            let totalViews = 0;

            const storiesHTML = stories.map(story => {
                // 安全地获取章节数
                const nodeCount = story._count?.nodes || story.nodes?.length || 0;
                
                // 安全地获取统计数据
                const likeCount = story._count?.likes || 0;
                const viewCount = story.views || 0;
                
                // 累加到总数
                totalLikes += likeCount;
                totalViews += viewCount;
                
                return `
                    <div class="story-item" onclick="window.location.href='/story?id=${story.id}'">
                        <div class="story-icon">
                            <i class="fas fa-book-open"></i>
                        </div>
                        <div class="story-details">
                            <div class="story-title">${escapeHtml(story.title)}</div>
                            <div class="story-meta">
                                <span><i class="fas fa-file-alt"></i> ${nodeCount} 章节</span>
                                <span><i class="fas fa-heart"></i> ${likeCount} 点赞</span>
                                <span><i class="fas fa-eye"></i> ${viewCount} 浏览</span>
                                <span><i class="fas fa-clock"></i> ${formatDate(story.createdAt)}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            storiesList.innerHTML = storiesHTML;
            
            // 更新统计卡片中的总点赞数和总浏览量
            document.getElementById('likeCount').textContent = totalLikes;
            document.getElementById('viewCount').textContent = totalViews;
        }

        // 显示空状态
        function showEmptyStories() {
            const storiesList = document.getElementById('storiesList');
            storiesList.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-book"></i>
                    <p>还没有创作任何故事</p>
                    <a href="/create" class="btn btn-primary">
                        <i class="fas fa-plus"></i> 创建第一个故事
                    </a>
                </div>
            `;
        }

        // HTML转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化日期
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 60) return `${minutes}分钟前`;
            if (hours < 24) return `${hours}小时前`;
            if (days < 30) return `${days}天前`;
            
            return date.toLocaleDateString('zh-CN');
        }

        // 页面加载
        document.addEventListener('DOMContentLoaded', function() {
            if (checkAuthStatus()) {
                loadUserProfile();
            }
        });
    </script>
</body>
</html>
