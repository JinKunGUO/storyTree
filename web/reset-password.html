<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码 - StoryTree</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/utilities.css">
    <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
    <style>
        body {
            background: var(--st-gradient-bg, linear-gradient(135deg, #667eea 0%, #764ba2 100%));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-password-container {
            max-width: 450px;
            width: 100%;
            padding: 40px;
            background: white;
            border-radius: var(--st-radius-2xl, 20px);
            box-shadow: var(--st-shadow-xl, 0 20px 40px rgba(0,0,0,0.15));
        }

        .reset-password-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reset-password-icon {
            font-size: 48px;
            color: var(--st-primary-500, #6366F1);
            margin-bottom: 15px;
        }

        .reset-password-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--st-text-primary, #111827);
            margin-bottom: 10px;
        }

        .reset-password-subtitle {
            font-size: 14px;
            color: var(--st-text-secondary, #4B5563);
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--st-text-primary, #111827);
            margin-bottom: 8px;
        }

        .form-input-wrapper {
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            border: 2px solid var(--st-gray-200, #E5E7EB);
            border-radius: var(--st-radius-lg, 8px);
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--st-primary-500, #6366F1);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--st-text-tertiary, #9CA3AF);
        }

        .toggle-password:hover {
            color: var(--st-primary-500, #6366F1);
        }

        .password-requirements {
            font-size: 12px;
            color: var(--st-text-tertiary, #9CA3AF);
            margin-top: 8px;
            padding-left: 5px;
        }

        .password-requirements li {
            margin-bottom: 4px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--st-radius-lg, 8px);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--st-gradient-brand, linear-gradient(135deg, #6366F1, #8B5CF6));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .success-message {
            background: var(--st-success-50, #F0FDF4);
            border: 1px solid var(--st-success-200, #BBF7D0);
            color: var(--st-success-700, #15803D);
            padding: 15px;
            border-radius: var(--st-radius-lg, 8px);
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .success-message.show {
            display: block;
        }

        .error-message {
            background: var(--st-error-50, #FEF2F2);
            border: 1px solid var(--st-error-200, #FECACA);
            color: var(--st-error-700, #B91C1C);
            padding: 15px;
            border-radius: var(--st-radius-lg, 8px);
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--st-primary-500, #6366F1);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .back-link a:hover {
            color: var(--st-primary-700, #4338CA);
            text-decoration: underline;
        }

        .invalid-token {
            text-align: center;
            padding: 40px 20px;
        }

        .invalid-token-icon {
            font-size: 64px;
            color: var(--st-error-500, #EF4444);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="reset-password-container">
        <div id="validTokenView">
            <div class="reset-password-header">
                <i class="fas fa-lock reset-password-icon"></i>
                <h1 class="reset-password-title">重置密码</h1>
                <p class="reset-password-subtitle">
                    请输入您的新密码
                </p>
            </div>

            <div id="successMessage" class="success-message">
                <i class="fas fa-check-circle"></i>
                <p>密码重置成功！</p>
                <p style="margin-top: 10px;">3秒后自动跳转到登录页面...</p>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label class="form-label" for="newPassword">
                        <i class="fas fa-key"></i> 新密码
                    </label>
                    <div class="form-input-wrapper">
                        <input 
                            type="password" 
                            id="newPassword" 
                            class="form-input" 
                            placeholder="请输入新密码"
                            required
                        >
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                    <ul class="password-requirements">
                        <li>密码长度至少6位</li>
                        <li>建议包含字母、数字和特殊字符</li>
                    </ul>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">
                        <i class="fas fa-key"></i> 确认密码
                    </label>
                    <div class="form-input-wrapper">
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            class="form-input" 
                            placeholder="请再次输入新密码"
                            required
                        >
                        <i class="fas fa-eye toggle-password" id="toggleConfirmPassword"></i>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary">
                    <i class="fas fa-check"></i> 重置密码
                </button>
            </form>

            <div class="back-link">
                <a href="/login.html">
                    <i class="fas fa-arrow-left"></i> 返回登录
                </a>
            </div>
        </div>

        <div id="invalidTokenView" class="invalid-token" style="display: none;">
            <i class="fas fa-times-circle invalid-token-icon"></i>
            <h2>链接无效或已过期</h2>
            <p style="color: #7f8c8d; margin: 20px 0;">
                密码重置链接可能已过期或无效。请重新申请密码重置。
            </p>
            <a href="/forgot-password.html" class="btn btn-primary" style="max-width: 250px; margin: 0 auto; display: block;">
                <i class="fas fa-redo"></i> 重新申请
            </a>
        </div>
    </div>

    <script src="js/loading.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script>
        // 从URL获取token
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token') || window.location.pathname.split('/').pop();

        // 检查token是否存在
        if (!token || token === 'reset-password.html') {
            showInvalidToken();
        }

        const form = document.getElementById('resetPasswordForm');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const togglePassword = document.getElementById('togglePassword');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');

        // 切换密码可见性
        togglePassword.addEventListener('click', function() {
            togglePasswordVisibility(newPasswordInput, this);
        });

        toggleConfirmPassword.addEventListener('click', function() {
            togglePasswordVisibility(confirmPasswordInput, this);
        });

        function togglePasswordVisibility(input, icon) {
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // 表单提交
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // 验证密码
            if (newPassword.length < 6) {
                showError('密码长度至少为6位');
                return;
            }

            if (newPassword !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 重置中...';
            hideMessages();

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        token,
                        newPassword 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess();
                    // 3秒后跳转到登录页
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 3000);
                } else {
                    if (data.error.includes('无效') || data.error.includes('过期')) {
                        showInvalidToken();
                    } else {
                        showError(data.error || '重置失败，请稍后重试');
                    }
                }
            } catch (error) {
                console.error('重置错误:', error);
                showError('网络错误，请稍后重试');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-check"></i> 重置密码';
            }
        });

        function showSuccess() {
            successMessage.classList.add('show');
            errorMessage.classList.remove('show');
            form.style.display = 'none';
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            successMessage.classList.remove('show');
        }

        function hideMessages() {
            successMessage.classList.remove('show');
            errorMessage.classList.remove('show');
        }

        function showInvalidToken() {
            document.getElementById('validTokenView').style.display = 'none';
            document.getElementById('invalidTokenView').style.display = 'block';
        }
    </script>
</body>
</html>
