<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>消息通知 - StoryTree</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/utilities.css">
    <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--st-font-sans);
            background: var(--st-bg-secondary);
            min-height: 100vh;
            padding-top: 64px;
        }

        /* 导航栏由 components.css 提供，此处仅保留页面专属样式 */

        /* 主要内容 */
        .main-content {
            max-width: 800px;
            margin: 24px auto 40px;
            padding: 0 20px;
        }

        .page-header {
            background: white;
            border-radius: var(--st-radius-xl, 15px);
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--st-shadow-md, 0 5px 20px rgba(0,0,0,0.1));
        }

        .page-header h1 {
            color: var(--st-text-primary, #333);
            margin-bottom: 10px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* 通知列表 */
        .notifications-container {
            background: white;
            border-radius: var(--st-radius-xl, 15px);
            padding: 20px;
            box-shadow: var(--st-shadow-md, 0 5px 20px rgba(0,0,0,0.1));
        }

        .notification-item {
            padding: 20px;
            border-bottom: 1px solid var(--st-gray-100, #f0f0f0);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        .notification-item:hover {
            background: var(--st-primary-50, #f8f9ff);
        }

        .notification-item.unread {
            background: var(--st-primary-50, #f0f4ff);
        }

        .notification-item.unread::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 4px;
            height: 60%;
            background: var(--st-primary-500, var(--st-primary-500));
            border-radius: 0 4px 4px 0;
        }

        .notification-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .notification-title {
            font-weight: bold;
            color: var(--st-text-primary, #333);
            font-size: 16px;
        }

        .notification-time {
            color: var(--st-text-tertiary, #999);
            font-size: 12px;
            white-space: nowrap;
            margin-left: 10px;
        }

        .notification-content {
            color: var(--st-text-secondary, #666);
            font-size: 14px;
            line-height: 1.6;
        }

        .notification-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .notification-action-btn {
            padding: 5px 12px;
            font-size: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .mark-read-btn {
            background: var(--st-primary-100, #e8f0ff);
            color: var(--st-primary-600, var(--st-primary-500));
        }

        .mark-read-btn:hover {
            background: var(--st-primary-200, #d0e0ff);
        }

        .delete-btn {
            background: var(--st-error-100, #ffe8e8);
            color: var(--st-error-500, #ff4757);
        }

        .delete-btn:hover {
            background: var(--st-error-200, #ffd0d0);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--st-text-tertiary, #999);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 20px;
            color: var(--st-gray-300, #ddd);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--st-text-tertiary, #999);
        }

        .loading i {
            font-size: 32px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .page-header {
                padding: 20px;
            }

            .header-actions {
                flex-direction: column;
            }

            .notification-header {
                flex-direction: column;
            }

            .notification-time {
                margin-left: 0;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar" id="navbar" role="navigation" aria-label="主导航">
        <div class="navbar-content">
            <a href="/" class="nav-brand" aria-label="StoryTree 首页">
                <img src="/assets/logo.png" alt="Logo" style="width: 32px; height: 32px; border-radius: 8px; margin-right: 8px;">
                StoryTree
            </a>
            <button class="mobile-menu-toggle" id="mobileMenuToggle" onclick="toggleMobileMenu()" aria-label="展开菜单" aria-expanded="false">
                <i class="fas fa-bars" aria-hidden="true"></i>
            </button>
            <div class="nav-menu" id="navMenu" role="menubar">
                <a href="/" class="nav-link" role="menuitem">
                    <i class="fas fa-home" aria-hidden="true"></i> 首页
                </a>
                <a href="/discover.html" class="nav-link" role="menuitem">
                    <i class="fas fa-compass" aria-hidden="true"></i> 发现故事
                </a>
                <a href="/membership.html" class="nav-link" role="menuitem">
                    <i class="fas fa-crown" aria-hidden="true"></i> 会员中心
                </a>
                <a href="/points-mall.html" class="nav-link" role="menuitem">
                    <i class="fas fa-shopping-cart" aria-hidden="true"></i> 积分商城
                </a>
                <a href="/notifications.html" class="nav-link nav-link-active" role="menuitem">
                    <i class="fas fa-bell" aria-hidden="true"></i> 消息
                </a>
                <a href="/login.html" class="nav-link" id="loginLink" role="menuitem">登录</a>
                <a href="/register.html" class="nav-link nav-link-primary" id="registerLink" role="menuitem">注册</a>
                <a href="/profile.html" class="nav-link" id="profileLink" style="display: none;" role="menuitem">
                    <i class="fas fa-user" aria-hidden="true"></i> 个人中心
                </a>
                <a href="/login.html" class="nav-link" id="logoutLink" style="display: none;" onclick="logout(event)" role="menuitem">
                    <i class="fas fa-sign-out-alt" aria-hidden="true"></i> 退出
                </a>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="main-content">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1><i class="fas fa-bell"></i> 消息通知</h1>
            <div class="header-actions">
                <button class="btn btn-primary" onclick="markAllAsRead()">
                    <i class="fas fa-check-double"></i> 全部标为已读
                </button>
                <button class="btn btn-secondary" onclick="filterNotifications('all')" id="filterAll">
                    全部
                </button>
                <button class="btn btn-secondary" onclick="filterNotifications('unread')" id="filterUnread">
                    未读
                </button>
            </div>
        </div>

        <!-- 通知列表 -->
        <div class="notifications-container">
            <div class="loading" id="loading">
                <i class="fas fa-spinner"></i>
                <p>加载中...</p>
            </div>
            <div id="notificationsList" style="display: none;"></div>
        </div>
    </div>

    <script>
        let allNotifications = [];
        let currentFilter = 'all';

        // 检查登录状态
        function checkAuth() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            if (!token) {
                // 携带 redirect 参数，登录后可回到当前页面；用 replace 避免登录页出现在回退历史中
                window.location.replace('/login.html?redirect=' + encodeURIComponent(window.location.pathname + window.location.search));
                return false;
            }
            return true;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            if (!checkAuth()) return;
            
            updateNavbar();
            loadNotifications();
        });

        // 更新导航栏
        function updateNavbar() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            if (token) {
                document.getElementById('loginLink').style.display = 'none';
                const registerLink = document.getElementById('registerLink');
                if (registerLink) registerLink.style.display = 'none';
                document.getElementById('logoutLink').style.display = 'block';
                document.getElementById('profileLink').style.display = 'block';
                loadNavUsername(token);
            }
        }

        async function loadNavUsername(token) {
            try {
                const res = await fetch('/api/auth/me', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const data = await res.json();
                    const username = data.user?.username || '';
                    const profileLink = document.getElementById('profileLink');
                    if (username && profileLink) {
                        const escaped = username.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
                        profileLink.innerHTML = `<i class="fas fa-user" aria-hidden="true"></i><span class="nav-username" title="${escaped}">${escaped}</span>`;
                    }
                }
            } catch (e) { /* 静默失败 */ }
        }

        // 加载通知列表
        async function loadNotifications() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            
            try {
                const response = await fetch('/api/notifications', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (!response.ok) {
                    throw new Error('加载通知失败');
                }

                const data = await response.json();
                allNotifications = data.notifications || [];
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('notificationsList').style.display = 'block';
                
                renderNotifications();
                updateBadge(data.unreadCount || 0);
            } catch (error) {
                console.error('加载通知失败:', error);
                document.getElementById('loading').innerHTML = '<p>加载失败，请刷新重试</p>';
            }
        }

        // 渲染通知列表
        function renderNotifications() {
            const container = document.getElementById('notificationsList');
            
            let filteredNotifications = allNotifications;
            if (currentFilter === 'unread') {
                filteredNotifications = allNotifications.filter(n => !n.is_read);
            }

            if (filteredNotifications.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-bell-slash"></i>
                        <p>${currentFilter === 'unread' ? '暂无未读通知' : '暂无通知'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredNotifications.map(notification => `
                <div class="notification-item ${notification.is_read ? '' : 'unread'}" data-id="${notification.id}">
                    <div class="notification-header">
                        <div class="notification-title">${notification.title}</div>
                        <div class="notification-time">${formatTime(notification.created_at)}</div>
                    </div>
                    <div class="notification-content">${notification.content}</div>
                    <div class="notification-actions">
                        ${notification.link ? `<button class="notification-action-btn mark-read-btn" onclick="handleNotificationClick(${notification.id}, '${notification.link}')">查看详情</button>` : ''}
                        ${!notification.is_read ? `<button class="notification-action-btn mark-read-btn" onclick="markAsRead(${notification.id})">标为已读</button>` : ''}
                        <button class="notification-action-btn delete-btn" onclick="deleteNotification(${notification.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        // 格式化时间
        function formatTime(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 7) {
                return date.toLocaleDateString('zh-CN');
            } else if (days > 0) {
                return `${days}天前`;
            } else if (hours > 0) {
                return `${hours}小时前`;
            } else if (minutes > 0) {
                return `${minutes}分钟前`;
            } else {
                return '刚刚';
            }
        }

        // 处理通知点击
        async function handleNotificationClick(id, link) {
            await markAsRead(id);
            if (link) {
                let finalLink = link;
                
                // === 兼容旧格式链接 ===
                
                // 1. /user/:id → /profile.html?id=:id
                if (link.startsWith('/user/')) {
                    const userId = link.replace('/user/', '');
                    finalLink = `/profile.html?id=${userId}`;
                    console.log(`🔄 转换链接: ${link} → ${finalLink}`);
                }
                
                // 2. /nodes/:id → /story.html?id=:story_id&node=:id
                else if (link.startsWith('/nodes/')) {
                    const nodeId = link.replace('/nodes/', '');
                    try {
                        const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                        const response = await fetch(`/api/nodes/${nodeId}`, {
                            headers: { 'Authorization': `Bearer ${token}` }
                        });
                        if (!response.ok) throw new Error('节点不存在');
                        const data = await response.json();
                        finalLink = `/story.html?id=${data.node.story_id}&node=${nodeId}`;
                        console.log(`🔄 转换链接: ${link} → ${finalLink}`);
                    } catch (error) {
                        console.error('获取节点信息失败:', error);
                        showMessage('无法打开链接', 'error');
                        return;
                    }
                }
                
                // 3. /api/ai/tasks/:id → /ai-tasks.html?id=:id
                else if (link.startsWith('/api/ai/tasks/')) {
                    const taskId = link.replace('/api/ai/tasks/', '');
                    finalLink = `/ai-tasks.html?id=${taskId}`;
                    console.log(`🔄 转换链接: ${link} → ${finalLink}`);
                }
                
                // 4. /profile → /profile.html（精确匹配）
                else if (link === '/profile') {
                    finalLink = '/profile.html';
                    console.log(`🔄 转换链接: ${link} → ${finalLink}`);
                }
                
                // 5. /profile? → /profile.html?（带参数，如 tab=withdrawals）
                else if (link.startsWith('/profile?')) {
                    finalLink = link.replace('/profile?', '/profile.html?');
                    console.log(`🔄 转换链接: ${link} → ${finalLink}`);
                }
                
                // 6. /story?id= → /story.html?id=
                else if (link.startsWith('/story?')) {
                    finalLink = link.replace('/story?', '/story.html?');
                    console.log(`🔄 转换链接: ${link} → ${finalLink}`);
                }
                
                // 7. /story-settings?id= → /story-settings.html?id=
                else if (link.startsWith('/story-settings?')) {
                    finalLink = link.replace('/story-settings?', '/story-settings.html?');
                    console.log(`🔄 转换链接: ${link} → ${finalLink}`);
                }
                
                // 8. /chapter?id= → /chapter.html?id=
                else if (link.startsWith('/chapter?')) {
                    finalLink = link.replace('/chapter?', '/chapter.html?');
                    console.log(`🔄 转换链接: ${link} → ${finalLink}`);
                }
                
                // 9. /ai-tasks?id= → /ai-tasks.html?id=
                else if (link.startsWith('/ai-tasks?')) {
                    finalLink = link.replace('/ai-tasks?', '/ai-tasks.html?');
                    console.log(`🔄 转换链接: ${link} → ${finalLink}`);
                }
                
                window.location.href = finalLink;
            }
        }

        // 标记为已读
        async function markAsRead(id) {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            
            try {
                const response = await fetch(`/api/notifications/${id}/read`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    // 更新本地数据
                    const notification = allNotifications.find(n => n.id === id);
                    if (notification) {
                        notification.is_read = true;
                    }
                    renderNotifications();
                    updateBadge();
                }
            } catch (error) {
                console.error('标记失败:', error);
            }
        }

        // 全部标为已读
        async function markAllAsRead() {
            const token = localStorage.getItem('token') || sessionStorage.getItem('token');
            
            try {
                const response = await fetch('/api/notifications/read-all', {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                if (response.ok) {
                    allNotifications.forEach(n => n.is_read = true);
                    renderNotifications();
                    updateBadge();
                    showMessage('已全部标为已读', 'success');
                }
            } catch (error) {
                console.error('操作失败:', error);
                showMessage('操作失败，请重试', 'error');
            }
        }

        // 删除通知
        async function deleteNotification(id) {
            const doDelete = async () => {
                const token = localStorage.getItem('token') || sessionStorage.getItem('token');
                
                try {
                    const response = await fetch(`/api/notifications/${id}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        allNotifications = allNotifications.filter(n => n.id !== id);
                        renderNotifications();
                        updateBadge();
                        showMessage('删除成功', 'success');
                    }
                } catch (error) {
                    console.error('删除失败:', error);
                    showMessage('删除失败，请重试', 'error');
                }
            };

            if (window.showDangerConfirm) {
                showDangerConfirm('确定要删除这条通知吗？', doDelete, { title: '删除通知', confirmText: '确认删除' });
            } else if (confirm('确定要删除这条通知吗？')) {
                await doDelete();
            }
        }

        // 筛选通知
        function filterNotifications(filter) {
            currentFilter = filter;
            
            // 更新按钮样式
            document.getElementById('filterAll').className = filter === 'all' ? 'btn btn-primary' : 'btn btn-secondary';
            document.getElementById('filterUnread').className = filter === 'unread' ? 'btn btn-primary' : 'btn btn-secondary';
            
            renderNotifications();
        }

        // 更新未读计数徽章
        function updateBadge(count) {
            if (count === undefined) {
                count = allNotifications.filter(n => !n.is_read).length;
            }
            
            const badge = document.getElementById('notificationBadge');
            if (!badge) return;  // 当前页面无徽章元素时直接跳过
            if (count > 0) {
                badge.textContent = count > 99 ? '99+' : count;
                badge.style.display = 'block';
            } else {
                badge.style.display = 'none';
            }
        }

        // 显示消息
        function showMessage(message, type = 'success') {
            const messageEl = document.createElement('div');
            messageEl.className = `message message-${type}`;
            messageEl.innerHTML = `
                <i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(messageEl);
            
            setTimeout(() => {
                messageEl.remove();
            }, 3000);
        }

        // 退出登录
        function logout(event) {
            event.preventDefault();
            localStorage.removeItem('token');
            sessionStorage.removeItem('token');
            window.location.href = '/login.html';
        }
    </script>
    <script src="js/loading.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/navbar.js"></script>
</body>
</html>
