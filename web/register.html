<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - StoryTree</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-tree"></i>
                    <h1>StoryTree</h1>
                </div>
                <p class="subtitle">创建你的故事树，开始创作之旅</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" required 
                               placeholder="请输入用户名" minlength="3" maxlength="20">
                    </div>
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="email">邮箱</label>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" name="email" required 
                               placeholder="请输入邮箱地址">
                    </div>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" required 
                               placeholder="请输入密码" minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <span class="strength-text" id="strengthText">密码强度</span>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">确认密码</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirmPassword" name="confirmPassword" required 
                               placeholder="请再次输入密码">
                        <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <div class="form-group">
                    <label for="invitationCode">
                        邀请码（可选）
                        <span style="color: #999; font-size: 12px; font-weight: normal;">有邀请码可获得积分奖励</span>
                    </label>
                    <div class="input-group">
                        <i class="fas fa-ticket-alt"></i>
                        <input type="text" id="invitationCode" name="invitationCode" 
                               placeholder="请输入邀请码" maxlength="8" 
                               style="text-transform: uppercase;">
                        <button type="button" class="verify-code-btn" onclick="verifyInviteCode()" 
                                style="position: absolute; right: 10px; background: none; border: none; 
                                       color: #667eea; cursor: pointer; font-size: 14px; padding: 5px 10px;">
                            验证
                        </button>
                    </div>
                    <span class="success-message" id="inviteCodeSuccess" style="display: none; color: #4caf50; font-size: 13px; margin-top: 5px;"></span>
                    <span class="error-message" id="inviteCodeError"></span>
                </div>

                <button type="submit" class="auth-button" id="registerBtn">
                    <span class="button-text">立即注册</span>
                    <span class="button-loading" style="display: none;">
                        <i class="fas fa-spinner fa-spin"></i> 注册中...
                    </span>
                </button>

                <div class="auth-footer">
                    <p>已有账号？ <a href="/login">立即登录</a></p>
                </div>
            </form>
        </div>

        <div class="auth-image">
            <div class="image-content">
                <i class="fas fa-tree"></i>
                <h2>欢迎来到StoryTree</h2>
                <p>在这里，每个故事都是一片叶子，共同组成属于你的故事森林</p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
