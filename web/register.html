<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - StoryTree</title>
    <link rel="stylesheet" href="styles/design-system.css">
    <link rel="stylesheet" href="styles/animations.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/utilities.css">
    <link rel="stylesheet" href="styles.css">
    <link href="libs/fontawesome/css/all.min.css" rel="stylesheet">
    <style>
        /* ===== 全局重置 ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --primary-light: #818CF8;
            --primary-50: #EEF2FF;
            --primary-100: #E0E7FF;
            --text-primary: #1E1B4B;
            --text-secondary: #6B7280;
            --text-muted: #9CA3AF;
            --border: #E5E7EB;
            --border-focus: #6366F1;
            --bg-input: #F9FAFB;
            --error: #EF4444;
            --success: #10B981;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow-lg: 0 20px 60px rgba(99,102,241,.15), 0 8px 24px rgba(0,0,0,.08);
            --transition: 200ms cubic-bezier(.4,0,.2,1);
        }

        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: linear-gradient(120deg, #3730A3 0%, #6366F1 38%, #A78BFA 62%, #EEF2FF 100%);
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        /* ===== 整体布局 ===== */
        .register-page {
            min-height: 100vh;
            display: flex;
            align-items: stretch;
            position: relative;
        }

        /* ===== 左侧品牌区 ===== */
        .brand-panel {
            position: relative;
            flex: 1;
            background: transparent;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 48px;
            overflow: hidden;
        }
        .brand-panel::before {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            background: rgba(255,255,255,.07);
            top: -120px; right: -60px;
            pointer-events: none;
        }
        .brand-panel::after {
            content: '';
            position: absolute;
            width: 320px; height: 320px;
            border-radius: 50%;
            background: rgba(255,255,255,.05);
            bottom: -80px; left: -80px;
            pointer-events: none;
        }
        .brand-particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,.12);
            animation: float-particle 8s ease-in-out infinite;
        }
        .particle:nth-child(1) { width:12px; height:12px; top:15%; left:10%; animation-delay:0s; }
        .particle:nth-child(2) { width:8px;  height:8px;  top:35%; left:80%; animation-delay:1.5s; }
        .particle:nth-child(3) { width:16px; height:16px; top:65%; left:15%; animation-delay:3s; }
        .particle:nth-child(4) { width:6px;  height:6px;  top:80%; left:70%; animation-delay:4.5s; }
        .particle:nth-child(5) { width:10px; height:10px; top:50%; left:50%; animation-delay:2s; }
        @keyframes float-particle {
            0%, 100% { transform: translateY(0) scale(1); opacity: .6; }
            50% { transform: translateY(-20px) scale(1.1); opacity: 1; }
        }
        .brand-content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
            max-width: 380px;
        }
        .brand-logo-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 88px; height: 88px;
            background: rgba(255,255,255,.15);
            border-radius: 24px;
            margin-bottom: 28px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,.2);
            box-shadow: 0 8px 32px rgba(0,0,0,.12);
        }
        .brand-logo-wrap svg { width: 44px; height: 44px; fill: white; }
        .brand-title {
            font-size: clamp(2rem, 3vw, 2.75rem);
            font-weight: 300;
            letter-spacing: .04em;
            color: white;
            margin-bottom: 16px;
            line-height: 1.15;
            text-shadow: 0 2px 20px rgba(0,0,0,.15);
        }
        .brand-title span {
            display: block;
            font-size: .48em;
            font-weight: 400;
            letter-spacing: .22em;
            opacity: .7;
            text-transform: uppercase;
            margin-bottom: 6px;
            color: rgba(255,255,255,.85);
        }
        .brand-desc {
            font-size: 1rem;
            line-height: 1.7;
            opacity: .85;
            margin-bottom: 40px;
        }
        .brand-features {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
        }
        .brand-feature {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.15);
            border-radius: var(--radius-md);
            padding: 12px 16px;
            backdrop-filter: blur(4px);
            text-align: left;
            transition: background var(--transition);
        }
        .brand-feature:hover { background: rgba(255,255,255,.16); }
        .brand-feature-icon {
            width: 36px; height: 36px;
            background: rgba(255,255,255,.2);
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            font-size: 16px;
        }
        .brand-feature-text { font-size: .875rem; opacity: .9; line-height: 1.4; }
        .brand-feature-text strong { display: block; font-weight: 600; margin-bottom: 2px; }

        /* ===== 右侧表单区 ===== */
        .form-panel {
            width: 420px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 36px 36px;
            margin: 24px 48px 24px 24px;
            background: rgba(255,255,255,0.78);
            backdrop-filter: blur(32px) saturate(1.5);
            -webkit-backdrop-filter: blur(32px) saturate(1.5);
            border-radius: 28px;
            box-shadow:
                0 32px 80px rgba(55,48,163,.18),
                0 8px 24px rgba(0,0,0,.08),
                inset 0 1px 0 rgba(255,255,255,.6);
            overflow-y: auto;
        }
        .form-inner {
            width: 100%;
            max-width: 420px;
        }

        /* 移动端顶部 logo */
        .mobile-brand {
            display: none;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }
        .mobile-brand-icon {
            width: 40px; height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .mobile-brand-icon svg { width: 22px; height: 22px; fill: white; }
        .mobile-brand-name {
            font-size: 1.375rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -.02em;
        }

        /* 表单标题 */
        .form-heading {
            margin-bottom: 20px;
        }
        .form-heading h2 {
            font-size: 1.625rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -.03em;
            margin-bottom: 4px;
        }
        .form-heading p {
            font-size: .9rem;
            color: var(--text-secondary);
        }

        /* 表单字段 */
        .field {
            margin-bottom: 14px;
        }
        .field-label {
            display: block;
            font-size: .8125rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }
        .field-label-hint {
            font-size: .75rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-left: 4px;
        }
        .field-wrap {
            position: relative;
        }
        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 14px;
            pointer-events: none;
            transition: color var(--transition);
        }
        .field-input {
            width: 100%;
            height: 46px;
            padding: 0 42px;
            background: rgba(249,250,251,0.9);
            border: 1.5px solid rgba(229,231,235,0.8);
            border-radius: var(--radius-md);
            font-size: .9375rem;
            color: var(--text-primary);
            outline: none;
            transition: border-color var(--transition), box-shadow var(--transition), background var(--transition);
            -webkit-appearance: none;
        }
        .field-input::placeholder { color: var(--text-muted); }
        .field-input:focus {
            border-color: var(--border-focus);
            background: #fff;
            box-shadow: 0 0 0 3px rgba(99,102,241,.12);
        }
        .field-wrap:focus-within .field-icon { color: var(--primary); }

        /* 密码可见切换 */
        .field-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            transition: color var(--transition), background var(--transition);
            font-size: 14px;
        }
        .field-toggle:hover { color: var(--primary); background: var(--primary-50); }

        /* 邀请码验证按钮 */
        .field-action {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: .8125rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background var(--transition);
        }
        .field-action:hover { background: var(--primary-50); }

        /* 协议勾选框 */
        .agreement-field {
            margin: 16px 0 8px;
        }
        .agreement-checkbox {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            cursor: pointer;
        }
        .agreement-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: var(--primary);
            cursor: pointer;
            flex-shrink: 0;
        }
        .agreement-text {
            font-size: .8125rem;
            color: var(--text-secondary);
            line-height: 1.5;
        }
        .agreement-text a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }
        .agreement-text a:hover {
            text-decoration: underline;
        }
        .agreement-error {
            display: block;
            font-size: .75rem;
            color: var(--error);
            margin-top: 4px;
            margin-left: 28px;
        }

        /* 密码强度 */
        .password-strength {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
        }
        .strength-bar {
            flex: 1;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            width: 0;
            border-radius: 2px;
            transition: width .3s, background .3s;
        }
        .strength-text {
            font-size: .75rem;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* 错误 / 成功提示 */
        .field-error {
            display: block;
            font-size: .75rem;
            color: var(--error);
            margin-top: 3px;
            min-height: 16px;
            line-height: 1.4;
        }
        .field-success {
            display: block;
            font-size: .75rem;
            color: var(--success);
            margin-top: 3px;
            min-height: 16px;
            line-height: 1.4;
        }
        .field-input.has-error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(239,68,68,.1);
        }

        /* 注册按钮 */
        .submit-btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(135deg, var(--primary) 0%, #7C3AED 100%);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform var(--transition), box-shadow var(--transition), opacity var(--transition);
            box-shadow: 0 4px 16px rgba(99,102,241,.35);
            letter-spacing: .01em;
            position: relative;
            overflow: hidden;
            margin-top: 4px;
        }
        .submit-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background var(--transition);
        }
        .submit-btn:hover:not(:disabled)::after { background: rgba(255,255,255,.08); }
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(99,102,241,.45);
        }
        .submit-btn:active:not(:disabled) { transform: translateY(0); }
        .submit-btn:disabled { opacity: .65; cursor: not-allowed; box-shadow: none; }

        /* 分割线 */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 18px 0;
            color: var(--text-muted);
            font-size: .8125rem;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* 登录引导 */
        .login-hint {
            text-align: center;
            font-size: .9rem;
            color: var(--text-secondary);
        }
        .login-hint a {
            color: var(--primary);
            font-weight: 700;
            text-decoration: none;
            transition: color var(--transition);
        }
        .login-hint a:hover { color: var(--primary-dark); }

        /* 版权 */
        .form-footer {
            margin-top: 20px;
            text-align: center;
            font-size: .75rem;
            color: var(--text-muted);
        }
        .form-footer a { color: var(--text-muted); text-decoration: none; }
        .form-footer a:hover { color: var(--primary); }

        /* 微信注册按钮 */
        .wx-login-btn {
            width: 100%;
            height: 50px;
            background: #07C160;
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform var(--transition), box-shadow var(--transition), background var(--transition);
            box-shadow: 0 4px 16px rgba(7,193,96,.3);
            text-decoration: none;
            letter-spacing: .01em;
        }
        .wx-login-btn:hover {
            background: #06AD56;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(7,193,96,.4);
        }
        .wx-login-btn:active { transform: translateY(0); }
        .wx-login-btn svg { flex-shrink: 0; }

        /* ===== 响应式 ===== */
        @media (max-width: 900px) {
            .register-page {
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding: 16px;
                min-height: 100vh;
            }
            .brand-panel { display: none; }
            .form-panel {
                width: 100%;
                max-width: 480px;
                margin: 0;
                border-radius: 24px;
                padding: 28px 24px;
                background: rgba(255,255,255,0.92);
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                /* 允许内容超出时滚动，但优先让内容紧凑不溢出 */
                overflow-y: visible;
                justify-content: flex-start;
            }
            .mobile-brand { display: flex; }
            .form-heading { margin-bottom: 16px; }
            .field { margin-bottom: 12px; }
        }

        @media (max-width: 480px) {
            .register-page { padding: 12px; }
            .form-panel { padding: 24px 20px; border-radius: 20px; }
            .form-heading h2 { font-size: 1.375rem; }
            .field-input { height: 44px; font-size: .9375rem; }
            .submit-btn { height: 48px; font-size: .9375rem; }
        }

        @media (min-width: 1400px) {
            .brand-panel { padding: 80px 72px; }
            .form-panel { width: 460px; padding: 44px; margin: 32px 64px 32px 28px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
        }
    </style>
</head>
<body>
    <div class="register-page">

        <!-- 左侧品牌面板 -->
        <div class="brand-panel" aria-hidden="true">
            <div class="brand-particles">
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
                <div class="particle"></div>
            </div>
            <div class="brand-content">
                <div class="brand-logo-wrap">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C9.5 2 7.5 4 7.5 6.5c0 .8.2 1.5.5 2.1C6.3 9.1 5 10.7 5 12.5c0 1.4.7 2.7 1.8 3.5H10v4h4v-4h3.2c1.1-.8 1.8-2.1 1.8-3.5 0-1.8-1.3-3.4-3-3.9.3-.6.5-1.3.5-2.1C16.5 4 14.5 2 12 2z"/>
                    </svg>
                </div>
                <h1 class="brand-title">
                    <span>Join Us Today</span>
                    StoryTree
                </h1>
                <p class="brand-desc">每一个故事都是一片叶子，<br>每一次创作都让树更繁茂。</p>
                <div class="brand-features">
                    <div class="brand-feature">
                        <div class="brand-feature-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                        </div>
                        <div class="brand-feature-text">
                            <strong>自由创作</strong>
                            构建属于你的故事宇宙
                        </div>
                    </div>
                    <div class="brand-feature">
                        <div class="brand-feature-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
                        </div>
                        <div class="brand-feature-text">
                            <strong>AI 辅助续写</strong>
                            突破创作瓶颈，灵感不断
                        </div>
                    </div>
                    <div class="brand-feature">
                        <div class="brand-feature-icon">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
                        </div>
                        <div class="brand-feature-text">
                            <strong>社区互动</strong>
                            与万千创作者共同成长
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧表单面板 -->
        <main class="form-panel">
            <div class="form-inner">

                <!-- 移动端 logo -->
                <div class="mobile-brand">
                    <div class="mobile-brand-icon">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 2C9.5 2 7.5 4 7.5 6.5c0 .8.2 1.5.5 2.1C6.3 9.1 5 10.7 5 12.5c0 1.4.7 2.7 1.8 3.5H10v4h4v-4h3.2c1.1-.8 1.8-2.1 1.8-3.5 0-1.8-1.3-3.4-3-3.9.3-.6.5-1.3.5-2.1C16.5 4 14.5 2 12 2z"/>
                        </svg>
                    </div>
                    <span class="mobile-brand-name">StoryTree</span>
                </div>

                <!-- 标题 -->
                <div class="form-heading">
                    <h2>创建账号</h2>
                    <p>加入 StoryTree，开始你的创作之旅</p>
                </div>

                <!-- 注册表单（保留 auth.js 所依赖的所有 id） -->
                <form id="registerForm" novalidate>

                    <!-- 用户名 -->
                    <div class="field">
                        <label class="field-label" for="username">用户名</label>
                        <div class="field-wrap">
                            <svg class="field-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            <input class="field-input" type="text" id="username" name="username"
                                   placeholder="请输入用户名" minlength="3" maxlength="20"
                                   autocomplete="username" required>
                        </div>
                        <span class="field-error" id="usernameError" role="alert"></span>
                    </div>

                    <!-- 邮箱 -->
                    <div class="field">
                        <label class="field-label" for="email">邮箱地址</label>
                        <div class="field-wrap">
                            <svg class="field-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            <input class="field-input" type="email" id="email" name="email"
                                   placeholder="your@email.com"
                                   autocomplete="email" required>
                        </div>
                        <span class="field-error" id="emailError" role="alert"></span>
                    </div>

                    <!-- 密码 -->
                    <div class="field">
                        <label class="field-label" for="password">密码</label>
                        <div class="field-wrap">
                            <svg class="field-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input class="field-input" type="password" id="password" name="password"
                                   placeholder="请输入密码（至少6位）" minlength="6"
                                   autocomplete="new-password" required>
                            <button type="button" class="field-toggle toggle-password" onclick="togglePassword('password')" aria-label="显示/隐藏密码">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <div class="password-strength">
                            <div class="strength-bar">
                                <div class="strength-fill" id="strengthFill"></div>
                            </div>
                            <span class="strength-text" id="strengthText">密码强度</span>
                        </div>
                        <span class="field-error" id="passwordError" role="alert"></span>
                    </div>

                    <!-- 确认密码 -->
                    <div class="field">
                        <label class="field-label" for="confirmPassword">确认密码</label>
                        <div class="field-wrap">
                            <svg class="field-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                            <input class="field-input" type="password" id="confirmPassword" name="confirmPassword"
                                   placeholder="请再次输入密码"
                                   autocomplete="new-password" required>
                            <button type="button" class="field-toggle toggle-password" onclick="togglePassword('confirmPassword')" aria-label="显示/隐藏密码">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                        <span class="field-error" id="confirmPasswordError" role="alert"></span>
                    </div>

                    <!-- 邀请码（可选） -->
                    <div class="field">
                        <label class="field-label" for="invitationCode">
                            邀请码
                            <span class="field-label-hint">（可选，有邀请码可获得积分奖励）</span>
                        </label>
                        <div class="field-wrap">
                            <svg class="field-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
                            <input class="field-input" type="text" id="invitationCode" name="invitationCode"
                                   placeholder="请输入邀请码" maxlength="8"
                                   style="text-transform: uppercase; padding-right: 64px;">
                            <button type="button" class="field-action" onclick="verifyInviteCode()">验证</button>
                        </div>
                        <span class="field-success" id="inviteCodeSuccess" style="display: none;"></span>
                        <span class="field-error" id="inviteCodeError" role="alert"></span>
                    </div>

                    <!-- 协议勾选 -->
                    <div class="agreement-field">
                        <label class="agreement-checkbox">
                            <input type="checkbox" id="agreementCheckbox" name="agreement">
                            <span class="agreement-text">
                                我已阅读并同意
                                <a href="/user-agreement.html" target="_blank">《用户协议》</a>和<a href="/privacy.html" target="_blank">《隐私政策》</a>
                            </span>
                        </label>
                        <span class="agreement-error" id="agreementError" role="alert"></span>
                    </div>

                    <!-- 注册按钮 -->
                    <button type="submit" class="submit-btn auth-button" id="registerBtn">
                        <span class="button-text">立即注册</span>
                        <span class="button-loading" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i> 注册中...
                        </span>
                    </button>

                </form>

                <div class="divider">或</div>

                <!-- 微信扫码注册/登录 -->
                <a href="#" class="wx-login-btn" id="wxRegisterBtn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                        <path d="M8.5 10.5a1 1 0 100-2 1 1 0 000 2zm5 0a1 1 0 100-2 1 1 0 000 2z"/>
                        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zM6.5 9.5C6.5 7.567 9.015 6 12 6s5.5 1.567 5.5 3.5c0 1.933-2.515 3.5-5.5 3.5-.618 0-1.21-.07-1.757-.198L8 14l.5-1.5C7.03 11.85 6.5 10.73 6.5 9.5zm6.5 3.5c2.209 0 4-1.343 4-3s-1.791-3-4-3-4 1.343-4 3c0 .848.462 1.614 1.21 2.17L9.5 13.5l1.75-.875c.236.04.48.062.726.073L12 13z"/>
                    </svg>
                    微信扫码注册
                </a>

                <div class="divider">已有账号</div>

                <p class="login-hint">已有账号？<a href="/login.html">立即登录</a></p>

                <div class="form-footer">
                    &copy; 2026 StoryTree &nbsp;·&nbsp;
                    <a href="/about.html">关于我们</a>&nbsp;·&nbsp;
                    <a href="/user-agreement.html">用户协议</a>&nbsp;·&nbsp;
                    <a href="/privacy.html">隐私政策</a>
                </div>

            </div>
        </main>
    </div>

    <script src="auth.js"></script>
    <script src="js/loading.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/modal.js"></script>
    <script>
        // 微信扫码注册跳转（与登录页逻辑一致，回调后自动登录/注册）
        (function () {
            const wxBtn = document.getElementById('wxRegisterBtn');
            if (!wxBtn) return;

            fetch('/api/auth/wx-web-config')
                .then(r => r.json())
                .then(function (cfg) {
                    if (!cfg.enabled) {
                        wxBtn.style.display = 'none';
                        // 同时隐藏相邻的分割线（按钮上方那个"或"）
                        const prevDivider = wxBtn.previousElementSibling;
                        if (prevDivider && prevDivider.classList.contains('divider')) {
                            prevDivider.style.display = 'none';
                        }
                        // 隐藏按钮下方"已有账号"分割线
                        const nextDivider = wxBtn.nextElementSibling;
                        if (nextDivider && nextDivider.classList.contains('divider')) {
                            nextDivider.style.display = 'none';
                        }
                        return;
                    }
                    wxBtn._appId = cfg.wxWebAppId;
                })
                .catch(function () {
                    wxBtn.style.display = 'none';
                });

            wxBtn.addEventListener('click', function (e) {
                e.preventDefault();
                const appId = wxBtn._appId;
                if (!appId) return;
                const redirectUri = encodeURIComponent(window.location.origin + '/wx-callback.html');
                const state = Math.random().toString(36).slice(2);
                sessionStorage.setItem('wx_state', state);
                sessionStorage.setItem('wx_redirect', '/');
                const wxUrl = `https://open.weixin.qq.com/connect/qrconnect?appid=${appId}&redirect_uri=${redirectUri}&response_type=code&scope=snsapi_login&state=${state}#wechat_redirect`;
                window.location.href = wxUrl;
            });
        })();
    </script>
</body>
