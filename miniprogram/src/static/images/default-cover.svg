<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 560" width="400" height="560">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tree" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="400" height="560" fill="url(#bg)"/>

  <!-- 装饰圆圈 -->
  <circle cx="200" cy="200" r="120" fill="rgba(255,255,255,0.1)"/>
  <circle cx="200" cy="200" r="80" fill="rgba(255,255,255,0.15)"/>

  <!-- 树图标 -->
  <g transform="translate(200, 200)" filter="url(#shadow)">
    <!-- 树干 -->
    <rect x="-12" y="20" width="24" height="60" rx="4" fill="#8B4513"/>
    <!-- 树冠 - 三层 -->
    <circle cx="0" cy="-10" r="50" fill="url(#tree)"/>
    <circle cx="-35" cy="15" r="40" fill="url(#tree)"/>
    <circle cx="35" cy="15" r="40" fill="url(#tree)"/>
    <circle cx="0" cy="35" r="35" fill="url(#tree)"/>
  </g>

  <!-- 书本装饰 -->
  <g transform="translate(200, 380)" opacity="0.9">
    <rect x="-60" y="-40" width="120" height="80" rx="6" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
    <line x1="-40" y1="-10" x2="-10" y2="-10" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-40" y1="5" x2="20" y2="5" stroke="rgba(255,255,255,0.4)" stroke-width="3" stroke-linecap="round"/>
    <line x1="-40" y1="20" x2="10" y2="20" stroke="rgba(255,255,255,0.3)" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- 底部文字区域 -->
  <text x="200" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="white" opacity="0.9">StoryTree</text>
  <text x="200" y="508" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" opacity="0.6">共同创作，无限可能</text>
</svg>
