# StoryTree Nginx 配置文件
# 部署路径：/etc/nginx/sites-available/storytree
#
# 使用方法：
#   sudo cp scripts/nginx.conf /etc/nginx/sites-available/storytree
#   sudo nginx -t && sudo systemctl reload nginx

# ===================================
# 前端域名：storytree.online / www.storytree.online
# ===================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name storytree.online www.storytree.online;
    return 301 https://$server_name$request_uri;
}

# HTTPS 前端服务
server {
    listen 443 ssl http2;
    server_name storytree.online www.storytree.online;

    # SSL 证书
    ssl_certificate /etc/nginx/ssl/storytree/storytree.online.pem;
    ssl_certificate_key /etc/nginx/ssl/storytree/storytree.online.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # 字符集
    charset utf-8;

    # 日志
    access_log /var/log/nginx/storytree-access.log;
    error_log /var/log/nginx/storytree-error.log;

    # 最大上传文件大小
    client_max_body_size 10M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # 前端静态文件服务
    root /var/www/storytree/web;
    index index.html;

    # 静态资源缓存
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 用户上传文件服务
    location /uploads/ {
        alias /var/www/storytree/api/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        location ~* \.(php|sh|py|pl|cgi)$ {
            deny all;
        }
    }

    # API 反向代理
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 防止Edge/Chromium浏览器缓存错误页面（关键修复）
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
}

# ===================================
# API 子域名：api.storytree.online / www.api.storytree.online
# ===================================

# HTTP → HTTPS 重定向
server {
    listen 80;
    server_name api.storytree.online www.api.storytree.online;
    return 301 https://$server_name$request_uri;
}

# HTTPS API 服务
server {
    listen 443 ssl http2;
    server_name api.storytree.online www.api.storytree.online;

    # SSL 证书
    ssl_certificate /etc/nginx/ssl/api.storytree.online/api.storytree.online.pem;
    ssl_certificate_key /etc/nginx/ssl/api.storytree.online/api.storytree.online.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # 字符集
    charset utf-8;

    # 日志
    access_log /var/log/nginx/storytree-api-access.log;
    error_log /var/log/nginx/storytree-api-error.log;

    # 最大上传文件大小
    client_max_body_size 10M;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # API 反向代理
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;

        # CORS 预检请求
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 用户上传文件服务
    location /uploads/ {
        alias /var/www/storytree/api/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        location ~* \.(php|sh|py|pl|cgi)$ {
            deny all;
        }
    }

    # 安全响应头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 防止Edge/Chromium浏览器缓存错误页面（关键修复）
    add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header Pragma "no-cache" always;
}
