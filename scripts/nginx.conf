# StoryTree Nginx 配置文件
# 部署路径：/etc/nginx/sites-available/storytree
# 启用命令：sudo ln -s /etc/nginx/sites-available/storytree /etc/nginx/sites-enabled/
#
# 使用方法：
#   1. 将此文件复制到 /etc/nginx/sites-available/storytree
#   2. 替换 YOUR_DOMAIN.com 为实际域名
#   3. 运行：sudo nginx -t && sudo systemctl reload nginx

# HTTP → HTTPS 重定向（备案通过并配置 SSL 后启用）
# server {
#     listen 80;
#     server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;
#     return 301 https://$server_name$request_uri;
# }

# 主服务器配置（未配置 SSL 前使用 HTTP）
server {
    listen 80;
    server_name YOUR_DOMAIN.com www.YOUR_DOMAIN.com;

    # 字符集
    charset utf-8;

    # 日志
    access_log /var/log/nginx/storytree-access.log;
    error_log /var/log/nginx/storytree-error.log;

    # 最大上传文件大小（图片上传）
    client_max_body_size 10M;

    # ===================================
    # Gzip 压缩
    # ===================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ===================================
    # 前端静态文件服务
    # ===================================
    root /var/www/storytree/web;
    index index.html;

    # 静态资源缓存（CSS、JS、图片）
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # 前端页面路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===================================
    # 用户上传文件服务
    # ===================================
    location /uploads/ {
        alias /var/www/storytree/api/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        # 安全：禁止执行脚本
        location ~* \.(php|sh|py|pl|cgi)$ {
            deny all;
        }
    }

    # ===================================
    # API 反向代理
    # ===================================
    location /api/ {
        proxy_pass http://127.0.0.1:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时配置（AI 生成任务耗时较长）
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ===================================
    # 安全响应头
    # ===================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}

