name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      # 安装依赖（修复 npm 可选依赖 bug）
      - run: npm ci
      - run: npm install @rollup/rollup-linux-x64-gnu --save-optional --force || true
      - run: npx prisma generate
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: api/coverage/

  miniprogram-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniprogram
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: miniprogram/package-lock.json
      # 安装依赖（修复 npm 可选依赖 bug）
      - run: npm ci --legacy-peer-deps
      - run: npm install jsdom@24.1.3 --save-dev --legacy-peer-deps
      - run: npm install @rollup/rollup-linux-x64-gnu --save-optional --force || true
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: miniprogram-coverage
          path: miniprogram/coverage/

  web-frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm install @rollup/rollup-linux-x64-gnu --save-optional --force || true
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: web/coverage/