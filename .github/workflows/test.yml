name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  env-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Environment Consistency
        run: bash scripts/check-env-consistency.sh

  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      # 安装依赖（修复 npm 可选依赖 bug）
      - run: npm ci
      - run: npm install @rollup/rollup-linux-x64-gnu --save-optional --force || true
      - run: npx prisma generate
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-coverage
          path: api/coverage/

  miniprogram-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniprogram
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: miniprogram/package-lock.json
      # 安装依赖（修复 npm 可选依赖 bug）
      - run: npm ci --legacy-peer-deps
      - run: npm install jsdom@24.1.3 --save-dev --legacy-peer-deps
      - run: npm install @rollup/rollup-linux-x64-gnu --save-optional --force || true
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: miniprogram-coverage
          path: miniprogram/coverage/

  web-frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm install @rollup/rollup-linux-x64-gnu --save-optional --force || true
      - run: npm test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: web-coverage
          path: web/coverage/

  mobile-overflow-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run mobile overflow lint (static)
        run: node scripts/lint-mobile-styles.js
      - name: Run mobile overflow detection (Playwright)
        run: node scripts/test-mobile-overflow.js
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mobile-overflow-screenshots
          path: test-screenshots/

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: api-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run E2E smoke tests
        run: npx playwright test tests/e2e/smoke/
        env:
          E2E_BASE_URL: https://storytree.online
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-smoke-report
          path: |
            playwright-report/
            test-results/

  e2e-full:
    runs-on: ubuntu-latest
    needs: api-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Install axe-core for accessibility tests
        run: npm install -D @axe-core/playwright
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run full E2E test suite
        run: npx playwright test
        env:
          E2E_BASE_URL: https://storytree.online
          E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-full-report
          path: |
            playwright-report/
            test-results/